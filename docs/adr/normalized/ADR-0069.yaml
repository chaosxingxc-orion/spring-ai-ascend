# Normalized view of ADR-0069 — a READABLE INTERPRETATION layer over the raw
# ADR source. It re-states relationships (supersedes / superseded_by) and curates
# which clauses still govern; it INVENTS no ADR ids and no relationships, and it
# never outranks a generated fact. Authority cascade: generated facts > DSL >
# Card/prose (ADR-0154 / ADR-0160). Schema: docs/governance/adr-governance-policy.yaml
# (required fields + state invariants) + docs/governance/adr-taxonomy.yaml
# (decision-level altitude). Authority: ADR-0160.

adr: ADR-0069
raw_path: docs/adr/0069-l0-ironclad-rules.yaml

# partial_guidance: the eight Layer-0 governing principles (P-E..P-L) still govern
# as system-wide invariants, but the raw ADR's numeric Rule/gate identifiers,
# rule-lifecycle counts, and CLAUDE-deferred.md cross-references were overtaken by
# the D-/R-/G-/M- namespace ratchet (ADR-0086) and the deferred-registry retirement
# (ADR-0156) and are now non-authoritative.
current_state: partial_guidance

# Decided at L0: promotes eight system-wide ironclad rules to governing principles.
decision_level: L0
affected_levels:
  - L0
  - L1
  - gate
view: scenarios
# Promoting system-wide invariants to governing principles is an L0 architecture
# principle (adr-taxonomy decision_levels.L0.allowed_decision_types).
decision_type: architecture_principle

clean_decision_summary: >
  Eight ironclad system-wide invariants drawn from the LucioIT W1 L0 draft are
  promoted from prose to first-class Layer-0 governing principles: P-E (multi-track
  bus physical channel isolation), P-F (cursor flow + asynchronous client boundary),
  P-G (absolute non-blocking I/O), P-H (Chronos hydration / no Thread.sleep in
  business code), P-I (five-plane distributed topology), P-J (storage-engine tenant
  isolation via row-level security), P-K (skill-dimensional resource arbitration),
  and P-L (sandbox permission subsumption). Each principle is a 1:1 graph node with
  a distinct enforcer character, kept separate (not collapsed into super-principles)
  so per-violation reporting stays mechanical.

active_guidance:
  - >
    The eight Layer-0 principles P-E through P-L are the still-governing decision:
    each is a system-wide invariant that holds across modules and waves, and each is
    operationalised by a Layer-1 rule (now in the R-* namespace per ADR-0086) with a
    working enforcer per the Code-as-Contract discipline.
  - >
    The 1:1 principle-to-rule shape is deliberate and still binding: collapsing the
    eight into 2-3 super-principles was rejected (ALT-A / ALT-C) because composite
    enforcers mix unrelated checks and hurt per-violation reporting.
  - >
    The supporting authoritative side-files introduced by this decision remain part
    of the corpus: docs/governance/bus-channels.yaml (P-E), skill-capacity.yaml
    (P-K), sandbox-policies.yaml (P-L), the RLS grandfather baseline (P-J), and the
    deployment_plane field on every module-metadata.yaml (P-I).

non_authoritative_legacy_content:
  - >
    The numeric rule identifiers (Rules 35-42), the numeric gate-rule identifiers
    (gate rules 45-52), the enforcer rows E64-E71, and the rule-lifecycle counts
    ("26 active / 14 deferred / 1 retired", "52 active gate rules", "66 self-tests")
    predate the D-/R-/G-/M- namespace ratchet (ADR-0086) and the rule-card-as-sole-
    authority model. Treat the live rule cards + enforcers as authoritative, not
    these numbers.
  - >
    The CLAUDE-deferred.md references (sub-clauses 37.b / 40.b / 42.b and the
    deferred-rule registry generally) are non-authoritative: ADR-0156 retired the
    CLAUDE-deferred.md mirror pattern; deferred status now lives on the rule card's
    status field.
  - >
    The Java-anchor verification claims naming specific scans
    (no_blocking_io_in_runtime_main against agent-runtime, Thread.sleep scan results)
    are point-in-time evidence, not governing content; the live gate enforcers own
    the current verification surface.

