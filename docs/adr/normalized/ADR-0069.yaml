review_notes: >
  Layer-purity: this ADR is correctly L0 — eight system-wide governing principles.
  The leakage here is TIME-state, not altitude: the raw body is dense with numeric
  rule/gate/enforcer identifiers and lifecycle counts that the ADR-0086 namespace
  ratchet superseded, and with CLAUDE-deferred.md cross-references that ADR-0156
  retired. Those are recorded as non_authoritative_legacy_content; the live rule
  cards + enforcers + principle-coverage own the current mapping. current_state is
  unambiguous (partial_guidance — principles active, numbering legacy). The gate_refs
  re-state the R-* namespace names the raw numeric rules were renamed to (ADR-0086);
  no new mapping is minted here.
