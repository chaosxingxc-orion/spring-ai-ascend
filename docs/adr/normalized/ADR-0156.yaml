review_notes: >-
  Decision is made at L0 (a corpus-wide governance invariant: the ProductClaim
  binding rule + cards-as-sole-authority) and affects L1 and the gate lane. The
  raw ADR's `supersedes` lists a DOC PATTERN ("CLAUDE-deferred.md mirror
  pattern"), not an ADR id; per the governance policy `supersedes` carries ADR
  ids only, so it is left empty here and the pattern-supersession is recorded in
  this note and in non_authoritative_legacy_content (the mirror is retired/
  archived). current_state is active_guidance: the binding rule is current
  authority and nothing supersedes ADR-0156.
