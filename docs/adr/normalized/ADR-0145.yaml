review_notes: |
  Classified partial_guidance: the standing L1 decision is the contract-surface
  specification of the sealed RunEvent variant set plus each variant's
  EvolutionExport binding (a cross_frame_contract  -  the allowed L1 decision_type
  for a public cross-boundary promise specified as a contract). The raw ADR
  additionally embeds L2-altitude emission call-chains and a Java record
  inventory, which are recorded as non_authoritative_legacy_content per the
  2026-05-29 remediation verdict (runtime sequences / method anchors migrate to
  L2). supersedes / superseded_by empty: the raw ADR declares only relates_to
  edges and the fact layer carries no supersession for ADR-0145. The
  run-event.v1.yaml contract file exists in the tree, so contract_refs resolves.
