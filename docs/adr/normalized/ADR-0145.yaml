decision_type: cross_frame_contract

clean_decision_summary: |
  Specifies the sealed RunEvent hierarchy as a contract surface
  (docs/contracts/run-event.v1.yaml)  -  the polymorphic event type the
  EvolutionExport discriminator was designed to discriminate  -  and binds each
  RunEvent variant to its EvolutionExport value. Promotes Rule R-M.e (every
  emitted RunEvent declares an EvolutionExport) from vacuously-true to
  meaningfully gateable once the type exists. The contract is design_only at
  authoring time; the Java sealed type and the test that makes Rule R-M.e
  non-vacuous land in a follow-up implementation wave.

active_guidance:
  - "The RunEvent contract surface (docs/contracts/run-event.v1.yaml) is the authoritative specification of the sealed RunEvent variant set and each variant's EvolutionExport binding."
  - "Rule R-M.e (every emitted RunEvent declares an EvolutionExport) is the governing constraint the contract makes gateable; OUT_OF_SCOPE is reserved for client-private events that must never cross the evolution-plane boundary."
  - "New scenarios that need additional event variants EXTEND the sealed hierarchy via a follow-up ADR rather than mutating it in place."

non_authoritative_legacy_content:
  - "The Java-level emission discipline (which call-site emits which variant, RunRepository.save / updateIfNotTerminal anchors, Layer-4 emission ordering) is L2 FunctionPoint / runtime-sequence detail, not L1 authority; it is owned at L2 once the implementation wave lands."
  - "The '10 record variants land in a follow-up impl-mode wave' inventory and the design_only -> runtime_enforced status-bump narrative are migration sequencing, not standing L1 authority."

