review_notes: |
  Classified remediation_record: ADR-0118 captures audit-corrective cleanup work
  and a recurring-defect-family registration. Its value is governance traceability
  (the recurrence is now ledger-visible), not architecture authority — so
  active_guidance is intentionally empty and the concrete fixes are quarantined as
  non_authoritative_legacy_content. Architecture authority for the contracts these
  fixes restore lives in their own ADRs and contract surfaces.

  decision_level L0 / decision_type governance_invariant: the durable decision of
  this record is the family-registration + posture discipline (a meta-rule about
  how the corpus catches the recurring non-atomic-status-write defect class), which
  is an L0 governance invariant. The five fixes themselves are L2 and are not
  carried as current authority.

  F-nonatomic-run-status-write is marked partial in the raw ADR (the durable
  ArchUnit guard forbidding blind status-changing Run saves outside the SPI CAS is
  deferred). The family-ledger cleanup_status and any ArchUnit gate wiring are
  owned by the reconcile/governance wave and the recurring-defect-families ledger,
  not by this normalized view.
