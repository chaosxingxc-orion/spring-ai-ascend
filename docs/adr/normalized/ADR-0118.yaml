clean_decision_summary: |
  rc38 audit-corrective record: a four-reviewer parallel deep-read of the Java
  corpus against a green gate surfaced five verified latent-correctness and
  deploy-packaging fixes (orchestrator status writes routed through the atomic
  compare-and-set primitive; Dockerfile copying the executable jar; the
  skill-capacity matrix bundled onto the classpath; the JWKS decoder gated on the
  field it actually requires; the OpenAPI pinned test fixture realigned to the
  canonical contract) and rejected five candidate findings as verified-by-design.
  The headline finding is a recurrence of the cancel-vs-complete race, so the wave
  registers the recurring-defect family F-nonatomic-run-status-write to make the
  recurrence visible in the ledger.

