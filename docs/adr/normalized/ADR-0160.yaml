# Normalized ADR view — readable interpretation layer over the raw ADR.
# Authority: ADR-0160 (ADR Governance Model). Schema: docs/governance/
# adr-governance-policy.yaml (required fields + state invariants) +
# docs/governance/adr-taxonomy.yaml (decision-level altitude). This view invents
# no ADR ids and no relationships; it re-states and curates only. Authority
# cascade is unchanged: generated facts > DSL > Card/prose. UTC dates (Rule G-9.a).
adr: ADR-0160
raw_path: docs/adr/0160-adr-governance-model.yaml
current_state: active_guidance
decision_level: L0
affected_levels: [L0, facts, gate]
view: scenarios
decision_type: governance_invariant
clean_decision_summary: >-
  Every raw ADR in docs/adr/ (and docs/adr/locked/) MUST have a remediation-ledger
  entry, and every ADR whose raw status is `accepted` MUST have a normalized view
  recording exactly one current_state from a closed five-value set (active_guidance,
  partial_guidance, superseded, historical_evidence, remediation_record).
  Architecture review derives ADR authority from the normalized view, NOT from raw
  ADR prose; an ADR cited as current authority with no normalized view is a
  review-blocking condition. Operationalised by the ledger, the normalized views +
  index, the decision-level taxonomy, the review-index, and Rule G-28.
active_guidance:
  - Architecture review reads the NORMALIZED ADR view, not raw historical prose.
  - Every raw ADR MUST have a ledger entry in
    docs/governance/adr-remediation-ledger.yaml (coverage total over docs/adr/
    and docs/adr/locked/); every accepted ADR MUST have a normalized view at
    docs/adr/normalized/ADR-NNNN.yaml.
  - >-
      The closed five-value current_state set and per-state review behavior --
      active_guidance (citeable as governing architecture); partial_guidance
      (citeable only through the normalized active_guidance clauses); superseded
      (not citeable as current authority; points to its replacement);
      historical_evidence (citeable for context only); remediation_record
      (citeable for governance traceability, not architecture authority).
  - Each normalized view satisfies docs/governance/adr-governance-policy.yaml
    (required fields + state invariants) AND docs/governance/adr-taxonomy.yaml
    (per-decision_level decision_type altitude; a forbidden lower-altitude
    decision_type is layer-purity leakage and is rejected).
  - decision_level (where the decision is MADE) is split from affected_levels
    (what it touches), reusing the ADR-0068 Level x View vocabulary.
  - The ledger, normalized views, and review-index are READABLE INTERPRETATION
    layers over the raw sources + architecture/facts/generated/adrs.json; they
    invent no ADR ids and no relationships and never outrank a generated fact;
    generated parts (index, review-index) obey the Rule G-13 byte-identical
    regen contract.
  - Rule G-28 (ADR Normalization) enforces the model on the ratchet advisory ->
    changed-files-blocking -> full-blocking.
non_authoritative_legacy_content:
  - The Wave-W0 census figures quoted inline (88 YAML-format ADRs in the fact
    layer; ~56 Markdown active/deferred; 11 locked Markdown) are point-in-time
    census counts at source commit 98a58c1, not standing authority; the live
    enumeration is architecture/facts/generated/adrs.json plus the ledger.
  - The specific drift examples cited as motivation (ADR-0079 superseded_by
    ADR-0088; ADR-0140 reversed in part by ADR-0158; ADR-0048 amended by
    ADR-0050) are illustrative context, not relationships authored by this view.
supersedes: []
superseded_by: ""
dsl_refs: []
l0_constraint_refs: []
l1_refs: []
l2_refs: []
contract_refs: []
fact_refs:
  - architecture/facts/generated/adrs.json
gate_refs:
  - Rule G-28
  - gate/lib/check_adr_taxonomy.py
  - gate/lib/check_historical_adr_governance.py
  - Rule G-13
  - Rule G-8
review_notes: >-
  Decision is made at L0 (a governance invariant about how the ADR corpus is
  itself governed — a meta-rule over the decision spine) and affects L0, the
  facts lane (adrs.json is the apex raw-ADR fact) and the gate lane (Rule G-28 +
  its two helpers). decision_type governance_invariant is in-altitude for L0.
  This view is itself an instance of the model it ratifies. current_state is
  active_guidance: the governance model is current authority and nothing
  supersedes ADR-0160; the bulk corpus normalization, rule card, enforcer row,
  and gate wiring are sequenced remediation tasks the raw ADR explicitly defers
  (it asserts no final baseline counts), which is forward work, not superseded
  content.
