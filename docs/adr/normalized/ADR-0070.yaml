clean_decision_summary: |
  Activate the two deferred L1 process-view sub-clauses whose Phase-6
  preconditions were met: Cursor Flow (Rule R-F.b) and runtime skill-capacity
  arbitration (Rule R-K.b). The governing outcome is the introduction of two
  module-level boundary identities — an asynchronous run-dispatch SPI so the run
  submission boundary never blocks on dispatcher work, and a skill-capacity
  resolution surface on ResilienceContract whose over-capacity outcome maps to a
  SUSPENDED (not FAILED) lifecycle state. The narrow runtime/contract mechanics
  the raw ADR enumerates are L2/contract detail, not the L1 decision.

active_guidance:
  - "AsyncRunDispatcher is a public SPI boundary on the run-submission path: the run-submission boundary MUST NOT block on dispatcher execution (Cursor-Flow / Rule R-F.b boundary identity)."
  - "ResilienceContract carries a skill-capacity arbitration surface resolved against the governance-owned skill-capacity policy; an over-capacity caller is admitted=false and is mapped to a suspended lifecycle outcome rather than a failure (Rule R-K.b principle activation)."
  - "SuspendReason is a sealed taxonomy (rate-limited capacity exhaustion is one variant); additive variants are the intended evolution shape per the ADR-0019 taxonomy as canonicalized by ADR-0146."

non_authoritative_legacy_content:
  - "The HTTP-level realization (POST /v1/runs shifting from 201+RunResponse to 202+TaskCursor/RunCursorResponse with cursor_url) — runtime/wire detail owned by the contract surface (docs/contracts/openapi-v1.yaml), not by this L1 decision."
  - "Named implementation classes and method bodies (RunController.create(), NoOpAsyncRunDispatcher, CompletableFuture.runAsync, YamlSkillCapacityRegistry, DefaultSkillResilienceContract, ConcurrentHashMap<String,AtomicInteger> CAS, SnakeYAML loading) — L2 implementation detail."
  - "Test-class inventory and timing assertions (RunCursorFlowIT, SkillCapacityResolutionIT, createReturns202WithCursor, 200 ms / 30 s synthetic dispatcher) — L2 test mapping owned by the generated test facts."
  - "Phase 8 / Phase 9 single-commit packaging, deferred-rule list trimming, CLAUDE-deferred.md section deletes, and the numeric gate/self-test baseline movements (66 -> 70) — process-narrative detail owned by release notes and the gate/enforcer surfaces."

