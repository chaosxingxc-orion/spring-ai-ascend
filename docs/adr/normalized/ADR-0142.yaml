clean_decision_summary: |
  Resolve the double-homing of the Run aggregate in the 5-layer L1 model: the
  Run aggregate (the run record + its status enum + its state-machine validator +
  its repository SPI, including the atomic compare-and-set update method) is OWNED
  EXCLUSIVELY by the Session & Task Manager layer (Layer 2). The Task-Centric
  Control layer (Layer 4) holds a TYPED REFERENCE to the repository SPI and
  mutates run state ONLY through its atomic update-if-not-terminal operation;
  Layer 4 never writes run state directly, never calls the mutator or the
  validator directly, and never defines a per-layer mutation helper. The same
  single-owner pattern applies to the Task and Session aggregates. The standing
  decision is the single-owner layer-responsibility rule; the concrete class
  paths and diagram conventions are realisation detail.

active_guidance:
  - "The Run aggregate (run record + status enum + state-machine validator + repository SPI with its atomic compare-and-set update) is owned EXCLUSIVELY by Layer 2 (Session & Task Manager); the state-machine validator lives inside that aggregate boundary."
  - "Layer 4 (Task-Centric Control) holds a typed reference to the run repository SPI and mutates run state ONLY via its atomic update-if-not-terminal operation; Layer 4 MUST NOT call the run mutator directly, MUST NOT persist via a CAS-bypassing store path, MUST NOT call the state-machine validator directly, and MUST NOT define a per-layer mutation helper (such helpers drift from the aggregate CAS contract)."
  - "Suspension protocol: the engine-dispatch layer raises the suspension; Layer 4 catches it and delegates the RUNNING->SUSPENDED transition to the Layer 2 repository's atomic update, broadcasts on the internal event queue, and optionally drives the callback-variant transport — Layer 4 never writes run state itself."
  - "The Task and Session aggregates follow the SAME single-owner pattern: owned by Layer 2; downstream layers hold typed references and use the aggregate's atomic store / read-only projection rather than writing directly."

non_authoritative_legacy_content:
  - "The fully-qualified aggregate class PATHS (the run record, status enum, state-machine, run-mode discriminator, and repository SPI under service.runtime.runs.*) are L2 class-anchor detail owned at L2 + the generated code-symbol facts; the L1 decision is the single-owner layer assignment, not the file inventory."
  - "The diagram-convention clause (draw the Run aggregate inside the Layer 2 box; label Layer 4's control-flow arrow with the atomic update call) is L1/L2 rendering detail for the logical-view doc, not a standing structural invariant."
  - "The grandfathered PENDING-create save() call-site carve-out and the recurring-defect-family background (F-nonatomic-run-status-write occurrences through earlier rc waves) are recurring-defect-families ledger / known-carve-out content owned by that ledger and the SPI appendix."
  - "The future ArchUnit candidate (a Layer4MustNotImportRunDirectly test as a W2+ gate-rule candidate) is a forward enforcement note; until it lands this ADR is review-time enforced (recorded so reviewers know the structural guard is not yet a gate)."

