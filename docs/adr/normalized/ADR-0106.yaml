clean_decision_summary: |
  The Run optimistic-lock field is introduced in two phases to avoid an
  in-flight compare-and-set gap: a record-shape-only phase adds a version field
  with a zero default and no behavioural change, and a later phase arms the
  durable-tier CAS on save. Because every pre-armed Run already carries the
  default version, the first armed save passes the CAS comparison cleanly — no
  race window, no exception, no per-Run carve-out. This is a cross-cutting
  sequencing constraint on how the persistence migration rolls out.

active_guidance:
  - "The two-phase sequencing constraint holds — the version field's existence is decoupled from CAS enforcement; the record-shape change ships first as a behavioural no-op, and the CAS check is armed only in the durable tier."
  - "The migration-safety invariant holds — a default-zero version on every pre-armed Run guarantees the first armed save is a clean CAS pass, so no in-flight Run is ever unsavable and no race window is re-opened."

non_authoritative_legacy_content:
  - "The method-level CAS semantics in the raw ADR (the accept/reject comparison expressions on the repository save method, the version-increment write, the exact optimistic-lock throw site). L2 implementation detail owned by the L2 design / generated facts, not by this sequencing constraint."
  - "The exact wave milestone labels (W0 / W1.5 / W2) and the Run record component counts. Wave labels are planning artefacts; the live record shape is a generated code-symbol fact, not this ADR's prose."
  - "The clause asserting the corrected CAS semantics supersede the prior architecture draft prose. The corrected semantics are owned at L2 / the persistence design; this view records only that a correction occurred, not the formula."

