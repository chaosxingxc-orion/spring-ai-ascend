adr: ADR-0077
raw_path: docs/adr/0077-schema-first-domain-contracts.yaml

current_state: partial_guidance
decision_level: L0
affected_levels: [L0, L1, contract, gate]
view: development
decision_type: governance_invariant

clean_decision_summary: >-
  Codifies the schema-first domain-contract discipline as a permanent,
  ship-blocking governance invariant: a new domain enum / taxonomy MUST cite a
  YAML schema (under the contracts or governance surfaces) rather than be defined
  in prose, so the "YAML schema -> Java type -> runtime self-validate" shape
  replaces prose-first taxonomies and the text-drift defect family becomes
  structurally impossible for new taxonomies. Pre-existing prose-enum sites are
  carried on a closed grandfather list (no additions); their migration is
  follow-up work, not a re-opening of the closed list.
active_guidance:
  - >-
      Schema-first is a standing governance invariant: every NEW domain enum or
      taxonomy in the normative architecture corpus MUST have a single source of
      truth in a YAML schema with a gate-enforced cross-check, not a prose
      definition. This is the leaf-shape companion to the Layered 4+1 + graph
      structural substrate -- structure says WHERE a constraint lives; this rule
      says WHAT SHAPE its taxonomy takes.
  - >-
      The rule is ship-blocking, not advisory: advisory enforcement of a
      text-discipline decays the moment the authoring engineers move on, which is
      the documented mechanism behind the historical text-drift defect family. A
      new prose enum with no nearby schema reference and no grandfather entry
      fails the gate closed.
  - >-
      The grandfather list of pre-existing prose-enum sites is CLOSED -- a
      named, auditable, dateless-additions-forbidden set. New taxonomies cannot be
      slipped onto it; the only way to add a prose enum is to give it a YAML
      schema.
non_authoritative_legacy_content:
  - >-
      The concrete gate-rule realisation (the numbered gate rule, its heuristic
      prose-enum regex, the +/-5-line proximity window, the grandfather-list file
      and its entry count, the named positive/negative self-test fixtures, the
      enforcer row id) is gate-surface realisation owned by the gate scripts +
      enforcers ledger, not standing L0 authority.
  - >-
      The point-in-time defect-family arithmetic (79 of 158 historical closed
      defects) and the specific list of grandfathered prose-enum sites are
      recurring-defect-families ledger + grandfather-list content, not standing
      architecture authority.
  - >-
      The bash-only-gate constraint and the deferred option to upgrade the
      prose-enum scanner to a Markdown-AST parser are implementation/process
      detail, not part of the standing schema-first invariant.
