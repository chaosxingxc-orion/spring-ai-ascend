clean_decision_summary: |
  EnginePort is the neutral, transport-agnostic semantic contract for the
  Service-to-Engine boundary, carrying no tenant/session/run semantics: the
  Service registers, discovers, and drives a generic abstract engine across
  execute, stream-events, suspend, resume, and describe-health. The contract is
  absorbed into agent-bus as a sibling of the ingress, S2C, and federation SPI
  packages, so it is owned by no single engine and stays in the main repo when the
  engine is later extracted; no new Maven module is created. Deployment form
  becomes a packaging plus adapter choice rather than a code fork: three EnginePort
  transport implementations live inside agent-service (in-process, internal-RPC,
  and A2A federation). The dependency direction in all three forms is
  agent-service to agent-bus engine-contract back to agent-execution-engine, and
  this ADR reverses the earlier reference-executor placement so the reference
  executors live in the engine (they ARE the engine), not in the Service's driving
  adapters.

active_guidance:
  - "EnginePort is the single neutral, transport-agnostic semantic contract for the Service-to-Engine boundary (execute, stream events, suspend, resume, describe-health); it carries NO tenant/session/run semantics, that ownership stays Service-side."
  - "The engine contract is absorbed into agent-bus as a sibling of ingress / S2C / federation; agent-bus depends on nothing and is a dependency of both agent-service and agent-execution-engine, so the contract is neutral and stays in the main repo when the engine splits. No new Maven module is created (six domain modules unchanged)."
  - "Dependency direction in ALL three deployment forms is agent-service to agent-bus engine-contract back to agent-execution-engine; the engine implements the contract and never depends on agent-service."
  - "Deployment form is a packaging plus adapter choice, not a code fork: three EnginePort implementations live in agent-service, an in-process adapter (co-deployed / embedded), an internal-RPC adapter (engines you own), and an A2A federation adapter (external/federated agents via the federation gateway)."
  - "The engine-facing execution context is neutralized to opaque correlation (runId / traceId / spanId) plus the checkpointer and the suspend capability; the tenant/session-bearing run context becomes a Service-side subtype."
  - "Suspend/resume is a capability with two realizations: in-process (the existing checked suspension caught by the Orchestrator) and over-the-wire (a checkpoint-token protocol generalizing the proven S2C suspend-over-a-boundary protocol); the executor definition becomes a serializable named reference so dispatch can cross a JVM."
  - "The two rival executor-adapter surfaces are reconciled under EnginePort on a streaming model with errors as terminal events; the losing surface is retired. The reference executors move into agent-execution-engine; the engine registry / envelope / hook surface stay engine-internal."
  - "EngineeringFrame ontology: EF-ORCHESTRATION-SPI is re-homed to agent-bus and EF-ENGINE-PORT (owned by agent-bus) is added; EF-ENGINE-REGISTRY stays owned by agent-execution-engine."

non_authoritative_legacy_content:
  - "The pre-decision inverted placement (the module named agent-execution-engine being the pinned in-process CONTRACT while the reference executors lived in agent-service) is the state this ADR corrects; it is no longer authoritative."
  - "The reference-executor placement of ADR-0140 (reference adapters in agent-service) is REVERSED by this ADR; that specific placement clause is non-authoritative while ADR-0140's 5a/5b split otherwise stands."
  - "The over-the-wire suspend checkpoint-token realization mechanics and the wide re-namespacing of the orchestration-SPI referencing sites are L2 / migration-sequencing detail, not standing normative clauses."

