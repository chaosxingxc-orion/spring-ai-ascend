review_notes: |
  Classified active_guidance: EnginePort is the current governing Service-to-Engine
  boundary contract and nothing supersedes ADR-0158. The raw ADR carries a LOCKSTEP
  FLAG for the implementation phase (agent-bus module-metadata declares
  bus.spi.engine; engineering-frames.dsl re-homes EF-ORCHESTRATION-SPI and adds
  EF-ENGINE-PORT; architecture-status.yaml baseline_metrics move with their
  allowed_claim + README phrases; engine-port.v1.yaml + a contract-catalog row land
  before the networked transports). Those authority surfaces
  (architecture-status.yaml, README, engineering-frames.dsl, the generated
  fragments, the contract catalog) are owned by the reconcile/governance wave, NOT
  by this normalized view — this view only re-states the decision and cites them.

  decision_level L1 / decision_type engineering_frame_boundary: the decision draws
  an EngineeringFrame / public-SPI boundary (EF-ENGINE-PORT) and re-homes a frame's
  SPI package between L1 modules — an L1 frame-boundary altitude (defensible:
  naming a public SPI as a boundary identity, citing the workspace/ProfileValidator
  gate as the mechanism). public_spi_surface is an equally valid L1 decision_type
  for this ADR; engineering_frame_boundary was chosen because the dominant act is
  re-homing/adding EngineeringFrames (EF-ENGINE-PORT / EF-ORCHESTRATION-SPI).

  The ADR REVERSES ADR-0140's reference-executor placement but does NOT supersede
  ADR-0140 (its 5a/5b split otherwise stands) — so supersedes is empty and the
  reversal is stated as an active_guidance clause plus a non_authoritative_legacy
  clause. Layer-purity discipline applied: wire/SPI signature detail and the
  ~47-site re-namespacing are L2/contract-lane material and were not carried up as
  current authority.

