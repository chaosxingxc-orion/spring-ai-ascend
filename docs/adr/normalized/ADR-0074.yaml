review_notes: |
  Classified partial_guidance, not active_guidance, because the protocol itself
  still governs (active_guidance clauses) while two strata of the raw ADR are no
  longer authority: (1) the deleted S2cCallbackSignal design and its now-reversed
  rejected-alternatives, and (2) the agent-runtime-core package-path anchors that
  ADR-0088 re-homed to bus.spi.engine's sibling bus.spi.s2c. A reviewer may cite
  this ADR for the S2C contract ONLY through the active_guidance clauses; the
  legacy clauses are explicitly non-authoritative.

  decision_level set to L1 (cross_frame_contract): the raw ADR self-labels L1 and
  the decision is a public SPI / wire-contract boundary between the Service and
  Engine/Bus frames — defensible at L1 (naming a public SPI as a boundary
  identity). Method-signature and call-chain detail in the raw body is L2 leakage
  and was deliberately NOT carried up.

  enforcer ids are transcribed from the raw ADR's enforcer_rows; the reconcile /
  governance wave owns whether they remain E81-E84 and any gate Rule renaming
  (the raw ADR's "Rule 58" predates the G-/R-/D- namespace ratchet of ADR-0086).
