review_notes: |
  Lane: L3-L0ARCH (ADR-0159). Classified at decision_level L0 to match the raw
  ADR self-label (level: L0) and the cross-corpus governance-invariant character
  of the decision (governance_infra: true on the raw). decision_type
  governance_invariant is the allowed L0 type for a meta-rule about how the
  corpus is itself governed.
  current_state is partial_guidance (NOT active_guidance) because ADR-0152
  declares supersedes_partial: [ADR-0068] for the L0 document LOCATION clause
  only; the twin-truth discipline (active_guidance above) still governs, while
  the located-at-repo-root clause is non-authoritative legacy. supersedes /
  superseded_by are left empty: the supersession is PARTIAL and inbound (ADR-0152
  declares supersedes_partial for a single LOCATION clause of this ADR), and the
  extracted fact layer carries no full superseded_by edge for ADR-0068 — minting
  one here would overclaim. The inbound partial-supersession is annotated in
  ADR-0152's normalized view review_notes (likewise left out of its supersedes
  field as a clause-level, not whole-decision, edge).
  No ambiguity in the partial_guidance choice; flagged for human review only to
  confirm the location-clause split is the sole non-authoritative carve-out.
