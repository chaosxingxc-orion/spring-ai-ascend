clean_decision_summary: |
  Architecture truth lives in two coupled forms governed as one: a human-facing
  corpus organised by Layered 4+1 (every architectural artefact declares level +
  view; Logical / Development / Process / Physical / Scenarios) and a
  machine-readable graph index generated from that corpus (never hand-edited).
  The standing governing invariant is the twin-source discipline itself: every
  architectural artefact declares its (level, view); relational truth
  (supersedes / extends / relates_to, principle to rule to enforcer to test) is
  carried as gate-validated graph edges rather than re-derived from prose. The
  concrete repo-root LOCATION of the L0 ARCHITECTURE.md document is superseded
  for-location-only by ADR-0152 (mounted under architecture/docs/L0/); the
  declarative twin-truth role is unchanged.

active_guidance:
  - "Layered 4+1 discipline: every architectural artefact declares a (level, view); L0 governs cross-module principle, L1 governs module/EngineeringFrame contract, L2 owns feature detail; proposals declare which view of which level they touch."
  - "Architecture-graph truth: relational architecture truth (adr->adr supersedes/extends/relates_to, principle->rule->enforcer->test/artefact, module->module allowed/forbidden, (level,view)->artefact) is carried as a machine-readable, generated, idempotent graph index — not as multi-copy prose — so the relational spine cannot text-drift."
  - "Phase-released L0/L1 artefacts are frozen; further edits flow through a review log rather than silent in-place edits."
  - "Institutional rationale is preserved as structured block-scalar prose so machine-readability never costs the why."

non_authoritative_legacy_content:
  - "The L0 document LOCATION clause (Root ARCHITECTURE.md is L0 at repo root; the ^ARCHITECTURE.md$ regex) is superseded FOR LOCATION ONLY by ADR-0152, which relocates it to architecture/docs/L0/ARCHITECTURE.md and narrows the L1 path to architecture/docs/L1/<module>/ (single-.md alternative retired). The declarative L0 role is unchanged."
  - "Concrete entry-time corpus counts (67 ADRs, 32 active engineering rules, 47 gate-script rules, 54 enforcer rows, 24 self-tests, 18 active / 15 deferred / 1 retired rule lifecycle, 4 L0 principles) and the post-impl graph snapshot (269 nodes / 377 edges) are wave-era baseline observations owned by docs/governance/architecture-status.yaml and release notes, not standing L0 authority."
  - "Named build scripts, ArchUnit test classes, specific gate-rule numbers (Gate Rules 37-40), and the .md->.yaml ADR migration mechanics are implementation/process detail owned by the gate surfaces and the generated facts; the standing L0 decision is the twin-truth invariant, not the realisation."

