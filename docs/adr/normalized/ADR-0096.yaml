clean_decision_summary: |
  A corrective wave that permanently closes the "recursive-irony" pattern (rules
  meant to prevent drift drifting themselves). It replaces the awk recurring-
  defect-families parser with a Python YAML parser, makes freshness a content
  diff rather than an mtime check, derives refresh-signal paths from the family
  surfaces, and adds a META-of-META gate that structurally requires every [META]
  rule to source a shared helper. It also adds a legacy-parenthetical
  reintroduction guard, a rule-card filename-convention gate, and a multi-wave
  release runbook. Captured here as governance-traceability, not as standalone
  architecture authority.

