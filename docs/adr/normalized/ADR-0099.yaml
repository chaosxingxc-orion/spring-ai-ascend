# (required fields + state invariants) + docs/governance/adr-taxonomy.yaml
# (decision-level altitude). Authority: ADR-0160. UTC dates (Rule G-9.a).

adr: ADR-0099
raw_path: docs/adr/0099-rc22-l1-architecture-depth-and-grounding.yaml

current_state: active_guidance
decision_level: L0
affected_levels: [L0, L1, gate]
view: development
decision_type: governance_invariant

clean_decision_summary: >
  Rule G-1.1 (L1 Architecture Depth and Grounding) is adopted to enforce the
  depth and grounding of L1 architecture documents, not merely their 4+1 shape:
  every L1 ARCHITECTURE.md must map its logical components to a code-path tree
  (Development View), enumerate its SPI/API surface as a fourth parity point
  alongside the catalog/metadata/DFX cross-check, and define the boundary
  contracts for any subsystem delegated to an L2 design. The rule is
  complementary to (not a duplicate of) the existing SPI-parity rule.

active_guidance:
  - >
    Rule G-1.1.a — every L1 architecture document declares its target directory
    tree to at least package level and maps every major logical component to a
    code path, cross-checked against the filesystem.
  - >
    Rule G-1.1.b — every L1 architecture document enumerates its full SPI/API
    surface; each listed interface must resolve in module metadata, the contract
    catalog, and as a real public interface source file (the fourth parity point).
  - >
    Rule G-1.1.c — for any subsystem delegated to an L2 design, the L1 document
    defines the boundary contracts (inputs, outputs, DFX expectations) the L2
    design must adhere to.
  - >
    The rule is named with the .1 child-rule suffix (Rule G-1.1), not a .a/.b/.c
    sub-clause suffix, because it is a standalone rule extracted from Rule G-1,
    per the child-rule naming convention.

