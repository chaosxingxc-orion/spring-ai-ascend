review_notes: >
  current_state = partial_guidance: P-M and the schema-first invariant are
  current L0 authority, but the wave's implementation-phase content (concrete
  package paths, the pre-migration engine-on-agent-service placement, and the
  provisional gate/enforcer numbers) is lower-altitude and partly superseded
  by ADR-0088 (agent-runtime-core dissolution) and ADR-0158 (neutral EnginePort
  absorbed into agent-bus). The child decisions ADR-0072..0077 each carry their
  own normalized view; cite those for per-surface contract authority. No
  supersedes/superseded_by edge is declared by the raw ADR or adrs.json, so both
  lists are empty (the engine-boundary evolution is an extends/relates chain,
  not a supersede).
