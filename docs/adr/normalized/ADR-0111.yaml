adr: ADR-0111
raw_path: docs/adr/0111-sandbox-routing-vault-rotation-otlp-tenant-outbox-replay.yaml

current_state: partial_guidance
decision_level: L0
affected_levels: [L0, L1, L2, contract]
view: physical
decision_type: global_constraint

clean_decision_summary: >-
  Batches four infrastructure-boundary security gaps that share a "secret /
  sensitive-data leakage at a subsystem boundary" root cause into one set of L0
  global constraints: (A) an untrusted skill cannot register against a no-op
  sandbox at the research/production postures -- a startup gate fails closed; (B)
  trace export MUST be per-tenant routed, with a binding miss failing closed at
  production; (C) every long-lived secret MUST declare a rotation policy in a
  secret-lifecycle source of truth, with the LLM provider credential as a subset
  rotated without in-flight disruption; (D) outbox payloads MUST declare a replay-
  safety policy so at-least-once redelivery cannot leak sensitive data after a
  lawful-erasure request. The standing decision is the four fail-closed
  constraints + their governance source-of-truth files; the YAML field shapes,
  SPI signatures, and W2/W3 sequencing are realisation.
active_guidance:
  - >-
      Sandbox routing is fail-closed: at startup a routing guard cross-checks
      registered skills' execution levels against the active sandbox-executor
      binding; at the research/production postures an untrusted skill with a no-op
      sandbox aborts bean creation with an actionable diagnostic, operationalising
      the sandbox-executor admission gate early.
  - >-
      Trace export is per-tenant routed: a tenant maps to its export endpoint +
      auth via a routing source of truth; un-named tenants fall back to a shared
      exporter with explicit cross-tenant attribute filtering and an isolation-
      warning marker; a binding miss at the production posture fails closed. Cross-
      tenant trace aggregation in one global pipeline is the threat this removes.
  - >-
      Secret lifecycle is declared, not implicit: every long-lived secret declares
      a rotation cadence, grace window, on-leak runbook, and active consumers in a
      secret-lifecycle source of truth; a missing rotation policy for a known
      long-lived secret is a startup-gate failure. The LLM provider credential is
      a subset rotated without in-flight disruption via preflight + cache refresh.
  - >-
      Outbox replay is policy-governed: each payload type declares a replay-safety
      policy -- replay-idempotent (default for system events; consumer dedups),
      redact-on-resend (default for payloads carrying model output / user input /
      tool args), or suppress-after-ttl (default for ephemeral high-sensitivity
      payloads) -- and lawful erasure immediately redacts/suppresses the sensitive
      classes regardless of ttl. Replay safety is decoupled from the publisher
      mechanism; banning at-least-once delivery is rejected.
non_authoritative_legacy_content:
  - >-
      The governance source-of-truth file shapes quoted inline (the secret-
      lifecycle entry fields; the named tenant-OTLP-routing and secret-lifecycle
      files that are explicitly "not yet authored") are forward-wave governance
      realisation owned by those files when they land, not present-tense standing
      authority.
  - >-
      The SPI / guard / hook / publisher names, the diagnostic and audit-key
      strings, the per-channel metric names, and the named ArchUnit tests are
      L1/L2 class-method realisation detail; the standing L0 decision is the four
      fail-closed constraints, not the named carriers.
  - >-
      The W2 vs W3 sequencing of each part, and the compounding note that one part
      overlaps a key-distribution ADR and needs a later unification ADR, are
      forward scheduling / design intent, not standing L0 authority.
