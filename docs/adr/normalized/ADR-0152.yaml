clean_decision_summary: |
  Makes the L1 module-directory shape uniform: every domain Maven module's L1
  corpus lives at architecture/docs/L1/<module>/ with the canonical file set
  (README, ARCHITECTURE, the five 4+1 views, spi-appendix, features/README),
  the single-narrative <module>.md shape is retired, and architecture/docs/L1/
  _template/ is the canonical skeleton — fixed by Rule G-1.1.d. Separately,
  moves root ARCHITECTURE.md to architecture/docs/L0/ARCHITECTURE.md so the
  workspace !docs directive imports L0 into the closure. EXTENDS ADR-0147,
  ADR-0149, ADR-0150 and ADR-0151. agent-service is the canonical mature
  instance; the other modules adopt the same shape with stub view content.

active_guidance:
  - "Every domain module's L1 corpus lives at architecture/docs/L1/<module>/ with the canonical 9-file set; the single-narrative <module>.md shape is RETIRED and content depth varies by maturity while structure does not."
  - "architecture/docs/L1/_template/ is the canonical skeleton new modules copy from; basename parity with _template/ is enforced by Rule G-1.1.d."
  - "L0 ARCHITECTURE.md lives at architecture/docs/L0/ARCHITECTURE.md so the workspace !docs directive imports the L0 corpus into the closure; the Rule G-1.a L0/L1 location regexes are updated accordingly."

non_authoritative_legacy_content:
  - "The ~80-130-reference path-sweep enumeration and the AdrMirrorCli anchor-id extension are migration mechanics, not standing L0 authority."
  - "The advisory-at-Wave-2 status of Rule G-1.1.d and the W3/W4/W5 render-and-promote schedule are point-in-time migration sequencing; the standing authority is the uniform-shape requirement and the L0 mounting location."

