adr: ADR-0144
raw_path: docs/adr/0144-layer-vs-package-matrix.yaml

current_state: partial_guidance
decision_level: L1
affected_levels:
  - L1
  - L2
view: development
decision_type: engineering_frame_boundary

clean_decision_summary: |
  Publishes the canonical Layer to Package matrix for agent-service: the
  ADR-0138 5-layer logical-view decomposition (Access / Manager / Queue /
  Control / Adapter) and the ADR-0100 5-component package-structural
  decomposition (Dispatcher / Orchestrator / Task / Session / Engine) are
  orthogonal views, not competitors. The matrix is the single mapping between a
  logical layer and the sub-package homes that realise it. This ADR EXTENDS both
  ADR-0100 and ADR-0138 (it supersedes neither); the matrix is the third corner
  that resolves their tension.

active_guidance:
  - "The Layer to Package matrix is the canonical mapping between the ADR-0138 logical layers and the ADR-0100 package homes; both decompositions remain in force and this ADR extends rather than replaces them."
  - "A sub-package belongs to exactly ONE logical layer OR the cross-cutting bucket, never two layers; a responsibility that crosses layers is a low-cohesion signal to split before landing."
  - "When a new sub-package is added under the agent-service package root, the author updates the matrix in the same change."

non_authoritative_legacy_content:
  - "The inline class-level enumerations inside the matrix cells (concrete adapter / filter / gateway type names, EngineRegistry.resolve and RunRepository.updateIfNotTerminal call references) are L2 FunctionPoint detail and are NOT L1 authority; the L1 decision is the layer-to-package-home mapping only. The type-level detail is owned at L2 / generated facts."
  - "The rc55 wave-sequencing notes (which wave renders the matrix, the future module-metadata.yaml#layer_assignments field) are migration history, not standing L1 authority."

