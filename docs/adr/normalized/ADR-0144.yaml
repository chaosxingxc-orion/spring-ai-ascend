review_notes: |
  Classified partial_guidance because the standing L1 decision — the orthogonal
  layer-vs-package framing and the matrix mapping plus the one-layer-per-package
  assignment rule — is current authority, while the matrix cells additionally
  embed L2-altitude class/method anchors that are the leakage adjudicated TRUE in
  the 2026-05-29 systemic-remediation review. Those anchors are recorded as
  non_authoritative_legacy_content so the view is citeable only through the
  layer-mapping clauses. supersedes / superseded_by are empty: the raw ADR
  declares EXTENDS for ADR-0100 and ADR-0138 (not supersedes), and the extracted
  fact layer carries no supersession edge for ADR-0144. decision_type
  engineering_frame_boundary is the allowed L1 type that matches a
  package-cluster / EngineeringFrame boundary mapping (DEFENSIBLE at L1 per the
  remediation verdict: development-view package decomposition).
