clean_decision_summary: |
  Declare the authority boundary of this project relative to the long-arc
  "Agent-OS" architecture ledger: this project's L0 covers Phase-1 (the
  shipped/architected baseline) and the JVM-reachable subset of Phase-2.
  Phase-3 OS-kernel + hardware-direct items (eBPF probes, DMA zero-copy bus,
  Kunpeng KAE offload, RDMA + NPU-Direct Storage, Semantic GC over HBM, async RL
  pipeline on NPU) are OUT OF this project's L0 authority and require a sibling
  Agent-OS / openEuler / NPU-driver epic owned by a different team. The standing
  governing outcome is the scope line itself, plus the vocabulary correction that
  heterogeneous-framework isolation is described as SPI-boundary immutability /
  stateless-execution-shell, never "cognitive disablement".

active_guidance:
  - "Scope boundary: this project's L0 authority covers Phase-1 (shipped/architected) and the JVM-reachable subset of Phase-2; all Phase-3 OS-kernel and hardware-direct items are out-of-scope for this project's L0 and belong to a separate Agent-OS / openEuler / Kunpeng-driver authority."
  - "In-repo prose that claims this project will ship eBPF / DMA / RDMA / NPU-Direct / KAE / Semantic GC / async RL pipeline is incorrect on its face; release notes are NOT to be measured against deliverables the project does not own."
  - "Heterogeneous-framework isolation is described in this project's authority text as SPI boundary immutability / stateless execution shell (engines run as stateless shells injected with read-only context; they observe lifecycle via the canonical hook contract) — NOT as 'forcibly disabling the framework's native memory system'."
  - "This decision adds NO new rule and NO new enforcer; it is a scope-boundary declaration, not a correctness constraint."

non_authoritative_legacy_content:
  - "The reference to docs/CLAUDE-deferred.md as the home of deferred Phase-2 sub-items is stale: the dual-home deferred-rule registry was retired (rule cards are the sole rule authority; a status field on the card encodes deferred/active). Treat the deferral signal as carried by the rule cards + recurring-defect-families ledger, not by CLAUDE-deferred.md."
  - "The baseline_metrics deltas (adr_count 90->91, architecture_graph_nodes 384, architecture_graph_edges 577, the 118-rule / 194-self-test / 374-test counts) are rc15-era baseline snapshots owned by docs/governance/architecture-status.yaml and release notes, not standing L0 authority."
  - "The Whitepaper Alignment Matrix row-add mechanics and the per-Phase in/out-of-scope table cells are navigation/process detail; the standing decision is the Phase-3 out-of-scope line, not the matrix realisation."

