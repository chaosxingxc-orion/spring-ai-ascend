review_notes: |
  Classified active_guidance: the Agent first-class SPI is the current governing
  entry-point identity for the platform; nothing supersedes it. The surface is
  design_only at the SPI-shape level (the first runtime registry impl + Spring AI
  adapter chain land at W3 SDK GA), but design_only is an implementation-maturity
  state, NOT a current_state authority value — the decision IS current authority,
  so active_guidance is correct.

  decision_level RECLASSIFIED L0 -> L1 (flagged). The raw ADR self-labels level
  L0 (it was raised by an L0 review), but the DECISION ALTITUDE is L1: it names a
  public SPI surface as a boundary identity, which the taxonomy places at L1
  (public_spi_surface) and explicitly calls defensible at L1. A human owner may
  prefer to keep affected_levels including L0 to reflect the L0-review origin
  (done here). The raw ADR's per-method interface signatures (invoke(...),
  agentId(), register(...), the default binding accessors) are L2 leakage and were
  deliberately NOT carried into clean_decision_summary or active_guidance — they
  belong in L2 / the contract surface.
