review_notes: |
  Classified partial_guidance: the standing L1 decision is the canonical
  6-variant taxonomy plus the single-sourced A2A InterruptType to SuspendReason
  wire mapping (a cross_frame_contract — the public cross-boundary mapping
  authority). The raw ADR embeds L2-altitude Java line anchors and call-site
  counts, recorded as non_authoritative_legacy_content per the 2026-05-29
  remediation verdict. supersedes is EMPTY despite the raw ADR §6 stating it
  supersedes ADR-0019's original variant block: that is a CLAUSE-level partial
  supersession, the raw ADR's declared edge to ADR-0019 is EXTENDS, and the
  extracted fact layer carries no supersedes edge for ADR-0146. Minting a
  whole-ADR supersedes here would invent an edge the source does not declare,
  which the readable-interpretation discipline forbids. HUMAN-REVIEW FLAG: if
  governance wants the clause-level supersession of ADR-0019's variant block
  represented as a first-class edge, it must be declared in the raw ADR /
  fact layer first, then re-stated here — not minted in this view.
