clean_decision_summary: |
  Ratifies the canonical 6-variant SuspendReason taxonomy
  {AwaitClientCallback, AwaitChildRun, AwaitToolResult, AwaitTimer,
  RequiresApproval, RateLimited} as the L1 authority and single-sources the A2A
  InterruptType to SuspendReason wire mapping. Reconciles prior naming drift
  across ADR-0019, ADR-0070, ADR-0074 and ADR-0112 by applying the user
  precedence rule (the 2026-05-22 expansion-proposal-response doc wins over the
  ADRs). EXTENDS ADR-0019; the fan-out AwaitChildren variant is deferred as
  design_only to a future ADR.

active_guidance:
  - "The canonical SuspendReason set is exactly the 6 variants {AwaitClientCallback, AwaitChildRun, AwaitToolResult, AwaitTimer, RequiresApproval, RateLimited}; future ADRs EXTEND this set (e.g. a 7th fan-out variant) rather than rename within it."
  - "The A2A InterruptType to SuspendReason mapping in this ADR is the single authoritative wire-protocol to internal mapping."
  - "Each variant's resume-payload contract (per-variant) is carried forward from ADR-0019 as restated here."

non_authoritative_legacy_content:
  - "The Java rename scope (SuspendReason.java line anchors, per-variant constructor call-site counts) is L2 implementation detail, not L1 authority; the rename lands in an impl-mode follow-up wave."
  - "The pre-alignment variant names from ADR-0019 (ChildRun / AwaitExternal / AwaitApproval), ADR-0070 (AwaitChild) and ADR-0112 Part B (AwaitTool / AwaitChildren) are explicitly NON-current — they are listed only to record the drift this ADR closes."

