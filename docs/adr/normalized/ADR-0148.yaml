clean_decision_summary: |
  Records the Wave 0 spike evidence that validated the four technical
  assumptions behind the Structurizr workspace-authority direction (ADR-0147),
  measured on the smallest L1 module: all four gates PASS, three surprise
  empirical findings captured (CustomElement extends Element so the model element
  set must be walked once; hierarchical-identifier scope behaviour; structurizr-
  export transitivity), and the recorded decision is PROCEED to Wave 1. The
  standing architecture authority is carried by ADR-0147, not by this evidence
  record.

