review_notes: |
  HUMAN-REVIEW FLAG (ambiguous current_state). This ADR is a Wave 0 spike
  EVIDENCE record, not a standing decision: the architecture authority it
  validated is owned by ADR-0147. Two closed-set states are defensible —
  historical_evidence ("explains why the system evolved; governs nothing now",
  which fits a spike that justified a later decision) and remediation_record
  ("captures cleanup work or review findings"). historical_evidence is chosen
  because the content is feasibility evidence for an evolution step, not a
  cleanup/review finding. Under that state the policy requires active_guidance to
  be EMPTY, which it is. decision_type architecture_principle is recorded only to
  satisfy the required field at an allowed L0 altitude (a spike has no native
  decision_type in the taxonomy); the spike validated an architecture-authority
  principle. A human should confirm historical_evidence vs remediation_record and
  whether a non-leaking decision_type better fits a spike-result record.
