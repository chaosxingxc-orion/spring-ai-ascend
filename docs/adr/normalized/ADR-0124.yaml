clean_decision_summary: |
  Establish three tenant-scoped public SPI boundaries in agent-middleware —
  VectorStore, Retriever, and EmbeddingModel — so retrieval-augmented generation
  becomes a first-class platform extension seam that decorates the canonical
  Spring AI types rather than forcing consumers to bypass the platform. The
  governing outcome is the three SPI boundary identities and their tenant-scoped,
  pure-Java, decorator posture; the concrete method signatures and value-type
  records are contract/L2 detail owned by the contract schema and generated facts.

active_guidance:
  - "VectorStore, Retriever, and EmbeddingModel are three sibling public SPI boundaries in agent-middleware (vector.spi / retrieval.spi / embedding.spi), each a tenant-scoped extension seam for RAG."
  - "All three SPIs are tenant-scoped (carry tenantId per Rule R-C.c) and are blocking / pure-Java at the public boundary; asynchronous or reactive provider bindings live behind adapters and do not leak into the public SPI."
  - "The three SPIs decorate the canonical Spring AI types (the platform-decorates-Spring-AI boundary of ADR-0125); they are the low-level RAG pipeline primitives that the M5 KnowledgeMemoryStore taxonomy entry (ADR-0123) composes."

non_authoritative_legacy_content:
  - "Concrete method signatures on the three SPIs (add/delete/similaritySearch, retrieve, embed/embedAll/modelVersion) and their value-type records (Document, VectorMatch, VectorQuery, RetrievedDocument, RetrievalOptions, Embedding) — contract/L2 surface detail owned by docs/contracts/vector-store.v1.yaml (design_only) and the generated code-symbol facts, not by this L1 decision."
  - "Named Wave C1 Spring AI adapter classes (SpringAiVectorStore, SpringAiDocumentRetriever, SpringAiEmbeddingModel) and the specific HookPoint binding names (BEFORE_MEMORY / AFTER_MEMORY) — L2 implementation detail."

