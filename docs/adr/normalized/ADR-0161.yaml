review_notes: >-
  Decision is made at L1 (the EngineeringFrame boundary definition is thickened
  to a package-cluster anchor and bound to a readable card) and affects L1, the
  DSL graph (two new required profile properties), the facts lane (the card cites
  generated fact IDs and sits at the lowest interpretation tier of the ADR-0154
  cascade), and the gate (the new G-29 frame-card/DSL-parity rule). decision_type
  engineering_frame_boundary is in-altitude for L1; naming a package root and the
  public boundary of a frame is defensible at L1, and the heavy type/method/
  test inventories are explicitly pushed DOWN to the Card + generated facts +
  L2, not promoted to L1/DSL. current_state is active_guidance: ADR-0161 is
  current authority and nothing supersedes it; it REFINES (does not repeal)
  ADR-0157. The L0/L1-leaked runtime detail flagged for L2 migration
  (method call chains, runtime sequences, SQL/RLS/GUC, HTTP behaviour, filter
  ordering, wire formats, method signatures, test-class inventories) is recorded
  in the raw ADR as forward L2 work, not as content this view owns.
