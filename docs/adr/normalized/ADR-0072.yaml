review_notes: |
  current_state = partial_guidance: the engine-boundary SPI identity still
  governs at L1, but the raw ADR is dense with L2 leakage (executor method
  signatures, dispatch-site line numbers, record component counts, the
  transitional agent-runtime/engine/ home) that is no longer current authority
  and is captured under non_authoritative_legacy_content per the 2026-05-29
  layer-purity verdict. The Java engine types (EngineRegistry / EngineEnvelope /
  ExecutorAdapter) are not yet materialized as code-symbol facts (design phase),
  so no code-symbol fact_ref is cited — citing one would invent an id. The raw
  ADR's own prose notes the engine surface home is "transitional"; the current
  home is a later decision in this authority chain and a generated fact, not
  re-asserted here. Human review: confirm the L1 (not L0) decision_level for a
  public-SPI-surface decision that fills an engine-contract gap.
