adr: ADR-0126
raw_path: docs/adr/0126-planner-spi.yaml
current_state: partial_guidance

# Declaring a module's public Planner SPI as a boundary identity is an L1
# decision (public_spi_surface is DEFENSIBLE at L1). The raw ADR labels itself
# L0/development because it fills an L0 contract gap; the DECISION altitude is L1.
decision_level: L1
affected_levels:
  - L0
  - L1
  - L2
  - contract
  - facts
view: development
decision_type: public_spi_surface

clean_decision_summary: |
  There is a public Planner SPI: a Planner produces a Plan as a DAG (steps,
  dependencies, branch points, loop annotations) from a planning request, and
  this planner OUTPUT is distinguished from the per-step scheduler INPUT carried
  by plan-projection.v1.yaml. The Plan is the source; a per-step projection is
  derived from it. The SPI's home is the engine side (the engine consumes the
  Plan); the cross-cutting model / skill / memory primitives stay in middleware.
  The surface is design_only — a fixed output target for the future planner
  implementer and a typed input for scheduler admission.

active_guidance:
  - "The Planner SPI is a named public boundary identity — a planner emits a Plan DAG, and that planner output is contractually distinct from the scheduler-input projection (plan-projection.v1.yaml); one is the source, the other is derived per-step."
  - "The boundary's home is engine-side (the engine consumes the Plan); this extends, and does not supersede, the prior planner-taxonomy decision, and the projection contract is unchanged."
  - "The surface is design_only — it exists as a contract target, not a shipped implementation."

non_authoritative_legacy_content:
  - "The full record-field enumeration and method signatures in the raw ADR (the planning-request / plan / step / branch / loop record components, the reactive plan method shape, the sealed result variants). L2 design detail owned by the L2 design and the contract schemas, not by this boundary decision."
  - "The constructor-level invariants (blank-id rejection, duplicate-step rejection, dependency-cycle rejection, budget bounds). These are L2 / TCK-level validation detail, not an L1 boundary clause."
  - "The design_only status label expressed as a version marker; the live status is carried by the contract YAML headers and the generated facts, not by this ADR's version tag."

