current_state: partial_guidance
decision_level: L1
affected_levels: [L1, L2, contract, facts]
view: logical
decision_type: module_responsibility

clean_decision_summary: >-
  Splits the kitchen-sink "engine adapter" layer of the agent-service 5-layer L1
  model into two cohesive sub-layers -- 5a Engine Dispatch & Execution (engine
  registry + executor adapters + hook-surface emission, on the engine-contract
  change cadence) and 5b Translation & Tool-Intercept (context projection, prompt
  template, structured-output conversion, chat advisor, on the Spring AI change
  cadence) -- and moves the runtime-middleware responsibility EXCLUSIVELY into the
  Layer 4 control layer, removing its double-homing. This partially supersedes the
  prior 5-layer ratification's Layer 5 responsibility list while leaving that
  ADR's other ratifications in force. The standing decision is the cohesive split
  + single-home middleware; the diagram-rendering guidance and the concrete
  package mapping are L2 realisation.
active_guidance:
  - >-
      Layer 5 splits into two cohesive sub-layers on different change cadences: 5a
      Engine Dispatch & Execution (engine registry resolution + executor-adapter
      implementations + hook-surface emission into the Layer 4 hook chain; engine-
      contract evolution cadence) and 5b Translation & Tool-Intercept (context
      projection + prompt template + structured-output conversion + chat advisor /
      advisor chain; Spring AI evolution cadence). Each sub-layer owns a bounded
      set of responsibilities so a refactor inside it can be reasoned about
      locally.
  - >-
      Runtime-middleware ownership is unambiguous and single-homed in the Layer 4
      control layer: 5a emits hook-point events INTO Layer 4, whose middleware
      chain consumes them; 5a does not directly invoke runtime middleware and 5b
      does not mention it. Double-homing the same component across two layers is
      the low-cohesion fingerprint this closes.
  - >-
      This refines (partially supersedes) only the prior 5-layer ratification's
      Layer 5 responsibility list; that ADR's other ratifications (the tenant-
      first execution-request, the three-track bus binding for the queue layer,
      the overall 5-layer structure) remain in force.
non_authoritative_legacy_content:
  - >-
      The concrete sub-package mapping quoted inline (5a under an engine-adapter /
      engine-spi home; 5b under a session-spi + integration home) is L2 realisation
      detail owned by the layer-vs-package matrix and the generated code facts;
      per the raw ADR's own post-decision audit note the shipped executors do NOT
      live under the declared 5a engine-adapter home, so the boundary is doc-only
      at code level until a follow-up impl wave relocates them or amends the
      mapping -- the generated facts win on the actual location.
  - >-
      The diagram-rendering guidance (present five numbered layers with Layer 5
      visibly split into 5a/5b sub-blocks; the asymmetry caveats) is L1/L2 view-
      presentation detail owned by the agent-service logical + development view
      documents, not standing L1 contract authority.
  - >-
      The low-cohesion defect-family framing (the lead occurrence and the family
      registration) is recurring-defect-families ledger content, not standing
      architecture authority.
