review_notes: >-
  Decision is made at L0 (a governance invariant ratcheting a corpus-wide rule
  to blocking) and affects L1 (the Feature Registry surface), the DSL graph
  (features.dsl), and the gate. current_state is unambiguous: the .a blocking
  flip is current authority and nothing supersedes ADR-0153. Sub-clauses
  .b/.c/.d are explicitly still-advisory forward work, recorded as such in the
  raw ADR, not as superseded content.
