review_notes: >
  Layer-purity reclassification (the core of this normalization): the raw ADR labels
  itself level L0, but a public-SPI-surface decision is a FORBIDDEN lower-altitude
  leak at L0 and is DEFENSIBLE at L1 (adr-taxonomy). The normalized decision_level is
  therefore L1 (public_spi_surface), with L0 retained in affected_levels because the
  decision closes an L0 agentic-primitive contract gap. The method signatures and
  record field lists are pushed to non_authoritative_legacy_content (L2/contract).
  Facts-discrepancy flagged (not re-litigated): the raw package home
  (service.runtime.memory.spi) does NOT match the realized facts
  (middleware.memory.spi.*) — generated facts win; the reconcile/ledger step should
  record the stale-package fact. AMBIGUITY FLAGGED FOR HUMAN REVIEW: the raw ADR is
  marked design_only at rc44; if the implementation status has since changed, the
  active/legacy split above (which treats the boundary identity as governing and the
  signatures as lower-level) should be re-confirmed. current_state is partial_guidance.
