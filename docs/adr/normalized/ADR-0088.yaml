review_notes: |
  Classified active_guidance: the dissolution and the six-module narrative are
  current governing authority and nothing supersedes ADR-0088. It is itself the
  superseding decision for ADR-0079 (re-stated in supersedes, not minted — the
  raw ADR and adrs.json both carry the edge).

  decision_level L0 / decision_type cross_module_policy: the decision is a
  cross-module structural redistribution + the L0 module-count narrative — an L0
  governing-policy altitude. Per the taxonomy, naming the destination packages
  (bus.spi.s2c, engine.orchestration.spi) as boundary identities is defensible;
  the file-move mechanics are L2 and were pushed to non_authoritative_legacy_content
  rather than carried as current authority.

  Note on downstream re-homing: ADR-0158 later re-homes EF-ORCHESTRATION-SPI to
  agent-bus (bus.spi.engine) and adds EF-ENGINE-PORT. That is a FORWARD evolution
  of the boundary, not a supersession of ADR-0088's dissolution decision; the two
  are compatible and ADR-0088 remains active_guidance for the module-narrative and
  semantic-home rules.
