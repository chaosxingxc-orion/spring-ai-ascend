decision_type: cross_frame_contract

clean_decision_summary: |
  Specify the tool-call iteration loop as a cross-frame composition contract over
  the ModelGateway SPI, the Planner SPI, and the Agent entity. Two mutually
  exclusive execution modes exist — model-driven iteration (the ModelGateway owns
  the loop) and planner-driven dispatch (the Planner's plan DAG owns iteration) —
  and each agent selects exactly one. The governing outcome is the two-mode
  composition contract and its per-agent selection; the concrete loop step
  sequences, enum values, caps, and metadata-key spellings are contract/L2 detail.

active_guidance:
  - "Tool-call iteration has exactly two mutually exclusive modes: model-driven iteration (the ModelGateway owns the loop) and planner-driven dispatch (the plan DAG owns iteration). They are alternatives selected per agent, NOT nested patterns."
  - "Each Agent selects exactly one mode; model-driven iteration is the default. The selector lives in the existing Agent metadata map, requiring no schema change."
  - "Model-driven iteration is bounded by a configurable maximum-iteration cap whose exhaustion short-circuits the loop as a terminal error-equivalent reason; provider-native finish strings are parsed to the canonical finish-reason taxonomy at the adapter boundary and unknown strings fail fast rather than flowing through the loop."

non_authoritative_legacy_content:
  - "The step-by-step loop sequences for each mode (invoke -> dispatch ToolCall -> append ToolResultMessage -> re-invoke; plan -> dispatch plan.steps by dependency graph) — runtime-sequence / L2 detail owned by architecture/docs/L2 and the contract supplement, not by this L1 decision."
  - "Concrete enum values and literals (ModelFinishReason TOOL_CALLS/STOP/LENGTH/CONTENT_FILTER/OTHER; default cap = 10 turns; the message-accumulation order prior_messages + assistantTurn + toolResultMessages) — contract/L2 detail owned by docs/contracts/model-invocation.v1.yaml."
  - "The exact metadata-key spellings (tool-call-loop-mode, tool-call-loop-max-iterations) and the design_only / runtime_enforced:false status markers — contract-surface detail owned by the model-invocation contract supplement and the generated facts."

