review_notes: >
  current_state is partial_guidance because the raw ADR mixes an actively
  governing L0 security constraint (both cross-plane envelopes must carry an
  application-layer sender-identity proof) with contract/L2-lane detail (the
  concrete envelope schema, HTTP 401 status and reason codes, MDC field list, and
  the numbered runtime validation sequence) that is leaked at L0 per the
  2026-05-29 layer-purity verdict and properly owned by the contract / L2 lanes.
  The security constraint itself is unsuperseded and extends ADR-0074 (S2C) and
  builds on ADR-0089 (ingress boundary). AMBIGUITY FLAG for human review: the raw
  ADR references docs/governance/key-distribution.yaml as a later-wave deliverable
  that may not yet exist, and the design_only -> runtime_enforced promotion is
  gated on later security waves; whether the runtime enforcement has shipped
  should be confirmed against the live contract catalog before this view is cited
  as runtime authority.
