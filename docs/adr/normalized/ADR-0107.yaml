contract_refs: []
# No realized fact: RunRegistry is forward-looking (W3 federation wave). fact_refs
# stays empty by design — the ledger mints no fact id the extractor has not emitted.
fact_refs: []
gate_refs: []

review_notes: >
  current_state is partial_guidance: the L0 trust-model boundary governs now, while
  the SPI method detail is forward-looking and deferred — a clean split into
  active_guidance vs non_authoritative_legacy_content. Layer-purity note: naming the
  RunRegistry SPI as a boundary identity is DEFENSIBLE at L0/L1, but the raw body's
  method signatures + overflow/error-path/MDC detail are L2/contract leakage and are
  recorded as non-authoritative here. Authority-cascade note for reconcile: there is
  NO RunRegistry code-symbol in architecture/facts/generated/code-symbols.json (the
  decision is deferred to the federation wave), so fact_refs is correctly empty; do
  not mint a fact id. The raw ADR also references ADR-0101 for the bus.spi.federation
  package home — that placement claim should be re-verified against the live facts
  before the federation-implementation ADR cites it as realized.
