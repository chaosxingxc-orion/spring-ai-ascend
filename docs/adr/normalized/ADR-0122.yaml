  - L1
view: scenarios
decision_type: architecture_principle

clean_decision_summary: |
  Resolve the Tool-vs-Skill semantic ambiguity by adopting one unified Skill SPI
  with a platform lifecycle, where "Tool" is one SkillKind enum value rather than
  a separate sibling SPI. There is ONE Skill registry, ONE capacity-arbitration
  surface, and ONE sandbox; the SkillKind discriminator drives policy (e.g.
  untrusted kinds route through the sandbox). A provider tool callback adapts to
  the unified Skill via an adapter whose kind() returns TOOL. The standing
  decision is the single-Skill-SPI semantic resolution; the concrete enum body,
  package paths, and wave staging are realisation detail.

active_guidance:
  - "There is ONE unified Skill SPI (platform lifecycle: init / execute / suspend / teardown) covering both LLM-callable tools and long-running workflow steps; 'Tool' is a SkillKind enum value, not a separate Tool SPI."
  - "There is ONE Skill registry (indexed by tenant + skill key), ONE capacity-arbitration surface, and ONE sandbox; no second registry / capacity / sandbox surface is introduced. The SkillKind discriminator drives policy decisions."
  - "Untrusted skill kinds MUST route through the sandbox executor SPI; other kinds bypass it. The kind discriminator replaces the need for a separate skill-trust-tier taxonomy."
  - "A provider (Spring AI) tool callback is adapted to the unified Skill via an adapter whose kind() returns TOOL — it is ONE Skill adapter, not a parallel surface. SkillKind is a CLOSED set on the platform side; adding a kind requires an ADR amendment (open enums would defeat type-safe sandbox routing)."
  - "Where the pre-existing Skill SPI lifecycle design diverges from this decision text, this decision wins (it consolidates the earlier Skill-SPI design)."

non_authoritative_legacy_content:
  - "The concrete SkillKind enum body (the specific TOOL / BUILTIN / AGENT_AS_TOOL / MCP_SERVER / UNTRUSTED_TOOL / UNTRUSTED_CODE members) and the fully-qualified package paths (com.huawei.ascend.skill.spi.Skill / SkillRegistry, the SpringAiToolCallbackSkill adapter class) are L1 public-SPI-surface / L2 class-anchor detail owned at L1 + the generated code-symbol facts, NOT L0 authority."
  - "The wave-tagged staging (this decision LANDS in Wave A3 / rc43; the Skill SPI ships in Wave B2 / rc44+; the adapter ships in Wave C1) is release scheduling owned by release notes / the plan file."
  - "Adapter no-op / UnsupportedOperationException residual-behaviour notes are L2 implementation detail documented in the SPI package-info, not standing L0 authority."

