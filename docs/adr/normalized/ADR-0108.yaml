review_notes: |
  AMBIGUOUS current_state — flagged for human review. The raw ADR carries an
  explicit 'Current shipped state (rc34)' caveat (cross-tenant access then
  collapsed into not-found) that DIVERGES from the governing direction
  (tenant-mismatch rejection at the W1 milestone). Two defensible readings:
    (a) active_guidance — the invariant is current authority and the not-found
        shipped behaviour is merely implementation timing within the same decision;
    (b) partial_guidance — the not-found shipped state is live behaviour that the
        decision explicitly marks as the W1 widening DIRECTION, so part of the ADR
        is forward-looking and the shipped-state block is non-authoritative.
  This view chooses partial_guidance and quarantines the shipped-state block under
  non_authoritative_legacy_content, so a reviewer cites the ADR only through the
  active_guidance invariant. A human owner should confirm whether the W1 cutover
  has shipped (it would flip this view to active_guidance with no legacy content)
  by checking docs/governance/architecture-status.yaml#tenant_reauth_widening.

  decision_level L0 / decision_type cross_module_policy: a cross-module runtime
  security invariant spanning the HTTP edge, background consumers, and the graph
  store. Controller/method anchors in the raw body are L2 leakage and were pushed
  to non_authoritative_legacy_content rather than carried up.
