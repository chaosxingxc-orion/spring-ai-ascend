  - L1
  - contract
view: process
decision_type: cross_module_policy

clean_decision_summary: |
  Tenant re-validation is the runtime invariant for EVERY Run-scoped surface, not
  just cancel: any path resolving a Run by id (read, resume, cancel, and
  background consumers such as the resume tick, the S2C-callback receiver, and the
  watchdog) MUST re-validate that the requesting tenant matches the Run's tenant
  and reject a mismatch (rejecting with the tenant-mismatch outcome rather than a
  not-found existence oracle), emitting a structured warn-level audit record on
  the rejected-on-mismatch path. Separately, every GraphMemoryRepository traversal
  MUST accept a tenant id and enforce isolation at the query surface, with each
  adapter declaring exactly one of three named isolation strategies
  (predicate-injection, label-namespacing, or database-isolation) in module
  metadata.

active_guidance:
  - "Tenant re-validation is generalised from cancel-only to EVERY /v1/runs/{runId}/... path AND to background consumers that resolve Runs by id; a tenant mismatch is rejected (not collapsed into a not-found existence oracle) so the timing/idempotency side-channel is removed."
  - "Rejected-on-mismatch audit shape: a warn-level tenant_mismatch record over a common base { surface, reason, occurredAt } plus message-specific { runId, expectedTenant, actualTenant }; this common base is shared with sibling reject-on-mismatch families (ADR-0053 / ADR-0107 / ADR-0109)."
  - "GraphMemoryRepository tenant-scoped traversal: every find/query method accepts a tenant id and enforces scope at the QUERY surface; each concrete adapter declares exactly one named isolation strategy (predicate_injection | label_namespacing | database_isolation) in module-metadata; an ArchUnit contract test asserts a non-null strategy."

non_authoritative_legacy_content:
  - "The 'Current shipped state (rc34)' block in the raw ADR records that the live controller then collapsed cross-tenant access into not-found (legacy architect-guidance behaviour). That shipped state is a point-in-time snapshot, NOT the governing direction; the governing invariant is the tenant-mismatch rejection described in active_guidance, with cutover at the named W1 milestone."
  - "Concrete controller/method anchors and the findById-then-compare ordering in the raw decision body are L2 implementation detail and are not normalized-view authority."

