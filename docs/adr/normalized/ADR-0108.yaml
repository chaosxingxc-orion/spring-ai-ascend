# Normalized ADR view — readable-interpretation layer over the raw ADR.
#
# Authority: ADR-0160 (ADR Governance Model). This view re-states and curates;
# it invents no ADR ids and no relationships and never outranks a generated
# fact. Authority cascade: generated facts > DSL > Card/prose. Schema pinned by
# docs/governance/adr-governance-policy.yaml + docs/governance/adr-taxonomy.yaml,
# enforced by Rule G-28. UTC date for any date field (Rule G-9.a).

adr: ADR-0108
