adr: ADR-0133
raw_path: docs/adr/0133-conversation-memory-spi-variant.yaml

# partial_guidance: the conversation-memory boundary identity (a platform-owned
# windowed-conversation variant of MemoryStore that preserves the decoration
# boundary instead of exposing a provider type) still governs; the method
# signatures, carrier record field lists, and pruning-algorithm wording are
# L2/contract detail and now lower-level.
current_state: partial_guidance

# Decided at L1: a public SPI surface (a platform-owned memory variant boundary),
# even though the raw ADR labels itself L0 — the SPI-surface decision belongs at L1.
decision_level: L1
affected_levels:
  - L0
  - L1
  - L2
  - contract
  - facts
view: development
# Naming a public SPI variant as a boundary identity is DEFENSIBLE at L1; it is a
# forbidden lower-altitude leak at L0 (adr-taxonomy). Hence decision_level L1.
decision_type: public_spi_surface

clean_decision_summary: >
  The most common chat-application need — remember the last N turns, prune by token
  budget, optionally summarise older context — gains a platform-owned ConversationMemory
  SPI as a variant of the unified MemoryStore (keyed by an opaque conversation id,
  valued by an ordered conversation window, defaulting to the episodic category). It
  gives Audience B the same ergonomics as the provider's chat-memory type WITHOUT
  coupling to that provider type, preserving the platform decoration boundary. Token
  budgeting (drop oldest first) and an optional summarise-and-compact operation are
  part of the contract, not per-application code; the tokenizer choice is left
  implementation-internal. The machine-readable shape lives in a conversation-memory
  section of the memory-store contract surface.

active_guidance:
  - >
    The conversation-memory boundary identity is the governing decision: a platform-
    owned ConversationMemory variant of MemoryStore (keyed by an opaque conversation
    id, valued by an ordered conversation window, defaulting to the episodic
    category). Audience B writes against this platform SPI, NOT the provider's
    chat-memory type — preserving the decoration boundary. Re-exporting the provider
    type directly was rejected.
  - >
    Token-budget pruning (drop OLDEST first) and the optional summarise-and-compact
    operation are first-class CONTRACT concerns, not per-application code. A free-form
    window with caller-side policy was rejected (it duplicates windowing/budget/
    summarisation logic and leaves the tokenizer choice implicit).
  - >
    Every operation is tenant-scoped and fails closed on a blank tenant or
    conversation id before any backing-store I/O. The tokenizer choice is deliberately
    implementation-internal (the SPI does not standardise the counter), so cross-
    implementation deterministic replay is NOT guaranteed at the boundary.

non_authoritative_legacy_content:
  - >
    The method signatures (the add-turns / get-turns-up-to-budget / summarise-and-
    compact shapes and their parameter/return types) and the precise no-op/ordering
    wording are L2/contract detail; the conversation-memory section of the memory-
    store contract surface and the live code-symbol facts own those, not this ADR.
  - >
    The carrier record field lists (the conversation-window and conversation-turn
    record shapes, their defensive-copy behavior, the role/content/observed-at/
    token-count fields) are L2/contract detail owned by the contract + facts.
  - >
    The point-in-time status wording (design_only at landing; the parity-consolidator
    wave that lands the catalog row / module-metadata reference / DFX update; the
    vacuous examples/** ArchUnit guard) is a roadmap snapshot, not governing content.

