review_notes: >
  Layer-purity note: this ADR is decided at L1 (the Runtime/engine middleware
  boundary, a public SPI identity, which is DEFENSIBLE at L1) but its raw body
  carries substantial L2 leakage — method signatures, the SyncOrchestrator call
  chain, runtime outcome sequences, and a named test inventory. Those clauses are
  recorded as non_authoritative_legacy_content; the live class/method/test facts
  and L2 docs own that detail. Authority-cascade discrepancy to reconcile (not
  re-litigated here): the package homes in the raw decision do not match the
  realized facts (HookPoint/RuntimeMiddleware now in middleware.spi, EngineRegistry
  in engine.runtime, EngineHookSurface in engine.spi) — the generated facts win.
  current_state is unambiguous (partial_guidance); flagged here only so the
  reconcile/ledger step records the stale-package and stale-rule-number facts.
