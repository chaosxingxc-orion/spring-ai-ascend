  reaching for the provider type or the gate-private hook dispatcher). The
  SPI-shape / contract / sequence detail is recorded as
  non_authoritative_legacy_content and cross-referenced to
  docs/contracts/chat-advisor.v1.yaml + L1. A human should decide whether the raw
  ADR ought to be reclassified to L1 (decision_type public_spi_surface) with the
  decoration principle hoisted to a sibling L0 note; until then the L0 view is
  citeable only through the decoration-boundary clauses. current_state
  active_guidance: the decoration boundary governs today even though the SPI is
  design_only. superseded_by / supersedes empty (raw declares only relates_to; no
  supersession edge in the fact layer).
