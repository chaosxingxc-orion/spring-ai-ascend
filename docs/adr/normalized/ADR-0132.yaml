clean_decision_summary: |
  Give application developers a platform-owned around-call interceptor seam (a
  ChatAdvisor) that decorates model invocations, instead of forcing them to
  either reach for the provider's advisor type directly (which breaks the
  Spring-AI-is-canonical / platform-decorates boundary) or reach for the
  gate-private engine hook dispatcher (which must NOT be public). The standing
  governing principle is the DECORATION BOUNDARY: a tenant-scoped, ordered,
  platform-owned advisor chain wraps the model gateway; the hook dispatcher stays
  platform-internal. The concrete advisor interface shape and its value records
  are the L1/contract realisation (a design-only contract surface), not the L0
  boundary decision.

active_guidance:
  - "The platform exposes a platform-owned around-call advisor seam that decorates model invocation for the application-developer audience; developers compose advisors at agent-definition time and never import the gate-private engine hook dispatcher."
  - "Decoration boundary: the provider (Spring AI) is canonical and the platform DECORATES it; the application audience writes against the platform advisor SPI, not against the provider's advisor type, preserving the integration boundary."
  - "The advisor chain is tenant-scoped (the advised request/response carry a non-blank tenant id) and ordered (a stable order() determines inbound execution); an advisor may short-circuit by returning a synthetic response (policy denial, cache hit, redaction)."
  - "The engine hook dispatcher remains platform-internal; the BEFORE_LLM / AFTER_LLM hook brackets bound the advisor chain but hooks are not part of the public audience surface (keeping hook-granularity changes from becoming contract-breaking events)."

non_authoritative_legacy_content:
  - "The concrete advisor INTERFACE SHAPE (advisorName / order / aroundCall(AdvisedRequest, AdvisorChain); the StreamingChatAdvisor.aroundStream sibling; the AdvisorChain.next / StreamingAdvisorChain.proceed signatures) and the package home (com.huawei.ascend.middleware.advisor.spi.*) are L1 public-SPI-surface / contract detail owned at L1 + docs/contracts/chat-advisor.v1.yaml, NOT L0 authority."
  - "The value-type record inventory (AdvisedRequest / AdvisedResponse / AdvisedModelRequest / AdvisedMessage / AdvisedToolCall / AdvisedUsage / AdvisedFinishReason / AdvisedModelResponse / AdvisedStreamChunk and its sealed variants) is L2 / contract envelope detail owned by the contract surface and the generated facts."
  - "The W2 hook-binding RUNTIME SEQUENCE (the advisor-model-hook-order/v1 step order: translate ModelInvocation -> AdvisedRequest, fire BEFORE_LLM, run chain, invoke terminal gateway, outbound transforms, translate back, fire AFTER_LLM) is an L2 runtime-sequence owned at L2; the standing L0 decision is the decoration boundary, not the sequence."
  - "design_only / runtime_enforced staging notes, the vacuous-until-examples ArchUnit guard, and the catalog/module-metadata/DFX follow-up are wave/process detail owned by release notes and the gate surfaces."

