review_notes: |
  Lane: L3-L0ARCH (ADR-0159). LAYER-PURITY FLAG for human review: the raw ADR
  self-labels level: L0 but its decision block is dominated by an L1
  public-SPI-surface + contract + L2 runtime-sequence payload (interface
  signatures, a record inventory, a step-ordered hook-binding sequence). This is
  the "L0 contains L1/L2 detail" leakage adjudicated TRUE in the 2026-05-29
  remediation review. I have kept decision_level L0 (honouring the raw self-label)
  and chosen decision_type architecture_principle — the genuinely L0-altitude
