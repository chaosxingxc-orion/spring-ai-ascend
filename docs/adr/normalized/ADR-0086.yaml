review_notes: |
  current_state = partial_guidance: the namespace scheme and the
  gate_layer_boundary invariant are live governing policy (the whole rule corpus
  is addressed by D-/R-/G-/M- ids today), but the raw ADR carries a large
  point-in-time migration narrative (execution_status waves, removed transitional
  gates, byte/rule/citation counts) that is no longer current authority and is
  recorded under non_authoritative_legacy_content. supersedes (ADR-0083/0084/
  0085) is re-stated verbatim from the fact layer. l0_constraint_refs lists
  P-A..P-M because the R- namespace pairs one rule to each governing principle;
  this is a structural re-statement, not a minted edge. Gate-layer numeric rule
  ids referenced (rule_101) are intentionally numeric per the gate_layer_boundary
  this ADR itself establishes.
