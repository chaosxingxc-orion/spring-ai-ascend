review_notes: >
  Layer-purity: correctly L0 — a meta-rule about how the rule corpus is governed
  (prevention-rule scope completeness) plus a logs-folder exemption policy; no
  class/method/sequence leakage. The legacy here is TIME-state: the numeric Rule
  107-110 / E152-E155 identifiers and count deltas predate the ADR-0086 namespace
  ratchet, and the per-finding rc15 edit list (and its CLAUDE-deferred.md targets,
  retired by ADR-0156) is point-in-time remediation bookkeeping. AMBIGUITY FLAGGED
  FOR HUMAN REVIEW: this ADR is umbrella-shaped — its dominant durable contribution
  is the META governance_invariant (Rule 110), but it also ships three concrete
  enforcement rules (107/108/109) that read as decision_level=gate. The view models
  it under the single dominant decision_type governance_invariant and records the
  three enforcement rules in gate_refs; if the reconcile/ledger step prefers to split
  the enforcement-rule facet to a gate-level classification, that is a defensible
  alternative. current_state is unambiguous (partial_guidance).
