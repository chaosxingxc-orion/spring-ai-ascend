current_state: partial_guidance
decision_level: L1
affected_levels: [L1, L2, contract, facts]
view: development
decision_type: public_spi_surface

clean_decision_summary: >-
  Lands a generic structured-output-converter as a public SPI boundary identity in
  the middleware module: a pure-Java, type-parameterised converter that turns a
  model response into a typed value and supplies the prompt-fragment instructions
  the caller appends so the model emits parseable output, with the canonical
  Spring AI bean converter as the reference adapter source (confined to the
  integration package). The boundary lets customers ship custom converters
  without touching Spring AI. The standing decision is the converter boundary
  identity + its two-method contract shape + SPI purity; the exact signature,
  consumer-composition snippet, and design_only status are L2 / contract detail.
active_guidance:
  - >-
      The structured-output-converter boundary identity is the governing decision:
      ONE generic, type-parameterised converter SPI is the platform's L1
      abstraction for typed model output, so consumers do not each roll an ad-hoc
      parser against raw model content and adapters do not each wire Spring AI
      directly. Customers ship custom converters (alternative serialisation formats
      or custom DSLs) by implementing it.
  - >-
      The two-method contract shape is part of the boundary identity: a convert
      operation that parses the model response into the target type (failing on
      unparseable content) PLUS a format-instructions operation that returns the
      prompt fragment the caller appends so the model emits parseable output. The
      instructions half is what makes structured output reliable; omitting it is
      rejected, as is a non-generic untyped shape.
  - >-
      The SPI is pure Java (JDK imports only; no Spring AI types in the contract
      surface) per the SPI-purity discipline; the canonical Spring AI bean
      converter is wrapped by a reference adapter in the integration package.
non_authoritative_legacy_content:
  - >-
      The exact interface signature, the consumer-composition snippet (append
      instructions, invoke gateway, convert response), and the streaming-aware
      conversion deferral are L2 / contract realisation detail; the structured-
      output contract surface and the live code-symbol facts own those, not this
      ADR.
  - >-
      The design_only-at-landing / runtime-enforced-when-the-runtime-gateway-wave-
      wires-it status and the reference-adapter shell behaviour (deferring the
      provider FQN binding, throwing until the runtime wave) are status /
      sequencing detail owned by the contract surface and release notes, not
      standing L1 authority.
