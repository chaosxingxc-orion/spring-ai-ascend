review_notes: |
  Classified active_guidance: the five-layer ratification, the cross-walk table,
  the lifecycle hierarchy, and the four red-line invariants are current governing
  L1 authority for agent-service; nothing supersedes ADR-0138. Later ADRs
  (ADR-0140 layer split, ADR-0141 queue design-only, ADR-0142 Run-aggregate owner,
  ADR-0144 layer-vs-package matrix, ADR-0155 internal module design) EXTEND this
  decomposition rather than replace it.

  decision_level L1 / decision_type module_responsibility: the decision allocates
  module-internal responsibilities and frame boundaries within agent-service — an
  L1 altitude. The red lines reference L0 cross-cutting rules (cited in
  l0_constraint_refs as affected, not as the decision's own altitude).

  Layer-purity discipline applied: the red lines are stated at invariant altitude
  (presence of a guard / a field / a routing intent), NOT as method call chains,
  SQL, HTTP status numbers, or filter ordering. The concrete sub-package paths and
  the F-01..F-22 inventory are L2 and were pushed to non_authoritative_legacy_content.
