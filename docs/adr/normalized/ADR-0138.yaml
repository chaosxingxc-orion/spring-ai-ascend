clean_decision_summary: |
  Ratify the agent-service L1 logical decomposition as five layers (Access;
  Session & Task Manager; Internal Event Queue; Task-Centric Control; Engine
  Adapter) and bind it by a single canonical cross-walk table to the earlier
  five-component decomposition (Dispatcher / Orchestrator / Task Center / Session
  Manager / Engine Adapter), so the runtime data-flow view and the logical-role
  view are two complementary projections rather than rival authorities. The
  Run <= Task <= Session <= Memory lifecycle is preserved, with tenant id a
  first-class field on every lifecycle entity. Four red-line invariants are
  elevated to ADR level: no tenant-id-less data model; no cancel state machine
  without re-authorization and an atomic compare-and-set write; no single-tier
  internal queue with mode-based durability (the queue is redesigned as a binding
  layer over the canonical three-track bus, routed by intent); and no Fast-Path
  language implying invariant bypass.

active_guidance:
  - "agent-service has one authoritative L1 decomposition: the five layers (Access / Session & Task Manager / Internal Event Queue / Task-Centric Control / Engine Adapter) bound to the five components (Dispatcher / Orchestrator / Task Center / Session Manager / Engine Adapter) by the single cross-walk table; the two are orthogonal views of the same architecture, not competitors."
  - "Lifecycle hierarchy Run <= Task <= Session <= Memory is preserved; all four lifecycle entities carry tenant id as a first-class field across L1, L2, and code surfaces."
  - "Red line: no tenant-id-less data model — any ER block / field table / schema in L1 or L2 surfaces MUST declare tenant id first-class on the Run / Task / Session / lifecycle-state / state-store entities."
  - "Red line: every cancel state machine MUST carry the tenant-match guard, the terminal->terminal success path, the illegal-transition rejection path, and the atomic compare-and-set write site (no blind status overwrite)."
  - "Red line: the Internal Event Queue is a binding layer over the canonical three-track bus (control / data / rhythm), routed by intent (cancel/resume -> control; payload / S2C response -> data; heartbeat / tick -> rhythm); the in-memory/semi-persistent/persistent durability axis is eliminated and durability is a per-channel property."
  - "Red line: no L1/L2 prose may suggest a Fast-Path that skips tenant id, row-level security, reactive I/O, or the checked-suspension flow (Fast/Slow path semantics narrowed by ADR-0139)."
  - "Access-Layer ingress (A2A service + MQ adapter) lands on the IngressEnvelope contract with no SDK runtime dependency; the Engine Adapter Layer's sub-components map to the shipped SPIs (executor adapter, context projector, prompt template, structured-output converter, chat advisor, runtime middleware hook points)."

non_authoritative_legacy_content:
  - "The raw PR #71 design's four P0 structural defects (tenant-id-less ER, cancel state machine without re-auth/CAS, single-tier queue with 3 storage modes, Fast-Path 'no mandatory persistence' wording) are the corrected-against antipatterns — they are recorded as what this ADR BLOCKS, never as guidance."
  - "Per-sub-package paths and the F-01..F-22 feature inventory rows are L2 design-backlog detail (each row must later carry an authority column); they are not normalized-view authority."

