review_notes: >
  current_state is unambiguous (partial_guidance): the canonical-vocabulary boundary
  governs, while the path/method/decomposition detail is L2 and recorded as
  non-authoritative. Layer-purity note: naming SuspendSignal as the canonical type is
  DEFENSIBLE at L1, but the raw body carries a class FQN path, method names, and an
  enum decomposition (L2 leakage). Authority-cascade discrepancy to reconcile (not
  re-litigated here): the raw ADR cites SuspendSignal at
  agent-execution-engine/.../engine/orchestration/spi/, but the realized fact is
  code-symbol/com-huawei-ascend-bus-spi-engine-suspendsignal (the type was relocated
  to bus.spi.engine by the later engine-boundary work, ADR-0158). The decision content
  (canonical name, no rename) is unaffected; only the location detail is stale, which
  the reconcile/ledger step should record.
