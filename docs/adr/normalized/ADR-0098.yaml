clean_decision_summary: |
  Replace progressive on-demand rule loading with a scenario-loaded phase-contract
  model: six work phases (always-on CLAUDE.md kernel, architecture design,
  engineering implementation, integration verification, system commit, review
  response), each phase backed by a contract document and a triggering skill that
  surfaces the phase's active rules, forbidden patterns, and exit criteria into
  context at phase entry. Loading is dual-track (explicit skill invocation plus a
  CLAUDE.md MUST-invoke directive table). The same wave adds two discipline rules:
  G-10 (every new gate script is parallel-execution-compatible on Linux/WSL) and
  G-11 (phase-contract rule-allocation coherence — every cited rule has a card and
  every active card is cited).

active_guidance:
  - "The six-phase scenario-loaded contract model governs work-phase entry: at phase entry the matching skill / contract MUST be invoked to surface that phase's active rules, forbidden patterns, and exit criteria; the full rule body lives in the rule card, the contract table declares allocation only (no kernel duplication)."
  - "Dual-track loading: an explicit phase skill trigger AND the CLAUDE.md Phase Entry directive table both operate, so the model still works if one path is skipped."
  - "Rule G-10 (Parallel-Linux-Scripts Mandate): every new top-level gate script under gate/ MUST be parallel-execution-compatible on Linux/WSL, with a declared serial-only exemption list."
  - "Rule G-11 (Phase-Contract Rule-Allocation Coherence): forward invariant (every cited rule resolves to a card) and reverse invariant (every active card is cited in >=1 contract); G-9's dual-primary allocation is the SOLE sanctioned dual-P exception."

