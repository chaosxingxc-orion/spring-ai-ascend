review_notes: |
  Classified active_guidance: the phase-contract model and Rules G-10/G-11 are the
  live governance mechanism (CLAUDE.md's Phase Entry table and the
  docs/governance/contracts/ documents are the current operating surface). Nothing
  supersedes this ADR.

  decision_level L0 / decision_type governance_invariant: the ADR is a meta-rule
  about how the team+AI corpus is itself governed (work-time rule loading + two
  discipline rules), which is squarely an L0 governance invariant.

  Raw-ADR rule numbering note: the raw ADR cites gate "Rule 116/117"; those map to
  enforcers E164/E165 and to the G-10/G-11 cards under the ADR-0086 namespace
  ratchet. The numeric gate-rule labels are pre-ratchet and the card slugs (G-10,
  G-11) are the stable identifiers; the reconcile/governance wave owns any gate
