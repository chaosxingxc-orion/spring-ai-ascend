clean_decision_summary: |
  A vocabulary reconciliation for agent-service: a proposal's "Task" is the
  platform's existing Task entity (the scheduling-core / control-state entity),
  not a renamed Run, and no type is renamed and no new Task type is created. The
  Run / Task / Session / Memory four-layer lifecycle hierarchy is reaffirmed as
  canonical, with the compute-execution state machine and the A2A protocol state
  machine kept as distinct concerns. A proposed nine-state expansion of the Task
  lifecycle is rejected in favour of the existing orthogonal state axes. No code
  changes ship; the synonym mapping is documented in prose only.

active_guidance:
  - "The Run / Task / Session / Memory four-layer hierarchy is the canonical lifecycle model for agent-service; Run (compute snapshot) and Task (control state) are deliberately distinct and must not be collapsed by vocabulary drift."
  - "The proposal's vocabulary is a naming-style synonym for the shipped platform vocabulary, not a rename target — shipped names are normative in code, rule kernels, and SPI declarations, while proposal names may appear as documented synonyms in prose."
  - "The compute-execution state machine and the A2A protocol-envelope state machine are distinct concerns and are modelled separately."

non_authoritative_legacy_content:
  - "File paths, line anchors, and call-site counts in the raw ADR (the Java source paths for the Task and Run records, the count of active call sites, rule-anchored CAS-guard line references). L2 detail owned by the L2 design / generated facts, not by this vocabulary decision."
  - "The deferred Javadoc-glossary annotation clause (the specific files to be annotated and the assertion that no signature, field, package, or schema is altered). L2 implementation detail; the binding decision is the vocabulary mapping itself."
  - "The wave-count narrative (the eight-wave-to-six-wave collapse) and the placeholder-slug family-registration note. Point-in-time wave mechanics, not standing authority."

