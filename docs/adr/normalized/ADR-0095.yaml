clean_decision_summary: >
  rc18 comprehensive-hardening wave: five sequential corrective waves under a
  single fixed version closing a post-merge reviewer + multi-agent scan of the
  rc17 deliverables. The headline fix closes the recursive irony where the
  META rule meant to prevent recurring-defect-family recurrence itself
  exhibited the defect patterns it was supposed to prevent; the wave also
  cleans naming/structural drift and normalises enforcer constraint-ref
  namespace mixing. Captured here as governance traceability, not as standing
  architecture authority.

