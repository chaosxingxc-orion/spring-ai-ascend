non_authoritative_legacy_content:
  - >
    The entire wave content is a point-in-time remediation record: the
    five-wave decomposition, the per-commit fix lists, the 21-fixture
    helper-isation deferral and other known-debt entries describe cleanup work
    performed in that wave. None of it is current architecture authority  -  the
    live rule bodies, gate helpers, and recurring-defect-family ledger are the
    authoritative surfaces now.
  - >
    Specific rule numbers in legacy numeric form (Rule 111 / Rule G-9 and the
    Rule 1-110 enumerations) reflect the pre-namespace-ratchet naming; the
    current rule ids are the ones the rule cards and enforcers declare.

