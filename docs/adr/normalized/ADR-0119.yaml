# Normalized ADR view — ADR-0119.
#
# READABLE INTERPRETATION layer over the raw ADR source + its extracted fact
# (architecture/facts/generated/adrs.json). It re-states supersedes/superseded_by
# and curates which clause still governs; it invents no ADR ids and no
# relationships, and it never outranks a generated fact (cascade: generated
# facts > DSL > Card/prose). Schema: docs/governance/adr-governance-policy.yaml
# (required fields + state invariants) + docs/governance/adr-taxonomy.yaml
# (decision-level altitude). Authority: ADR-0160. UTC dates (Rule G-9.a).

adr: ADR-0119
raw_path: docs/adr/0119-single-source-rendering.yaml

current_state: active_guidance
decision_level: L0
affected_levels: [L0, L1, gate]
view: scenarios
decision_type: governance_invariant

clean_decision_summary: >
  Rule G-13 (Single-Source Rendering Coherence) is adopted: every dynamic claim
  in the active corpus (count, path, module name, SPI FQN, ADR id, family id,
  version tag, baseline metric, generated table row) lives in exactly one place —
  an authority source, a deterministically generated artifact, or a rendered slot
  in a template — and no dynamic claim may exist as free-typed prose. The
  corresponding rendered document must be byte-identical to its template render,
  so drift between hand-typed prose and the authority surface it reflects becomes
  impossible by construction rather than detected after the fact.

active_guidance:
  - >
    No dynamic claim may exist as free-typed prose; each lives in exactly one of
    an authority source, a generated artifact, or a rendered template slot.
  - >
    Every rendered document must be byte-identical to render(template, data); the
    gate fails on any drift, including whitespace.
  - >
    Rendering is deterministic (sorted iteration, fixed sort locale, no wall-clock
    or randomness) so the byte-identity contract is reproducible.
  - >
    Every active document is classified into exactly one of three buckets —
    fully-templated (rendered, do-not-edit), hybrid (template file with prose plus
    rendered slots), or inline (authored source-of-truth, never rendered) — in a
    surface-classification registry.

