review_notes: >
  current_state is active_guidance: this is a governance-invariant ADR that adopts
  a still-active rule (Rule G-13), and its non_authoritative_legacy_content is
  empty because the tool-path and enforcer citations are the rule's mechanism
  (DEFENSIBLE at this altitude) rather than leaked L2 detail. The decision_type is
  governance_invariant (a meta-rule about how derived documents are produced),
  allowed at L0. The raw ADR contains a large forward-looking W0..W10 roadmap and
  names future tooling and a set of rules it PLANS to retire at its final wave;
  those are sequencing/forward content, not yet-executed authority, and only the
  W0 policy (the Rule G-13 invariant + classification model) was shipped with this
  ADR. AMBIGUITY FLAG for human review: which downstream rules have actually been
  retired or subsumed (the roadmap lists candidates such as the README/root-doc
