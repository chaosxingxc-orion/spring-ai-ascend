review_notes: >-
  Decision is made at L1 (an EngineeringFrame boundary ontology -- a structural
  contract between Module and FunctionPoint) and affects L1, the DSL graph
  (profile + features.dsl + engineering-frames.dsl), and the gate. decision_type
  engineering_frame_boundary is in-altitude for L1. The re-tag mapping and
  relationship vocabulary are structural identities, not private call chains or
  test inventories, so no L1 forbidden-altitude type is tripped. current_state is
  active_guidance: ADR-0157 is current authority and is later THICKENED (not
  superseded) by ADR-0161; the thickening refines the same ontology. Authority-
  cascade note for reconcile: the ADR's proposed EF- slugs (EF-ACCESS-ADMISSION
  etc.) are NOT the element identifiers realized in
  architecture/features/engineering-frames.dsl (which uses identities such as
  efHookSurface, efCapabilitySpi, efOrchestrationSpi); where they differ the
  generated DSL wins. This view re-states the ADR's intent and flags the slug
  divergence rather than minting either set as authoritative. NOTE: this file was
  re-authored to repair an invalid-YAML construct (a multi-line plain scalar
  containing a colon) in the prior revision; content/state are unchanged in intent.
