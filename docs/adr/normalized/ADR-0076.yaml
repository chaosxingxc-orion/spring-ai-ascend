adr: ADR-0076
raw_path: docs/adr/0076-r2-pilot-runtime-self-validation.yaml

current_state: partial_guidance
decision_level: L0
affected_levels: [L0, L1, L2, contract, gate]
view: process
decision_type: architecture_principle

clean_decision_summary: >-
  Establishes the R2 pattern -- governance-as-runtime-contract -- as a
  first-class technique: a governance / contract YAML that until now was consumed
  only by build-time gate scripts (R1) becomes ALSO a runtime self-validation
  source of truth, loaded at process boot and asserted against the application's
  bean wiring, so a misconfiguration fails the process closed at startup rather
  than surfacing at first request. The standing decision is the R2 pattern itself
  (boot-time fail-closed self-validation of a wiring set against a declared
  contract); the specific boot wiring that piloted it is downstream realisation.
active_guidance:
  - >-
      The R2 governance-as-runtime-contract pattern is durable: a contract /
      governance YAML may be BOTH a build-time gate input AND a runtime
      self-validation source. A runtime registry loads the declared set at boot
      and asserts the live wiring matches it; a mismatch aborts startup
      fail-closed so the process never reaches request-serving state. This is the
      Rule D-5 ship-gate posture applied to a dispatch surface.
  - >-
      Boot-time fail-closed is preferred over deferring the failure to the request
      path: a misconfigured deployment must not pass health checks and accept
      traffic only to fail when a specific tenant submits work that needs the
      missing capability. Validation runs during bean creation so an invalid
      wiring aborts the application context, not a later lifecycle phase.
  - >-
      An exercised integration test that boots the real context is a stronger
      enforcer of runtime wiring than a static file-existence gate scan; the
      self-validation code plus the boot test are the enforcer pair, and a
      structural gate that merely greps for the wiring is redundant duplication.
non_authoritative_legacy_content:
  - >-
      The concrete pilot wiring (the EngineAutoConfiguration boot bean, the
      EngineRegistry validate-against-schema call site, the reference executor
      bean registrations, the named boot-validation integration-test methods, the
      configurable schema-path property) is L2 runtime-sequence / class-method
      realisation detail owned by the generated code facts and the contract
      surface, not standing L0 authority.
  - >-
      The packaging concern about resolving the contract YAML from the filesystem
      vs the classpath when shipped as a jar is L2/physical realisation detail
      tracked by the packaging work, not part of the standing pattern decision.
