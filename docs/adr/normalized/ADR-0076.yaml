review_notes: >-
  Lane: L3-L0ARCH (ADR-0159). Re-altitude UP (raw self-labels level L2 / view
  process) to decision_level L0, on the same principle ADR-0143 was re-altituded
  L1 -> L0: the DURABLE decision this ADR makes is the R2
  governance-as-runtime-contract PATTERN, which the raw text itself frames as "the
  first instance" of a cross-cutting technique "reused in upcoming waves" -- a
  cross-cutting architecture principle, not a feature-local runtime sequence. The
  L2 boot-wiring + integration-test specifics (which WOULD be a forbidden
  lower-altitude leak if presented as the L0 decision) are pushed to
  non_authoritative_legacy_content and to the generated facts. decision_type
  architecture_principle is the allowed L0 type for ratifying a reusable
  cross-cutting technique. view process is kept from the raw (the pattern is about
  a boot-time runtime process). current_state partial_guidance: the pattern still
  governs (active_guidance) while the named pilot wiring is non-authoritative L2
  realisation, and the engine implementation home named in the raw
  (service.runtime.engine.*) is itself overtaken by the realised facts
  (engine.runtime.* / engine-exec) per ADR-0090 -- generated facts win on the
  location. superseded_by empty (no later ADR replaces the R2-pattern decision).
