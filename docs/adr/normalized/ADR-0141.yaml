adr: ADR-0141
raw_path: docs/adr/0141-internal-event-queue-design-only.yaml

current_state: partial_guidance
decision_level: L1
affected_levels: [L1, L2, contract]
view: logical
decision_type: module_responsibility

clean_decision_summary: >-
  Reclassifies the agent-service "internal event queue" layer from a peer code-
  home layer to a design_only sub-section of the L1 logical view, because no code
  home exists for it yet and presenting a binding-only layer with no code home as
  a peer of shipped layers creates a design_only-shown-as-shipped risk. The durable
  constraint from the prior 5-layer ratification -- that this layer is a BINDING
  layer over the canonical three-track bus, not a parallel queue abstraction --
  is unchanged; this ADR narrows PRESENTATION, not contract, and defers the code
  home (with a stated boundary contract) to a future wave, at which point this ADR
  is superseded by the ADR that ratifies the code home.
active_guidance:
  - >-
      The internal-event-queue layer is reclassified as design_only: the L1
      logical view MUST present it as a design_only sub-section (or a parenthetical
      aside) rather than as a peer code-home block in the component diagram, and
      the development view MUST NOT show a queue sub-package that does not exist.
      Both views mark the layer explicitly as design_only.
  - >-
      The binding-only role is the durable contract (re-stated from the prior 5-
      layer ratification, not newly minted): this layer BINDS to the canonical
      three-track bus channels (control / data / rhythm), it is not a parallel
      single-tier queue abstraction; when a code home lands it binds to those
      channels and cites this ADR plus the prior ratification as authority.
  - >-
      Presentation discipline closes the design_only-shown-as-shipped defect:
      future implementers reading the L1 view know this layer is a contract
      surface, not a code surface, until the deferred code-home wave lands.
non_authoritative_legacy_content:
  - >-
      The forward boundary-contract block published inline (the inputs / outputs /
      DFX expectations -- the run-event and control/rhythm-channel inputs, the
      per-channel publication outputs with payload-size limits, and the per-channel
      releasability / resilience / availability / vulnerability / observability
      DFX including the concrete metric-name shape) is L2 / contract realisation
      detail design-pinned for the future code home, owned by the bus contract
      surface and the future L2 design, not standing L1 authority.
  - >-
      The deferred code-home mechanics (the future queue sub-package path, the
      package-info authority-citation requirement, the at-least-once + dedup-key
      delivery detail) are L2 realisation detail owned by the future wave, not
      present-tense standing authority.
  - >-
      The design_only-mechanism-shown-as-shipped defect-family framing (the lead
      occurrence and the family registration) is recurring-defect-families ledger
      content, not standing architecture authority.
