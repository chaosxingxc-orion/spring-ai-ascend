review_notes: >-
  Lane: L4-FRAME (ADR-0159). decision_level L1 matches the raw self-label (level:
  L1, view: logical) and the module-responsibility character: this is a within-
  module layer reclassification + a re-stated binding constraint. decision_type
  module_responsibility is in-altitude for L1. The forward boundary-contract block
  (inputs / outputs / DFX with concrete per-channel metric-name shapes -- forbidden
  lower-altitude detail at L1) is pushed to non_authoritative_legacy_content and to
  the bus contract surface + future L2 design. No code-symbol fact is cited because
  the layer is design_only with no code home (the raw is explicit that the queue
  sub-package does not exist); citing one would invent a fact id. The bus-channels
  governance file is cited as the binding contract surface. current_state
  partial_guidance: the design_only reclassification + the binding-only role +
  presentation discipline govern (active_guidance) while the forward boundary
  contract, the deferred code-home mechanics, and the defect-family framing are
  non-authoritative L2 / contract / ledger realisation. superseded_by empty TODAY:
  the raw declares that WHEN the Layer 3 code lands (post the current wave) this
  ADR's status is bumped to superseded by a follow-up ADR -- but that follow-up
  does not yet exist and the apex fact carries no superseded_by for ADR-0141, so
  minting one here would overclaim; the pending future supersession is annotated
  here for the human reviewer rather than asserted in the field.
