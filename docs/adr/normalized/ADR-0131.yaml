adr: ADR-0131
raw_path: docs/adr/0131-prompt-template-spi.yaml

current_state: partial_guidance
decision_level: L1
affected_levels: [L1, L2, contract, facts]
view: development
decision_type: public_spi_surface

clean_decision_summary: >-
  Lands a prompt-template as a public SPI boundary identity in the middleware
  module: a tenant-scoped, pure-Java template-rendering surface with a sealed
  source discriminator (inline string vs classpath resource, each with a
  placeholder syntax), so application developers render against the platform's
  decoration boundary instead of reaching directly for the provider type. The
  canonical Spring AI prompt template is the reference adapter (confined to the
  integration package). The standing decision is the rendering boundary identity +
  its tenant-scope + sealed-source contract; the render signature, the rendered-
  value record, and the design_only status are L2 / contract detail.
active_guidance:
  - >-
      The prompt-template boundary identity is the governing decision: ONE pure-
      Java rendering SPI is the platform's decoration boundary for prompt
      rendering, so application developers write against the platform template
      rather than the provider template, preserving the decoration seam and a
      place to attach tenant policy.
  - >-
      The rendering contract is tenant-scoped (rendering takes an explicit tenant
      identity; cross-tenant rendering fails closed in the runtime implementation
      and the SPI validates a non-blank tenant), enabling per-tenant policy
      (variable sanitisation, secret redaction) to be added later without changing
      the signature.
  - >-
      The template source is a SEALED discriminator (inline-string and classpath-
      resource records, each carrying a placeholder syntax): the loader surface is
      exhaustive, so adding a new source kind is an explicit ADR-changing event,
      not a quiet sneak-in. The canonical Spring AI prompt template is wrapped by a
      reference adapter in the integration package, with no provider type in the
      SPI surface.
non_authoritative_legacy_content:
  - >-
      The render method signature, the rendered-prompt value record and its field
      list (including the variables snapshot for audit/replay), and the deferral
      of a partial-render / streaming-render variant are L2 / contract realisation
      detail; the prompt-template contract surface and the live code-symbol facts
      own those, not this ADR.
  - >-
      The design_only-at-landing / runtime-enforced-when-the-rendering-wave-ships
      status and the reference-adapter shell behaviour (holding the provider type
      to defer the binding, throwing until the runtime wave) are status /
      sequencing detail owned by the contract surface and release notes, not
      standing L1 authority.
