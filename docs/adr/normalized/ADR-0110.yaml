adr: ADR-0110
raw_path: docs/adr/0110-audit-tamper-evidence-and-hook-pii-failsafe.yaml

current_state: partial_guidance
decision_level: L0
affected_levels: [L0, L1, L2, contract]
view: logical
decision_type: global_constraint

clean_decision_summary: >-
  Closes two adjacent security gaps as L0 global constraints. First, audit events
  MUST be tamper-evident: written as a per-tenant hash-chain anchored to a
  periodic Merkle root, with a deterministic verifier walk and a fail-closed
  forensic-preservation response on detected tampering -- mutability detection no
  longer trusts the database. Second, a safety-critical hook (PII redaction,
  tool authorization, outbound-content classification) that fails MUST short-
  circuit the surrounding invocation fail-closed, via an explicit carve-out
  marker, rather than re-defaulting the hook chain's failsafe behaviour; non-
  safety-critical observability hooks retain default failsafe.
active_guidance:
  - >-
      Audit-log tamper-evidence is a standing global constraint: audit events are
      a per-tenant hash-chain (each row binds the prior row's hash and its own
      content hash) anchored to a periodic per-tenant Merkle root; verification is
      a deterministic walk over the chain segment + anchors, and detected
      tampering raises a critical audit event and blocks further writes for that
      tenant pending operator action (forensic preservation). Integrity no longer
      trusts database mutability.
  - >-
      Safety-critical hook fail-closed is a standing constraint expressed as an
      explicit carve-out, NOT a re-default: a hook declared safety-critical that
      returns a failure short-circuits the surrounding invocation regardless of
      the chain's default failsafe -- the engine receives an abort instead of a
      model response and the run transitions to a terminal failed state with the
      hook id + reason. Default failsafe is preserved for non-safety-critical
      observability hooks so an observability failure does not abort a model call.
  - >-
      Posture-aware override is bounded: the development posture MAY downgrade the
      safety-critical short-circuit to warn-and-proceed; the research and
      production postures MUST honour the fail-closed short-circuit.
non_authoritative_legacy_content:
  - >-
      The persistence detail (the audit-row hash columns and their nullability,
      the Merkle-anchor table, the hourly batch-job cadence) and the verifier /
      rebuilder method signatures are L2 persistence / class-method realisation
      detail owned by the L2 design + generated facts, not standing L0 authority.
  - >-
      The safety-critical marker annotation name, the named reference hooks and
      their hook positions, the abort signal and terminal-reason string shapes,
      and the ArchUnit assertion are L1/L2 realisation detail; the standing L0
      decision is the fail-closed constraint, not the annotation or the named
      reference hooks.
  - >-
      The forward / compounding notes (optional W3 cross-publish to an external
      transparency log, the W3 audit-chain rebuilder for lawful redaction, reuse
      of the chain+anchor pattern for a later ancestor-attestation feature) are
      forward-wave design intent, not present-tense standing authority.
