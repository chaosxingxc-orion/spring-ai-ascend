adr: ADR-0082
raw_path: docs/adr/0082-graphmemory-ownership-canonical-and-topology-truth.yaml
current_state: partial_guidance
decision_level: L0
affected_levels:
  - L0
  - L1
  - gate
view: development
decision_type: governance_invariant

clean_decision_summary: >
  For every SPI surface in the repository the canonical source of ownership
  truth is `<module>/module-metadata.yaml#spi_packages` intersected with the
  actual Java file path under that module. No other authority surface (root or
  per-module ARCHITECTURE.md, architecture-status.yaml allowed_claim,
  contract-catalog.md, DFX files, release notes) may make a current-tense
  ownership claim that contradicts that canonical pair; historical claims are
  permitted only under an explicit historical marker. DFX files for deleted
  modules must not remain on disk.

active_guidance:
  - >
    The canonical SPI-ownership-topology source of truth is the pair
    `<module>/module-metadata.yaml#spi_packages`  intersect  the on-disk Java file path.
    Every authority surface must agree with that pair for current-tense
    ownership claims; this is the still-governing invariant.
  - >
    Historical ownership claims are permitted only when the surrounding
    paragraph carries an explicit historical marker (historical, pre-ADR-NNNN,
    superseded, deprecated, moved, formerly) within close proximity.
  - >
    A per-module DFX file describing a module that no longer exists is an
    anti-pattern and must be deleted or moved to a historical/ subdir with an
    explicit historical status.

non_authoritative_legacy_content:
  - >
    The specific module-placement decision in this ADR  -  GraphMemoryRepository
    SPI remaining on agent-runtime-core vs agent-service  -  is stale topology:
    agent-runtime-core was dissolved (its kernel SPI redistributed to
    semantic-home modules), so the agent-service-vs-agent-runtime-core framing
    no longer describes the live module graph. The live owner is whatever the
    canonical module-metadata + Java-path pair currently declares.
  - >
    Concrete Java source paths under the legacy `ascend.springai.service`
    package root are pre-migration facts; the package root later moved to
    `com.huawei.ascend`. Treat the paths as historical, not current authority.
  - >
    The mechanical corpus-reconciliation list (specific file line numbers,
    rc7/rc8 wave commit framing, the deleted dfx/agent-runtime.yaml) is
    historical cleanup evidence, not standing authority.

