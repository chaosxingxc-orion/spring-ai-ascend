review_notes: >
  current_state = partial_guidance: the AUTHORITY decision (module-metadata  intersect 
  Java-path is the single canonical ownership source) is current L0 governance
  authority and survives intact. The ARCHITECTURAL decision body (where the
  GraphMemoryRepository SPI physically sits, expressed in terms of
  agent-runtime-core) is stale because ADR-0088 dissolved agent-runtime-core
