clean_decision_summary: |
  ResilienceContract is a dual-surface boundary along two orthogonal axes that
  MUST NOT be conflated: an operation-policy routing axis (origin ADR-0030) and a
  skill-capacity arbitration axis (origin ADR-0070). The pre-ADR-0070 plan to
  extend the operation axis with a tenant argument is narrowed: tenant capacity
  lives on the skill axis, not on a renamed operation argument. The governing
  decision is the orthogonal-axes contract identity; the specific Java method
  signatures and the in-place line-level amendments to sibling ADRs are
  contract/L2 detail.

active_guidance:
  - "ResilienceContract is one SPI exposing two orthogonal surfaces: operation-policy routing and skill-capacity arbitration. The two axes MUST NOT be conflated."
  - "Future operation-axis extensions MUST NOT add a tenant axis; tenant capacity arbitration lives exclusively on the skill-capacity axis."
  - "Future skill-axis extensions MUST NOT add an operation-identifier axis; operation-side policy routing lives exclusively on the operation-policy axis."
  - "Over-capacity on the skill axis yields a non-admitted resolution carrying a rate-limited suspend reason so the orchestrator maps to a suspended (not failed) lifecycle state, interlocking with Rule R-H."

non_authoritative_legacy_content:
  - "Concrete Java method signatures (resolve(String operationId), resolve(String tenant, String skill)) and the UnsupportedOperationException default-method realization — contract/L2 surface detail owned by docs/contracts/contract-catalog.md and the generated code-symbol facts, not by this L1 decision."
  - "Named production bindings (YamlResilienceContract, DefaultSkillResilienceContract, YamlSkillCapacityRegistry.tryAcquire) — L2 implementation detail."
  - "In-place line-level amendments to sibling sources (ADR-0030:223, ADR-0044:77, contract-catalog.md:58) and the ResilienceContract.java @see Javadoc cross-references — corpus-bookkeeping / L2 detail, superseded as a citable mechanism by this normalized view."
  - "Build/gate baseline citations carried in the raw verification block (74 active gate rules; 149 self-test cases; rc7/rc8 baselines) — version-tagged process detail owned by release notes and the gate surfaces."

