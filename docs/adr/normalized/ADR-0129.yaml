review_notes: >
  current_state is partial_guidance because the raw ADR mixes an actively
  governing L0 boundary decision (the model-invocation boundary now includes a
  tenant-scoped, hook-bound, binary-compatible streaming surface) with
  contract/L2-lane detail (the concrete SPI method signature, the sealed
  chunk-record variants and their fields, the terminal-chunk ordering rule, and
  the hook firing sequence) that is leaked at L0 per the 2026-05-29 layer-purity
  verdict and properly owned by the streaming contract and the L2 design. The
  decision_type is system_boundary (the platform model boundary) rather than
  public_spi_surface, which is an L1-only type — declaring the SPI method
  signature itself at L0 is precisely the leak this view quarantines into
  non_authoritative_legacy_content. The boundary decision extends ADR-0121
  (the base gateway) and is unsuperseded. AMBIGUITY FLAG for human review: the
  design_only -> runtime_enforced promotion is gated on the model-gateway runtime
  wave; whether streaming has been promoted should be confirmed against the live
  contract catalog before this view is cited as runtime authority.
