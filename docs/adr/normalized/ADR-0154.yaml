# Normalized ADR view — readable interpretation layer over the raw ADR.
# Authority: ADR-0160 (ADR Governance Model). Schema: docs/governance/
# adr-governance-policy.yaml (required fields + state invariants) +
# docs/governance/adr-taxonomy.yaml (decision-level altitude). This view invents
# no ADR ids and no relationships; it re-states and curates only. Authority
# cascade is unchanged: generated facts > DSL > Card/prose.
adr: ADR-0154
raw_path: docs/adr/0154-fact-layer-authority.yaml
current_state: active_guidance
decision_level: L0
affected_levels: [L1, DSL, contract, facts, gate]
view: development
decision_type: governance_invariant
clean_decision_summary: >-
  L1 structured facts used for AI implementation guidance MUST be generated by
  deterministic scripts from authoritative sources (code, contracts, tests,
  build metadata, runtime config, ADRs). Hand-authored docs may explain intent
  and rationale but MUST NOT be the sole source of factual claims about code,
  contracts, tests, dependencies, runtime behaviour, or verification. The fact
  layer is the AI's primary L1 input and sits at the apex of the authority
  cascade (generated facts > DSL > Card/prose).
active_guidance:
  - Generated facts are the AI's authoritative ground-truth; the generated-facts
    layer outranks DSL and prose in the authority cascade.
  - "Rule G-15 (Fact-Layer Integrity) governs the fact-layer-specific contract:
    deterministic provenance plus the LLM-no-author constraint on generated fact
    files."
  - "The fact layer lives under architecture/facts/{README.md, schema/,
    generated/}; generated payloads carry repo_commit as the provenance anchor
    and OMIT live generated_at_utc timestamps (Rule G-13 byte-identical regen)."
  - saa.property authority classification lives at
    architecture/profile/saa-property-authority.yaml.
non_authoritative_legacy_content:
  - The six-wave PR-train description (W1..W6 scope) is an executed roadmap, not
    standing authority; treat it as historical sequencing context.
  - The W1-ship baseline counts quoted inline (139 ADRs, 145 gate rules, 45
    engineering rules, 178 enforcer rows, 35 recurring families) are point-in-
    time figures; the canonical live baselines are
    docs/governance/architecture-status.yaml.
  - The sunset date 2026-07-31 for hand-authored saa.devPaths /
    saa.verificationTestFqns / saa.verificationCommands is a forward-looking plan
    item, not a present-tense rule.
supersedes: []
superseded_by: ""
dsl_refs: []
l0_constraint_refs: []
l1_refs: []
l2_refs: []
contract_refs: []
fact_refs:
  - architecture/facts/generated/
gate_refs:
  - Rule G-15
  - Rule G-13
review_notes: >-
  Decision is made at L0 (a governance invariant establishing the fact-layer
  authority rule and the cascade ordering) and affects L1 (AI implementation
  guidance), plus the DSL / contract / facts / gate lanes the rule operates over.
  current_state is active_guidance: the fact-layer-authority rule and Rule G-15
  are current authority and nothing supersedes ADR-0154. The push-backs vs the
  expert wording (SFR-2/3/8/9/10) and the SFR-5 counter-decision are recorded as
  rationale in the raw ADR and remain the basis of the still-current decision,
  so they are NOT listed as non-authoritative legacy content.
