adr: ADR-0121
raw_path: docs/adr/0121-model-gateway-spi.yaml

current_state: partial_guidance
decision_level: L1
affected_levels: [L1, L2, contract, facts]
view: development
decision_type: public_spi_surface

clean_decision_summary: >-
  Lands the model-gateway as a public SPI boundary identity in the middleware
  module: a tenant-scoped, hook-bound, pure-Java gateway over which all model
  invocations route, with the canonical Spring AI chat model as the reference
  adapter (Spring AI types confined to the integration package, not the SPI
  surface). The boundary lets customers swap providers by implementing the
  gateway without touching Spring AI. The standing decision is the gateway
  boundary identity + its tenant/hook/purity contract; the method signature, the
  value records, and the design_only-until-runtime status are L2 / contract
  detail.
active_guidance:
  - >-
      The model-gateway boundary identity is the governing decision: ONE pure-Java
      gateway SPI (imports the JDK only, no runtime-library types in the contract
      surface) is the single seam through which model invocations route, and
      customers swap providers (direct provider adapters, a custom accelerator
      adapter, or the reference Spring AI adapter) by implementing it.
  - >-
      The gateway carries the platform's cross-cutting model-invocation contract:
      it is tenant-scoped (the invocation carries a tenant identity and cross-
      tenant access fails closed before provider I/O), hook-bound (the before-LLM
      and after-LLM hook points fire around it with short-circuit semantics), and
      capacity-arbitrable (per-model rate limits MAY arbitrate at the runtime
      implementation's call site).
  - >-
      Spring AI is the reference, not the surface: the canonical Spring AI chat
      model is wrapped by a reference adapter in the integration package; the SPI
      itself exposes no reactive or provider types, and blocking isolation is the
      runtime implementation's responsibility, not the SPI carrier's.
non_authoritative_legacy_content:
  - >-
      The gateway method signature and the value-type shapes (the invocation /
      response / message / usage records and their field lists) are L2 / contract
      realisation detail; the model-invocation contract surface and the live code-
      symbol facts own those, not this ADR.
  - >-
      The design_only-at-landing / runtime-enforced-when-the-runtime-gateway-ships
      status, the reference-adapter shell behaviour (holding the Spring AI type to
      defer the binding, throwing until the runtime wave), and the staged wiring
      timeline are status / sequencing detail owned by the contract surface and
      release notes, not standing L1 authority.
