review_notes: >-
  Lane: L4-FRAME (ADR-0159). Layer-purity reclassification: the raw labels itself
  level L0, but a public-SPI-surface decision is a FORBIDDEN lower-altitude leak at
  L0 and is DEFENSIBLE at L1 (adr-taxonomy) -- this is the same re-altitude applied
  to the sibling SPI ADRs (the memory / planner / chat-advisor SPIs). The
  normalized decision_level is therefore L1 (public_spi_surface), with L0 retained
  in affected_levels because the SPI closes an L0 agentic-primitive contract gap.
  The method signature + value records (forbidden line-level / private detail at
  L1) are pushed to non_authoritative_legacy_content and cited via the realised
  code-symbol facts (the gateway, invocation, response, and the reference Spring AI
  adapter all resolve in the generated facts). current_state partial_guidance: the
  gateway boundary identity + tenant/hook/purity contract still govern
  (active_guidance) while the signature, records, and design_only status are
  non-authoritative L2 / contract realisation. AMBIGUITY FLAG for human review: the
  raw marks the SPI design_only; the realised code-symbol facts show the SPI +
  reference adapter present, so if runtime enforcement has since landed the active/
  legacy split should be re-confirmed. superseded_by empty (relates_to only).
