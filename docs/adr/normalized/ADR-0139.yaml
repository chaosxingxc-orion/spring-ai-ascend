review_notes: >
  current_state is partial_guidance because the raw ADR mixes an actively
  governing L1 process contract (the narrowed Fast/Slow path semantics + the
  doc-discipline rule, which together close the registered
  permissive-language defect family) with L2-lane detail (the concrete repository
  CAS method name, named forbidden APIs, and the numeric eligibility bound) that
  is leaked at L1 per the 2026-05-29 layer-purity verdict and owned by the L2
  design and gate enforcers. The decision_type is cross_frame_contract because the
  narrowed semantics are a behavioral contract across the agent-service
  execution frames (router / engine adapter); they are unsuperseded. AMBIGUITY
  FLAG for human review: the Dual-Track router SPI is design_only at this wave and
  its sibling gate rule (detecting Fast-Path prose without an
  invariant-preservation clause) was only named as a later-wave candidate; whether
  the SPI and the enforcing gate have since landed should be confirmed against the
  live contract catalog and enforcers.yaml before this view is cited as runtime or
  gate authority.
