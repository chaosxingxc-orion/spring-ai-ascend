review_notes: >
  current_state = partial_guidance: the three binding reconciliations (package
  root preserved, A2A as protocol boundary not SDK pervasion, Run keeps spine
  identity with Task above Run) plus the dual-mode physical-view framing are
  still governing L1 direction. The concrete W2 package tree, component
  placements, and Fast/Slow-Path routing prose are superseded-in-detail by the
  later rc53/rc55 L1 work (5-layer ratification, engine-adapter split, run
  aggregate ownership, narrowed Fast/Slow semantics, and the M1-M6 v1.2 internal
  module design). Those later ADRs EXTEND/refine rather than declare a formal
  supersede edge over ADR-0115, and adrs.json records no superseded_by for this
  ADR, so superseded_by is left empty and the staleness is captured as
  non_authoritative_legacy_content instead. Flagged for human review: if the
  governance owner judges ADR-0138/0155 to formally retire ADR-0115's structural
  content, a superseded_by edge should be minted at the raw-ADR layer first, then
  re-stated here.
