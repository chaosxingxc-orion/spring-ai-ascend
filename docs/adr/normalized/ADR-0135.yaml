adr: ADR-0135
raw_path: docs/adr/0135-agent-session-as-run-projection.yaml
current_state: partial_guidance
decision_level: L0
affected_levels:
  - L0
  - L1
  - contract
view: development
decision_type: architecture_principle

clean_decision_summary: >
  AgentSession is a projection, not an SPI. Conversation continuity is the
  tuple (tenantId, conversationId) projected over the sequence of Run records
  that share that tuple; the client-supplied conversationId is the only
  identifier and the platform never mints a separate sessionId. Multi-turn
  state lives in ConversationMemory keyed by (tenantId, conversationId); no new
  session SPI, entity, or lifecycle is created. Separately, the
  retrieval-cache strategy is a deferred-with-declared-shape extension (a
  future nullable field with a fixed vocabulary), not a missing field  -  it
  lands in the RAG vertical, not at L0.

active_guidance:
  - >
    Conversation continuity is modelled as a (tenantId, conversationId)
    projection over the Run sequence  -  there is deliberately NO AgentSession
    SPI, no separate session entity, and no separate minted sessionId. This is
    the governing design intent.
  - >
    Multi-turn state is a Memory-SPI concern: it lives in ConversationMemory
    keyed by (tenantId, conversationId). Conversation-continuity surface
    evolution is therefore a Memory-SPI question, not a new-session-SPI
    question.
  - >
    Retrieval-cache strategy is deferred-with-known-shape (a forward, nullable,
    fixed-vocabulary extension on the retrieval options), not a missing field;
    it is owned by the later RAG vertical, not by L0.

non_authoritative_legacy_content:
  - >
    The exact deferred record-extension mechanics (which positional parameter
    the future cacheStrategy field becomes, the named immutability test it must
    update) are L2 implementation detail; the authoritative landing shape is
    the retrieval contract surface and the RAG-vertical decision, not this L0
    intent doc.
  - >
    Implementation-choice asides (a Postgres materialised view for long-lived
    aggregations, builder-vs-positional constructor migration) are illustrative
    L2 options, not L0 authority.

