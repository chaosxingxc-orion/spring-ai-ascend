clean_decision_summary: |
  Ratify the Evolution Plane Online/Offline modality duality as an L0
  scenarios-view reference: the evolution plane supports both an Offline (T+1,
  batch-analysed, version-released updates) modality and an Online dual-track
  modality (a fast user-facing track plus a slow real-time trajectory-critique
  track whose optimisations are injected back into the live agent's memory). The
  duality is paired against the deployment topology as a 2x2 Mode x Modality
  matrix (platform-centric vs business-centric x offline vs online), whose
  governance single-source-of-truth is the evolution-modalities policy file. The
  standing decision is the duality + matrix as the L0 reference shape; the Java
  realisation is downstream-wave work, not part of this decision.

active_guidance:
  - "The evolution plane has two first-class modalities: Offline (T+1 asynchronous capture/analyse, updates shipped via explicit version releases) and Online dual-track (a fast user-facing track plus a slow LLM-as-Judge trajectory-critique track that feeds optimisations back into the live agent's short/long-term memory)."
  - "Modality x deployment mode is a 2x2 matrix (platform-centric vs business-centric, each x offline vs online); the canonical enumeration lives in the governance evolution-modalities policy file as the single source of truth."
  - "Which run events are eligible for evolution export is governed by the evolution-scope-default-boundary rule (IN_SCOPE / OUT_OF_SCOPE / OPT_IN); the deployment-locus side of the matrix is supplied by the polymorphic-deployment topology ADR."

non_authoritative_legacy_content:
  - "The wave-tagged implementation timeline (rc22 ratification, rc24 PII-filtered trace emission, rc25 slow-track judge runtime, rc26 ReflectionEnvelope hot-patch runtime) is release scheduling owned by release notes / the plan file, not standing L0 authority."
  - "The verification_protocol clause referencing a 'per ADR-NNNN signal rule' for recurring-defect-families freshness is a placeholder pointer (no concrete ADR id); freshness is governed by Rule G-9 against the recurring-defect-families ledger, and this placeholder carries no standing authority."
  - "The family_taxonomy block (wave rc22, family N-delta, hidden defects swept) is recurring-defect-families ledger content, not standing architecture authority."
  - "Named runtime handlers and transports (ReflectionPatchHandler landing in a later wave, the S2C transport carrier) are L1/L2 realisation detail; the standing L0 decision is the modality duality + matrix shape."

