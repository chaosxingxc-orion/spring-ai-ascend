review_notes: |
  current_state = remediation_record: ADR-0116 is an exhaustive-audit corrective
  wave (its content is the audit findings and the fixes that closed them), which
  the policy maps to remediation_record rather than active_guidance. gate_refs
  are populated per the remediation_record invariant because the wave claims gate
  changes (un-deadening Rules 82/96/99 and adding non-vacuity guards; E133/E139
