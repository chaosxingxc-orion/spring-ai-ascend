clean_decision_summary: |
  An exhaustive-audit corrective wave run against a green gate. It un-deadens
  three drift-prevention gate rules that had become permanent silent-passes
  after the rule-namespace migration (their discovery regexes matched zero
  namespaced kernels) and gives each a non-vacuity guard so a drift-detector
  that resolves nothing now fails loudly. It also lands the missing controller-
  side half of the cancel-vs-terminal compare-and-set fix, widens two gate scans
  that covered only one of six modules, aligns a tenant re-auth kernel clause to
  the newest authority, and corrects several numeric/path truths. Captured as
  governance-traceability, not standalone architecture authority.

active_guidance: []

non_authoritative_legacy_content:
  - The standing invariant this wave generalised — every auto-discovering gate
    rule must fail when it matches zero live corpus elements (the non-vacuity
    guard) — is authoritative through its rule cards and enforcers, not through
    this ADR's prose. As a remediation_record this view carries no
    active_guidance clauses of its own.
  - The method-level cancel-CAS detail (the atomic update-if-not-terminal
    repository method, the controller cancel routing, the lost-race exception
    catch). This is L2 implementation detail owned by the L2 design.
  - The point-in-time numeric corrections (gate section count, HookPoint count,
    relocated SPI paths, the reconciled ADR count) and the per-finding
    deferral list. These are wave-mechanics, not standing authority.

