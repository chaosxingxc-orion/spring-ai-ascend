clean_decision_summary: |
  A batch of ten implementation-feasibility findings, each closing via a narrow
  contract-surface amendment, a startup gate, or a single SPI/doc update. The
  governing outcomes are two cross-module policies: a security-posture gate fails
  CLOSED (never open) when its posture input is missing under non-dev postures,
  and a breaking wire-contract change bumps the contract major version AND ships
  both versions in parallel for at least one wave. The ten per-finding technical
  realizations are L2/contract detail now owned by their respective surfaces.

active_guidance:
  - "A missing security-posture signal MUST fail CLOSED under non-dev postures (research / prod): boot fails with an actionable error rather than defaulting open; a dev/test profile fallback is the only permitted relaxation."
  - "A breaking wire-contract change bumps the public contract major version (v1 -> v2) AND ships both versions in parallel for at least one wave; it is never an in-place breaking edit."
  - "Design-only decisions are surfaced ahead of their implementation wave (the batching discipline that motivated this ADR); reviewers treat the not-yet-authored cross-cutting docs named in the raw ADR as forward references, not present-tense deliverables."

non_authoritative_legacy_content:
  - "Per-finding contract/persistence realizations: the Idempotency-Key 409 response schema (Idempotency409Response fields + conflict_kind enum), the idempotency_keys TTL/GC + GDPR erase endpoint + Flyway retention migration, the three-track terminal-drain ordering invariant, and the BoM version pins (mcp:1.0.0, spring-ai-bom:2.0.0-M5) — contract/L2 detail owned by docs/contracts/* and the generated facts, not by this L0 decision."
  - "Named test classes and benchmark budgets (AppPostureGateRequiredInProdTest, ThreeTrackTerminalDrainOrderingIT, IdempotencyConflictResponseShapeIT, BomMcpSdkVersionPinningIT, GraalVmContextThreadingTest, OverheadBudgetEnforcementJMH, ReferenceAdapterPostureGateDiagnosticTest; the ~19 ms per-LLM-call overhead budget) — L2 test mapping / performance detail."
  - "Virtual-thread pinning hazard mechanics (GraalVM Polyglot carrier-pinning, Postgres JDBC + HikariCP pinning, R2DBC per-connection RLS variables) and the named diagnostic class PostureGateFailure — L2 runtime/implementation detail owned by the cross-cutting docs and code-symbol facts."
  - "The three cross-cutting docs explicitly marked W2 follow-up / not yet authored (virtual-thread-pinning-hazards.md, agent-runtime-core-dissolution-migration.md, agent-client-wire-contract-compatibility.md) and the response-file delta taxonomy ids (δ.3 .. δ.16) — forward references / version-tagged bookkeeping, not standing authority."

