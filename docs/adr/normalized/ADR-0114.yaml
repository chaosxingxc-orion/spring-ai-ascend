review_notes: |
  Lane: L8-GOVERNANCE / L3-L0ARCH (ADR-0159). The raw ADR (level: L0, view:
  process, governance_infra: true) batches ten heterogeneous findings; most of
  the raw `decision` block is L2/contract leakage (SQL/Flyway, OpenAPI schemas,
  JMH budgets, named test classes, env-var behavior, virtual-thread pinning),
  hence current_state partial_guidance with only the two cross-module policies +
  the forward-reference discipline kept as active_guidance. decision_type
  cross_module_policy (an L0-allowed type) was chosen over governance_invariant
  because the surviving clauses (posture fail-closed, wire-version parallel-ship)
  bind multiple modules rather than governing the corpus. AMBIGUITY FLAGGED FOR
  HUMAN REVIEW: this ADR is close to a remediation_record (a batched feasibility-
  finding closure); it is kept partial_guidance because the posture-fail-closed
  and wire-versioning policies are genuinely still governing. A reviewer may
  instead split it into an L0 policy ADR plus an L2 implementation record. The
  raw ADR declares no supersedes; none minted.
