review_notes: >
  current_state is unambiguous (partial_guidance): the SPI-unification boundary
  governs, while the method/record/enum detail is L2 and recorded as non-authoritative.
  Layer-purity note: naming the Skill SPI as a boundary identity is DEFENSIBLE at L1,
  but the raw body is dense with method signatures and record field lists (L2 leakage)
  — migrated, in spirit, to the live facts + skill-definition.v1.yaml. Authority-cascade
  discrepancy to reconcile (not re-litigated here): the raw ADR places the SPI in
  com.huawei.ascend.service.skill.spi (agent-service), but the realized facts are under
  com.huawei.ascend.middleware.skill.spi (middleware module). Generated facts outrank
  prose, so the realized package is authoritative; the reconcile/ledger step should
  record this stale-package fact (and the ADR-0103 capability-services distribution may
  be the reason the SPI landed in middleware rather than service).
