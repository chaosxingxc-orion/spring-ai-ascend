clean_decision_summary: |
  Fold the two reactor modules (the request-scoped web/tenant tier and the
  non-request runtime kernel) into a single agent-service Maven module. The
  platform/runtime split survives as an INTRA-module sub-package layering under
  one parent namespace (service.platform.* beside service.runtime.*), preserving
  the negative dependency invariant (service.runtime MUST NOT import
  service.platform) without a Maven module boundary. This is the standing module
  responsibility decision: agent-service is one of the fixed domain modules and
  the platform/runtime asymmetry is enforced as sub-package layering, not module
  separation.

active_guidance:
  - "agent-service is a single Maven module that absorbs the former request-scoped tier and runtime kernel; the reactor carries one fewer module as a result."
  - "The platform/runtime asymmetry is preserved as intra-module sub-package layering: service.platform.* (request-scoped) sits beside service.runtime.* (non-request), and service.runtime MUST NOT depend on service.platform (the retargeted tenant-propagation-purity / module-dep-direction invariant)."
  - "agent-service evolves with a single module identity (one pom.xml, one module-metadata.yaml, one ARCHITECTURE/L1 corpus, one DFX descriptor); module-granular independent versioning of the web tier vs the runtime kernel is intentionally given up because the two always deploy together."

non_authoritative_legacy_content:
  - "Concrete package-rename mechanics, the per-file counts (164 in-module Java files, 3 import-site files, 213-file PR diff, 51/590+ gate-reference touches), the six-sequential-commit branch packaging, and the Flyway move-as-is mechanics are L2 implementation / process detail owned by the generated facts, the build surfaces, and release notes — not standing L1 authority."
  - "Named ArchUnit test classes (ServiceRuntimeMustNotDependOnServicePlatformTest, TenantPropagationPurityTest), specific gate-rule numbers, and the per-rule PASS verification list are L2 test mapping / enforcer detail owned by the generated test facts and the gate/enforcer surfaces."
  - "The repository_counts deltas (reactor_modules 9->8, internal_modules 7->6) are baseline metrics owned by docs/governance/architecture-status.yaml, not this ADR."
  - "The forward reference to a later agent-runtime-core extraction (the ADR-0079 T2.B2 wave) is roadmap narrative; the standing decision here is the consolidation itself."

