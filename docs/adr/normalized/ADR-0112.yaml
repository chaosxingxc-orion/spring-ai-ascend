clean_decision_summary: |
  Adopt value-based yield as the engine suspension principle: the engine signals
  a yield by RETURNING a value (a reactive state-delta carrying a nullable
  interrupt signal), NOT by throwing a checked exception, so suspension can cross
  reactive / future / durable-workflow boundaries cleanly and the reactive error
  channel is reclaimed for failures only. Pair the external wire-protocol
  interrupt vocabulary with the internal suspend-reason DFA vocabulary via an
  explicit (lossy, many-to-one) mapping. The standing governing principle is
  "no checked exception in a reactive SPI boundary; engine yields are values";
  the concrete SPI signatures, the reason-table contents, the shipped-state
  callouts, and the phased migration are realisation detail (the reason table is
  now owned by ADR-0146).

active_guidance:
  - "Engine suspension is value-based: the stateless engine SPI signals a yield by returning a reactive state-delta carrying a nullable interrupt signal, with NO checked exception in the SPI signature; the reactive error channel is reserved for failures only."
  - "Compounding invariant: every new orchestration SPI inherits the value-based pattern; no future SPI re-introduces a checked exception in a reactive / future / durable-workflow boundary (the rationale: such boundaries cannot carry checked exceptions cleanly and durable workflows require deterministic history)."
  - "Two interrupt vocabularies coexist with an explicit mapping: an external wire-protocol interrupt type (portable across peer implementations) and an internal suspend-reason DFA vocabulary; internal->wire is many-to-one and lossy by design; inbound wire->internal requires payload-context enrichment by the receiving runtime."

non_authoritative_legacy_content:
  - "The concrete SPI code blocks (StatelessEngine.execute returning Mono<StateDelta>, the StateDelta record fields, the InterruptSignal sealed interface and its methods, package roots com.huawei.ascend.engine.spi.* and com.huawei.ascend.engine.orchestration.spi.SuspendSignal) are L2 method-signature / class-anchor detail owned at L2 + the generated code-symbol facts, NOT L0 authority."
  - "The 'Current shipped state (rc34)' callouts and the phased migration plan (W0.5 parallel-API ship, W1 ~9-call-site migration with the named file list, W2 SuspendSignal deletion + the NoCheckedExceptionInSpiTest ArchUnit add) are wave-tagged shipped-state / migration narrative owned by release notes, the plan file, and the generated facts."
  - "The SuspendReason -> wire-InterruptType mapping TABLE (the 6-case AwaitClientCallback / AwaitChildRun / AwaitToolResult / AwaitTimer / RequiresApproval / RateLimited rows and the deferred AwaitChildren fan-out variant) is, by the raw ADR's own words, NOW OWNED BY ADR-0146 section 1; defer to ADR-0146 as the authority for the canonical reason set. This ADR's Part B is aligned to it post-2026-05-27 and the table contents here are non-authoritative."
  - "References to ARCHITECTURE.md numbered items and the friction-resolution review/proposal docs are provenance pointers, not standing authority."

