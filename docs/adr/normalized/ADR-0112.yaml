review_notes: |
  Lane: L3-L0ARCH (ADR-0159). Classified at decision_level L0 to match the raw
  ADR self-label (level: L0, view: logical) and the cross-cutting
  architecture-principle character of the decision (value-based yield is a global
  SPI-shape invariant, not a single-module contract). decision_type
  architecture_principle is the allowed L0 type.
  current_state is partial_guidance because (a) the raw ADR declares
  supersedes_partial: [ADR-0019] (it partially supersedes the checked-suspension
  doctrine) and (b) it is a textbook instance of the 2026-05-29 remediation
  verdict's "L0 ADR carrying L2/code detail" leakage — it embeds full SPI code
  blocks, method signatures, package paths, a per-call-site file list, and
  shipped-state callouts. Those are recorded as non_authoritative_legacy_content
  so the view is citeable ONLY through the value-based-yield principle, while the
  signatures live at L2 / generated facts.
  Notable: the raw Part B reason TABLE is, per the raw text itself, superseded by
  ADR-0146 section 1 as the canonical reason set; this view defers to ADR-0146 and
  marks the table non-authoritative rather than re-stating a (now stale) edge.
  supersedes / superseded_by left empty: the supersession of ADR-0019 is PARTIAL
  (raw `supersedes_partial`), and the extracted fact layer carries no full
  supersedes edge for ADR-0112 — minting a full supersedes here would overclaim.
  No ambiguity in the partial_guidance choice.
