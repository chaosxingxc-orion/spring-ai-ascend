contract: Agent-Bus-Forwarding-Runtime
status: draft
version: v1
provider: agent-bus
consumer: agent-runtime
candidate: C3-database-outbox-inbox
description: "agent-bus 类 MQ 转发的运行态承载（C3 outbox/inbox）record schema：durable、可审计、tenant-scoped、broker-agnostic。Stage 7–11 交付 schema + 端口 + 状态机 + lease-safe + dispatch-loop + runtime-completion；Stage 12 落地真实持久化（Postgres JDBC adapter + Flyway migration + RLS）；Stage 13 完成 transport 投递模型候选评审（T1-T4 × 8 维度，T3 consumer-pull over DB 非裁决推荐）；Stage 14 落地 deliver 重投策略先行（retry policy 端口 + overflow-safe 指数退避 + exhausted→DLQ + 熔断端口 deferred，§6.2 不变）；Stage 15 落地真实投递绑定 PoC（A2A HTTP transport adapter，A2aForwardingDeliveryPort 消费 agent-runtime /a2a，同步等完成 = T1，§6.1 第 4 项解除、§6.2 不变）；Stage 16 接入 ForwardingCircuitBreaker 到 worker（RouteCircuitBreaker 三态机 CLOSED→OPEN→HALF_OPEN + recordOutcome 反馈 + allowsDelivery 短路，正当性来自 Stage 15 选 T1 push；纯 JDK transport-agnostic，§6.2 不变）；Stage 18 收口 REMOTE_TASK_FAILED non-retryable 码（远程 agent 终态业务失败 FAILED/CANCELED/REJECTED → dlq(REMOTE_TASK_FAILED) 直达 DLQ，区别 infra 层 retryable）+ 失败路径端到端 IT（C3ForwardingFailurePathIntegrationTest：真实 FailingHandler FAILED→DLQ + route 不可达→RETRY）；Stage 19 验证重投往返生命周期端到端（C3ForwardingRetryLifecycleIntegrationTest：claimDue 的 RETRY_SCHEDULED 回收子句跨多 tick 端到端触发 → 重投到 exhausted/DLQ 或恢复/ACKED；MutableEpochClock + 协调多 tick TickSource 时间控制无需 scheduler；@Isolated 修 context-boot IT 并发 flaky；§6.2 不变）；Stage 20 验证 lease 过期回收 + 断路器真实链路端到端（C3ForwardingLeaseReclaimAndBreakerIntegrationTest：(A) claimDue 的 stuck-holder 子句（status=DISPATCHING AND lease_until<=now）回收 worker-crash 行 → ACKED；(B) RouteCircuitBreaker 全状态机 CLOSED→OPEN→HALF_OPEN 与 lease 回收交织端到端，证明三条 skip 路径 + 两条回收子句在真实 SQL 上正确组合；时间控制复用 Stage 19；§6.2 不变）；Stage 22 验证时间驱动的终态与续约端到端（C3ForwardingExpiryAndLeaseRenewalIntegrationTest：(A) EXPIRED 终态——fake expired()→markExpired 落盘 EXPIRED/delivery_timeout/lease NULL，2 ticks 聚合 claimed=1 证明终态不回收；(B) lease 续约真实触发——续约检查读注入 EpochClock，claim 短 lease 使 remaining<阈值 触发 renewLease，observing port deliver 时读续约后 lease_until=t0+90s 作确凿证据→ACKED；关键发现：EXPIRED 是 SQL 正确但触发源缺失的终态（record 不持久化 deadline、deliver 不检查 → 真实 A2A 从不返回 expired()），真实触发源 deferred；§6.2 不变）；Stage 23 验证 payloadRef 端到端传递（C3ForwardingPayloadRefIntegrationTest + A2aForwardingDeliveryPortMockWebServerTest 扩展：(A) DATA_BEARING payloadRef 在真实 PG 上 enqueue→claim→deliver→ACKED 全程 round-trip 不变（envelope→record→DDL payload_ref 列→SqlCodec encode/decode 全链路首次端到端跑通，闭合 Stages 17-22 全 CONTROL_ONLY 盲区）；(B) payloadRef→A2A metadata 传输边界对称（DATA_BEARING 携带 metadata.payloadRef / CONTROL_ONLY 省略，闭合 Stage 15 transport 盲区：record() 早已设 payloadRef 但从未断言到达请求体）；范围修正 Stage 22 预期——agent-bus 是无状态引用路由层，两传递点都不 boot runtime；§6.2 不变（payloadRef 是 String 引用非 payload body/token stream/Task state/broker））。最终 push / pull / MQ 裁决仍 deferred（待 H2/H3）。"
authority:
  icd_design: ICD-agent-bus-forwarding.md
  l2: architecture/docs/L2/agent-bus/forwarding-outbox-inbox.md
  decision: docs/architecture/l0/10-governance/review-packets/agent-bus-forwarding-runtime-decision.md
outbox_record:
  description: "发送端 durable queue record；承载一条 forwarding 消息从入队到终态（ACKED/DLQ/EXPIRED）。"
  required:
    - field: tenantId
      type: string
      mutable: false
      owner: caller-and-discovery-tenant-scope
      pii: tenant-identifier-audit-retained
      rule: R-C.c
      constraint: non-blank; must equal routeHandle tenantScope
    - field: messageId
      type: string
      mutable: false
      owner: forwarding-substrate
      pii: opaque-no-redact
      constraint: non-blank
    - field: sourceServiceId
      type: string
      mutable: false
      owner: caller
      pii: service-identifier-audit-retained
    - field: targetServiceId
      type: string
      mutable: false
      owner: discovery-via-routeHandle
      pii: service-identifier-audit-retained
      constraint: from Stage 3 discovery, not a physical endpoint
    - field: routeHandle
      type: string
      mutable: false
      owner: discovery
      pii: opaque-no-redact
      constraint: opaque; encapsulates endpoint/topic/routeKey; never expose physical endpoint
    - field: status
      type: enum
      enum: [PENDING, DISPATCHING, ACKED, RETRY_SCHEDULED, DLQ, EXPIRED]
      mutable: true
      owner: dispatcher-state-machine
      pii: enum-no-redact
    - field: attemptCount
      type: integer
      mutable: true
      owner: dispatcher
      pii: count-no-redact
      constraint: starts at 0; increments on each RETRY
    - field: createdAt
      type: epoch-millis
      mutable: false
      owner: substrate
      pii: timestamp-no-redact
    - field: updatedAt
      type: epoch-millis
      mutable: true
      owner: substrate
      pii: timestamp-no-redact
  conditional:
    - field: payloadRef
      type: string
      mutable: false
      owner: caller
      pii: reference-no-inline-body
      required_when: payloadPolicy == DATA_BEARING
      rule: MI5-003-option-B
      constraint: payload follows data reference path; optional for CONTROL_ONLY
    - field: nextAttemptAt
      type: epoch-millis
      mutable: true
      owner: dispatcher
      pii: timestamp-no-redact
      required_when: status == RETRY_SCHEDULED
    - field: lastFailureCode
      type: enum
      enum: [route_not_found, tenant_mismatch, delivery_timeout, receiver_unavailable, backpressure_rejected, duplicate_suppressed, payload_ref_invalid, remote_task_failed]
      mutable: true
      owner: dispatcher
      pii: enum-no-redact
      required_when: status in [RETRY_SCHEDULED, DLQ, EXPIRED]
      nullable_when: status == ACKED
  stage8_additive:
    - field: lease
      type: object
      projection: "ForwardingLease on ForwardingOutboxRecord (nested: leaseOwner string, leaseUntilMillisEpoch epoch-millis); DDL columns lease_owner / lease_until"
      mutable: true
      owner: dispatcher-worker-claim
      pii: owner-identifier-audit-retained
      rule: MI8-001
      constraint: "at most one active lease per record; expired lease reclaimable; terminal never leased"
  unique_key: [tenantId, messageId]
inbox_record:
  description: "接收端去重 / 幂等 / 审计 record。"
  required:
    - field: tenantId
      type: string
      mutable: false
      owner: receiver-validation
      pii: tenant-identifier-audit-retained
      rule: R-C.c
      constraint: must equal message envelope tenantId
    - field: messageId
      type: string
      mutable: false
      owner: forwarding-substrate
      pii: opaque-no-redact
      constraint: non-blank
    - field: consumerServiceId
      type: string
      mutable: false
      owner: receiver
      pii: service-identifier-audit-retained
      constraint: distinct consumers dedup independently
    - field: status
      type: enum
      enum: [RECEIVED, DUPLICATE_SUPPRESSED, CONSUMED, REJECTED]
      mutable: true
      owner: inbox-state-machine
      pii: enum-no-redact
    - field: receivedAt
      type: epoch-millis
      mutable: false
      owner: inbox
      pii: timestamp-no-redact
  conditional:
    - field: consumedAt
      type: epoch-millis
      mutable: true
      owner: receiver
      pii: timestamp-no-redact
      required_when: status == CONSUMED
    - field: failureCode
      type: enum
      enum: [tenant_mismatch, payload_ref_invalid, duplicate_suppressed]
      mutable: true
      owner: inbox
      pii: enum-no-redact
      required_when: status in [REJECTED, DUPLICATE_SUPPRESSED]
  dedup_key: [tenantId, messageId, consumerServiceId]
forbidden_fields:
  - payload_body
  - token_stream
  - task_execution_state
  - physical_endpoint
forbidden_fields_note: "outbox/inbox record 始终不得包含 payload body / token stream / Task execution state / 物理 endpoint；大载荷走 payloadRef data reference path；转发方只持 opaque routeHandle。"
state_machine:
  authority: architecture/docs/L2/agent-bus/forwarding-outbox-inbox.md#4
  outbox_terminal: [ACKED, DLQ, EXPIRED]
  inbox_terminal: [DUPLICATE_SUPPRESSED, CONSUMED, REJECTED]
  illegal_transition: throws IllegalStateTransitionException
failure_codes:
  non_retryable:
    - route_not_found
    - tenant_mismatch
    - payload_ref_invalid
    - remote_task_failed  # Stage 18: remote agent terminal business failure (A2A FAILED/CANCELED/REJECTED) → direct DLQ
  retryable:
    - delivery_timeout
    - receiver_unavailable
    - backpressure_rejected
  dedup:
    - duplicate_suppressed
tenant_isolation:
  tenant_id_mandatory: true
  cross_tenant_query: explicit_failure
  cross_tenant_fallback: forbidden
  rule: R-C.c
lifecycle_ownership:
  bus_writes_task_execution_state: false
  changes_remote_task_owner: false
broker_posture: broker-agnostic
claim_lease:
  authority: architecture/docs/L2/agent-bus/forwarding-persistence.md#4
  port: ForwardingOutboxClaimPort
  replaces: findRetryable(now)
  semantics:
    - tenant-scoped claim (Rule R-C.c)
    - one active lease owner per record at a time
    - expired lease reclaimable by another owner
    - nextAttemptAt <= now or fresh PENDING is due
    - terminal never claimable
    - claim + state transition atomic (single tx / CAS)
    - state mutation (ACK/RETRY/DLQ/EXPIRE) is lease-owner guarded; a stale/foreign/expired owner is rejected, not applied (MI9-001)
    - ACKED/DLQ/EXPIRED/RETRY_SCHEDULED clear the lease; only DISPATCHING holds one (MI9-002)
