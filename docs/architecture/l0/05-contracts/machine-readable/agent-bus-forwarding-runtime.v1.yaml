  next_stage: H2H3-transport-decision-or-production-hardening
stage19_scope:
  delivers: [retry-lifecycle-reclaim-end-to-end, claim-due-retry-scheduled-reclaim-triggered, attempt-count-climbs-across-redelivery, exhausted-to-dlq-end-to-end, recover-to-acked-end-to-end, mutable-epoch-clock-time-control, coordinated-multi-tick-ticksource, context-boot-it-isolated-flaky-fix]
  not_delivers: [real-retry-scheduler-polling-cadence, real-agent-handler, registry-integrated-resolver, connection-pool-governance, final-push-pull-mq-decision, production-code-changes]
  path: retry-lifecycle-verification  # closes Stage 18's largest blind spot: claimDue's RETRY_SCHEDULED reclaim clause (next_attempt_at <= :now) — the heart of the outbox value proposition (persist + auto-re-drive to success or DLQ) — had NEVER been triggered end to end; Stage 18 pushed a record INTO RETRY_SCHEDULED and stopped (one tick). Stage 19 drives the same record PAST next_attempt_at across multiple ticks on REAL persistence, watching claimDue reclaim it, re-deliver, and walk attempt_count to one of two exits. Scenario A (constant failure → exhausted(maxAttempts) → DLQ, attempt_count=3, moveToDlq does not bump) + Scenario B (intermittent recovers → ACKED, attempt_count=2, markAcked does not bump). Time control: MutableEpochClock (test-only plain JDK) injected into worker + coordinated multi-tick TickSource (+61s step > any backoff), no sleep/scheduler (§6.1 held); two clocks coordinated (tick source advanceTo clock before yield so worker clockNow == claimDue :now); real-clock constraint (leaseGuardedUpdate uses real System.currentTimeMillis so tick instant starts at T0 monotonic, leaseUntil=instant+60s always > real clock). Flaky fix: parent pom surefire runs test classes 4-way concurrent (mode.classes.default=concurrent) but Spring Boot 4 SpringApplication.run is not thread-safe — two context-booting *IntegrationTest classes (named to bypass failsafe's *IT include, landing on concurrent surefire) hit ConcurrentModificationException + global spring.autoconfigure.exclude System property race; @Isolated on the two context-boot ITs (exclusive execution) roots out the flaky. NO production code changes (Stage 19 is pure test/verification; @Isolated + import are test code). 186 tests green (184 + 2 retry-lifecycle IT); §6.2 unchanged (both scenarios use CONTROL_ONLY envelope; MutableEpochClock/tick source/fake port are test-only plain JDK, no concrete broker / payload body / token stream / Task state / cross-tenant fallback)
  next_stage: H2H3-transport-decision-or-production-hardening
stage20_scope:
  delivers: [lease-expiry-stuck-holder-reclaim-end-to-end, circuit-breaker-full-state-machine-end-to-end, breaker-open-short-circuit-leaves-dispatching, lease-reclaim-hands-back-to-half-open-probe, skip-paths-and-reclaim-clauses-composed-on-real-sql, mutable-epoch-clock-time-control-reused]
  not_delivers: [real-retry-scheduler-polling-cadence, real-agent-handler, registry-integrated-resolver, circuit-breaker-state-persistence, connection-pool-governance, final-push-pull-mq-decision, production-code-changes]
  path: lease-reclaim-and-breaker-verification  # closes the two paths Stage 19 left unverified: (1) claimDue's stuck-holder reclaim clause (status='DISPATCHING' AND lease_until <= :now) — resolving a row whose owning worker crashed mid-delivery (lease held by a dead owner, past expiry) — had never been triggered end to end (Stage 19's advanceable-tick harness reclaimed rows before they ever stuck in DISPATCHING); (2) Stage 16's RouteCircuitBreaker was verified only at unit/contract layer — whether an OPEN breaker really short-circuits a real claimDue→deliver tick, leaves the row DISPATCHING (consuming no attempt_count), and the lease-expiry reclaim hands it back to a HALF_OPEN probe that recovers, was unverified end to end. Scenario A (lease-expiry reclaim: SQL fixture simulates a crash → single tick stuck-holder reclaim → acked → ACKED, claimed=1 / attempt_count=0 / last_failure_code=null: reclaim is a fresh delivery not a retry) + Scenario B (breaker full state machine woven with lease reclaim: RouteCircuitBreaker(2,122s) + fake port [retry,retry,acked] + 4 ticks at +61s step > 60s lease → CLOSED→OPEN cf=2 → tick3 OPEN skip leaves DISPATCHING → tick4 stuck-holder reclaim + OPEN→HALF_OPEN probe recovers→CLOSED, claimed=4 / retried=2 / skipped=1 / acked=1 / breaker.stateOf==CLOSED / attempt_count=2). Scenario B is the highest-value test: it WEAVES the two deferred paths — the breaker OPEN short-circuit is what leaves a row stuck in DISPATCHING, and the lease-expiry reclaim is what hands it back to the HALF_OPEN probe — proving the three skip paths (lease-renew failure / breaker OPEN / deliver exception) and two reclaim clauses (RETRY_SCHEDULED / stuck-holder DISPATCHING) compose correctly on real SQL. Time control reused from Stage 19 (MutableEpochClock + coordinated multi-tick TickSource; +61s step > any backoff AND the 60s lease). NO production code changes (Stage 20 is pure test/verification; @Isolated like Stage 19). 188 tests green (186 + 2 reclaim/breaker IT); §6.2 unchanged (both scenarios use CONTROL_ONLY envelope; crash-simulation UPDATE is a test fixture, no production code writes a DISPATCHING row without owning the lease)
  next_stage: H2H3-transport-decision-or-production-hardening
stage21_scope:
  delivers: [concurrent-claim-skip-locked-no-duplicate-deliveries, shared-breaker-singleton-coherent-open-under-concurrency, breaker-open-visible-to-all-workers, dispatch-tick-self-consistent-across-workers, multi-worker-end-to-end-on-real-persistence]
  not_delivers: [real-retry-scheduler-polling-cadence, real-agent-handler, registry-integrated-resolver, circuit-breaker-cross-restart-persistence, connection-pool-governance, final-push-pull-mq-decision, production-code-changes]
  path: multi-worker-concurrency-verification  # closes the two Stage 20 deferrals recorded as "verified only single-threaded": (1) concurrent claim under REAL contention — Stage 12's ForwardingJdbcIntegrationTest proved claimDue's FOR UPDATE SKIP LOCKED yields no duplicate CLAIMS in a 2-thread unit test, and Stages 17-20 drove the full claim→deliver→ack chain but only ever from a single worker per tick (Stage 20 scenario A simulated "another worker takes over" by reclaiming under a different lease owner on a LATER tick, never two workers racing the same instant); whether N real workers each running their own runOnce loop against the same shared outbox partition the work with zero duplicate deliveries was never exercised end to end. (2) shared circuit-breaker singleton under concurrency — Stage 16 wired RouteCircuitBreaker in, Stage 20 verified the full state machine single-threaded; the deferred note said "a single RouteCircuitBreaker instance shared across worker THREADS is safe under synchronized(RouteState); but whether that holds under real concurrent recordOutcome traffic was left to production". Scenario A (concurrent claim: M=20 PENDING, N=4 workers distinct lease owners sharing one outbox + an atomic-counting delivery port that +1 per deliver and returns acked, CountDownLatch simultaneous release, each loops runOnce until claimDue empty; assert delivery counter == 20 — the direct SKIP LOCKED proof, a dup claim would deliver the same row twice inflating the counter past 20 — all 20 ACKED, aggregate claimed/acked == 20) + Scenario B (shared breaker: M=12, N=4 workers sharing RouteCircuitBreaker(2, very-large-cooldown, clock) + always-retry delivery; assert breaker.stateOf==OPEN — synchronized(RouteState) prevented a lost update on consecutiveFailures/torn transition AND ConcurrentHashMap published OPEN to all threads — no worker threw, aggregate self-consistent, no record ACKED). Scenario B's cooldown is deliberately very large: the goal is to drive CLOSED→OPEN under concurrent failures and verify coherence/visibility (NOT to re-verify the HALF_OPEN probe lifecycle, already done single-threaded in Stage 20); advancing the shared clock from multiple threads with a HALF_OPEN probe in flight would race the cooldown check vs recordOutcome, so the frozen clock + far cooldown means the breaker can only reach OPEN, isolating the concurrent CLOSED→OPEN transition — the lost-update hazard. NO production code changes (pure test stage; @Isolated like Stage 19/20). 190 tests green (188 + 2 concurrency IT); §6.2 unchanged (both scenarios use CONTROL_ONLY envelope; counting/timing helpers are test-only plain JDK, no concrete broker / payload body / token stream / Task state / cross-tenant fallback)
  next_stage: H2H3-transport-decision-or-production-hardening
stage22_scope:
  delivers: [expired-terminal-state-end-to-end, mark-expired-lease-guarded-update-persisted, expired-record-invariant-non-null-failure-code-released-lease, expired-terminal-not-reclaimed, lease-renewal-fires-end-to-end, renewal-pure-arithmetic-on-injected-clock, observing-delivery-port-reads-renewed-lease-as-smoking-gun, mutable-epoch-clock-time-control-reused]
  not_delivers: [real-retry-scheduler-polling-cadence, real-agent-handler, registry-integrated-resolver, circuit-breaker-state-persistence, expired-trigger-source-deadline-field-on-record, connection-pool-governance, final-push-pull-mq-decision, production-code-changes]
  path: time-driven-terminal-and-renewal-verification  # closes the two TIME-DRIVEN blind spots remaining after Stages 17-21 (retry round-trip + lease reclaim + circuit breaker, single- and multi-worker): (1) EXPIRED terminal state end to end — the worker's case EXPIRED → markExpired (a lease-guarded UPDATE) was verified only at the contract layer (in-memory harness); EXPIRED is the THIRD terminal state (ACKED=Stage 17 / DLQ=Stage 18 / EXPIRED=here), and its on-disk invariant (status=EXPIRED + non-null last_failure_code + released lease) plus "terminal is never reclaimed" (not in claimDue's candidate set PENDING/RETRY_SCHEDULED/DISPATCHING) had no end-to-end proof; (2) lease renewal actually firing end to end — MI11-001 made the renewal check read the injected EpochClock (pre-Stage 11 it read the tick-start instant so renewal could never fire under a natural loop), but whether a real claimDue→renewLease→deliver tick actually renews a short lease before delivery was deferred; Stages 19-21 used DispatchLeasePolicy.DISABLED throughout so renewal never fired in any end-to-end IT. Scenario A (EXPIRED terminal: MutableEpochClock(t0) + fake delivery expired() + DispatchLeasePolicy.DISABLED → single tick markExpired → persisted status=EXPIRED / last_failure_code=delivery_timeout (markExpired's hard-coded code, satisfies the EXPIRED record invariant) / attempt_count=0 (terminal, never retried) / lease_owner=NULL / lease_until=NULL (lease released); across 2 ticks aggregate claimed=1 — the second tick claims nothing for the row, EXPIRED is not in claimDue's candidate set) + Scenario B (lease renewal fires: MutableEpochClock(t0) + DispatchLeasePolicy(renewBefore=50s, extend=60s) + claim lease duration 30s (lease_until=t0+30s) → renewal check remaining=(t0+30s)-t0=30s < 50s fires → renewLease(msg, t0+90s) commits BEFORE deliver → an OBSERVING delivery port reads PG lease_until==t0+90s at deliver time as the smoking gun (that value could only exist if renewLease committed before deliver) → acked → ACKED, acked=1 / skipped=0 / renewalObserved=true / attempt_count=0). Renewal is pure arithmetic (the MI11-001 design dividend: the check reads the injected clock, so freezing the clock + a short claim lease drives remaining below the threshold deterministically, CI-stable, no sleep). KEY FINDING (scenario A): EXPIRED is SQL-correct-but-trigger-source-missing — ForwardingOutboxRecord persists no deadlineMillisEpoch (the envelope carries it but the record does not project it) and A2aForwardingDeliveryPort.deliver does not consult the deadline, so a real A2A delivery never returns expired(); this stage injects expired() to verify the markExpired SQL contract (symmetric with Stage 18 injecting dlq() for the DLQ path), and the real trigger source (a deadline field on the record + a DDL column + a deliver-time deadline check) is recorded as deferred (a schema change); markExpired hard-codes delivery_timeout (a retryable code) which satisfies the record invariant but is semantically muddled — EXPIRED is terminal so the code is never consulted for a retry decision, harmless. NO production code changes (Stage 22 is pure test/verification; @Isolated like Stage 19/20/21). 192 tests green (190 + 2 IT); §6.2 unchanged (both scenarios use CONTROL_ONLY envelope; time-control helpers / observing port are test-only plain JDK)
  next_stage: H2H3-transport-decision-or-production-hardening
stage23_scope:
  delivers: [data-bearing-payload-ref-end-to-end-roundtrip, payload-ref-persisted-column-survives-ack, payload-ref-transport-metadata-injection, control-only-metadata-omission-symmetry, stage15-transport-blind-spot-closed]
  not_delivers: [payload-ref-invalid-failure-code-wired, agent-runtime-receiver-payload-ref-extraction, payload-policy-persisted-on-record, real-agent-handler, registry-integrated-resolver, final-push-pull-mq-decision, production-code-changes]
  path: payload-ref-end-to-end-verification  # closes the third high-value blind spot: Stages 17-22 ran EVERY end-to-end verification with a CONTROL_ONLY envelope (payloadRef=null), so the DATA_BEARING + payloadRef path — the §6.2 data-reference mechanism ("large payloads travel as a reference, never in the event/control channel") — was never exercised end to end. The plumbing is COMPLETE (envelope field + record field + DDL payload_ref VARCHAR(1024) + SqlCodec encode/decode) — unlike Stage 22 EXPIRED (trigger-source-missing), here every layer is wired, just never driven with a non-null payloadRef across real SQL. SCOPE CORRECTION vs the Stage 22 plan: Stage 22 anticipated Stage 23 "needs to boot runtime + a handler that asserts received payloadRef metadata"; pre-work corrected this — agent-bus is a STATELESS REFERENCE-ROUTING LAYER (passes the payloadRef through, never holds/stores/parses the payload it references), so BOTH checkpoints need NO runtime boot: (A) persistence checkpoint reuses Stage 19-22 embedded-postgres + Flyway + JdbcForwardingOutbox + observing delivery port; (B) transport checkpoint reuses Stage 15 A2aForwardingDeliveryPort + MockWebServer. Whether the agent-runtime receiver (A2aJsonRpcController) extracts payloadRef is agent-runtime's job, out of agent-bus boundary (deferred). Scenario A (C3ForwardingPayloadRefIntegrationTest: DATA_BEARING envelope + observing delivery port asserts at deliver time BOTH record.payloadRef() (SqlCodec decode) AND the live PG payload_ref column (raw JDBC) equal the enqueue value — the round-trip smoking gun — then post-ACK asserts the column survives markAcked; single tick → ACKED, acked=1) + Scenario B (A2aForwardingDeliveryPortMockWebServerTest extended: record() already set payloadRef="payload-ref-1" but no prior Stage asserted it reached the wire — deliver_carries_payload_ref_in_a2a_metadata asserts body contains "payloadRef"+"payload-ref-1"; new controlOnlyRecord() + deliver_omits_payload_ref asserts body does NOT contain "payloadRef"; the two-branch symmetry IS the §6.2 data-reference contract at the transport boundary). Key findings: (F1) payloadRef persistence is complete (vs Stage 22 EXPIRED trigger-source-missing); (F5) PAYLOAD_REF_INVALID failure code has an enum but no trigger point (like Stage 22 EXPIRED — wiring it needs a validation semantic decision, deferred); (F6) payloadPolicy is not persisted on the record (record uses payloadRef null/non-null to imply it — by design, weakens the DATA_BEARING invariant but does not affect transfer correctness). NO production code changes (Stage 23 is pure test/verification). 195 tests green (192 + 1 IT + 2 transport); §6.2 unchanged (payloadRef is a String reference, not a payload body / token stream / Task state / concrete broker; both scenarios assert the request body carries no payload body)
  next_stage: H2H3-transport-decision-or-production-hardening
