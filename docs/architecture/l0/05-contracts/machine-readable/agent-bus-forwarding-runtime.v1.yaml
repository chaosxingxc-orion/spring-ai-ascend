stage16_scope:
  delivers: [circuit-breaker-wired-to-worker, route-circuit-breaker-three-state-machine, circuit-breaker-record-outcome-feedback, circuit-breaker-allows-delivery-short-circuit, worker-seven-arg-constructor-breaker-injection]
  not_delivers: [concrete-broker-mq, circuit-breaker-state-persistence, circuit-breaker-params-production-tuning, multi-worker-shared-singleton-breaker, real-scheduler-thread-pool, final-push-pull-mq-decision]
