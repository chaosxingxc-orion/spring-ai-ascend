stage17_scope:
  delivers: [first-cross-module-integration-test, real-locala2aruntimehost-replaces-mockwebserver, end-to-end-acked-roundtrip, end-to-end-tenant-isolation, agent-runtime-test-scope-dependency, agentbus-dependency-boundary-runtime-guard, spring-boot4-autoconfigure-repackaging-finding, jdbc-autoconfig-sensitivity-finding]
  not_delivers: [production-dependency-on-agent-runtime, real-agent-handler-stubhandler-only, registry-integrated-resolver, connection-pool-governance, remote-task-failed-code, final-push-pull-mq-decision]
  path: test-only-cross-module-integration  # agent-bus's FIRST dependency on agent-runtime is test-scope only (the two modules were fully isolated builds until Stage 17); production code stays free of agent-runtime (AgentBusDependencyBoundaryTest guards com.huawei.ascend.bus.. against com.huawei.ascend.runtime..); the IT boots real embedded-postgres + Flyway + JdbcForwardingOutbox + real LocalA2aRuntimeHost + StubHandler and drives the full chain to an outbox ACK; two findings: (a) agent-runtime's A2A server Spring context is pure in-memory but sensitive to agent-bus's leaked jdbc starter on the shared test classpath (DataSourceAutoConfiguration/FlywayAutoConfiguration fire and fail for lack of spring.datasource.url; excluded via System.setProperty spring.autoconfigure.exclude), (b) Spring Boot 4 repackaged autoconfigure (jdbc -> org.springframework.boot.jdbc.autoconfigure, flyway -> org.springframework.boot.flyway.autoconfigure; the Spring Boot 3 names silently no-op); section 6.2 unchanged (IT carries no Task state / payload body / concrete broker)
  next_stage: H2H3-transport-decision-or-production-hardening
stage18_scope:
  delivers: [remote-task-failed-non-retryable-code, remote-terminal-mapping-precise-failed-canceled-rejected-to-dlq, auth-required-stays-retry-receiver-unavailable, failure-path-end-to-end-integration-test, real-failing-handler-failed-to-dlq, route-unreachable-to-retry-end-to-end, stage9-classification-chain-extended]
  not_delivers: [lease-expiry-reclaim-end-to-end, production-dependency-on-agent-runtime, real-agent-handler, registry-integrated-resolver, connection-pool-governance, final-push-pull-mq-decision]
