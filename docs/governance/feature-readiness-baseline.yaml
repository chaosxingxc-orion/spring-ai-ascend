# Feature-Readiness Baseline — the known, not-yet-discharged readiness findings.
#
# Authority: ADR-0159 (Progressive Learning Curve and Authority Lanes) §13.3 (the
#   advisory -> changed-files-blocking -> full-blocking ratchet, where the
#   changed-files rung "blocks NEW violations in changed files" and historical
#   debt waits for full-blocking). Companion schema: the readiness policy
#   docs/governance/feature-readiness-policy.yaml (the per-axis acceptance bar
#   every row here cites a finding against). Sibling pattern:
#   docs/governance/layer-purity-temporary-violations.yaml (the same dated
#   grandfather discipline for L0/L1 layer-purity leaks).
# Baseline-truth input: the gate/lib/check_feature_readiness.py --mode advisory
#   report against the live corpus at promotion time (the FunctionPoint /
#   axis / code triple of every finding it reports). Every row below is copied
#   from one such finding; this file invents no FunctionPoint, no axis, and no
#   code.
#
# What this file IS. The dated allow-list of readiness findings that already sit
#   on a SHIPPED FunctionPoint at the moment the readiness gate (gate Rule 147,
#   kernel Rule G-30, enforcer E197) promoted from advisory to changed-files-
#   blocking. Each FunctionPoint here was seeded (W2) with structural + decision
#   identity but never wired with its evidence-axis refs (saa.contract_op_refs /
#   saa.code_entrypoint_refs|saa.fact_refs / saa.test_refs) or cites an ADR with
#   no current normalized view; the backing production code exists but the
#   FunctionPoint element has not yet discharged the obligation. Each entry
#   freezes one known (fp_id, axis, code) finding AND declares a per-entry
#   sunset_date by which the evidence MUST be wired (or the FunctionPoint
#   demoted out of `shipped`). A closed-but-dateless allow-list is an anti-
#   pattern (every entry MUST carry a sunset_date).
#
# What this file is NOT. A remediation plan, a rule card, or an enforcer row. The
#   readiness gate consumes this list as its changed-files-mode allow-list ONLY:
#   a finding whose (fp_id, axis, code) matches a still-open row here is
#   tolerated (reported BASELINED, never blocks); any finding NOT listed here, or
#   any row whose sunset_date has passed, blocks if its FunctionPoint is in scope.
#   full-blocking mode IGNORES this list entirely (the terminal posture demands a
#   fully clean corpus). The OWNERSHIP invariant (a value-axis node anchoring a
#   FunctionPoint) is NEVER baselinable — a row may not freeze an ownership lie.
#   The authority cascade (generated facts > DSL > Card/prose) is untouched: this
#   list never asserts a fact, it records which obligations are not yet
#   discharged.
#
# Schema:
#   schema_version  - integer, bumped when fields are added.
#   authority       - the ratifying ADR id.
#   last_updated    - ISO yyyy-mm-dd (UTC). UTC convention (a local +08 date can
#                     be UTC-future and trip a freshness gate).
#   status          - advisory | blocking. The LIST's posture, not a contract-
#                     status enum (Rule 62 does not apply — this is not a
#                     docs/contracts/*.v1.yaml). `blocking` once the readiness
#                     gate runs changed-files-blocking and consumes this list.
#   list_closed     - true. No new finding may be grandfathered once the gate is
#                     blocking — a NEW shipped FunctionPoint must satisfy every
#                     axis at authoring time, never be added here.
#   findings[]      - one row per known finding. Each row:
#       id          - stable kebab id, prefix FRB- (Feature-Readiness Baseline).
#       fp_id       - the FunctionPoint id (matches saa.id in
#                     architecture/features/function-points.dsl).
#       axis        - the readiness axis (value | structure | evidence | decision).
#       code        - the machine finding code the helper emits (e.g.
#                     EVIDENCE-NO-CONTRACT, DECISION-NO-NORMALIZED-VIEW).
#       note        - WHY the obligation is not yet discharged (the designed
#                     intent + what must land to close it). Prose, never a live
#                     claim of evidence that does not exist.
#       sunset_date - REQUIRED ISO yyyy-mm-dd by which the obligation MUST be
#                     discharged and this row MUST be removed. Tiered: decision-
#                     axis rows (author a normalized ADR view — cheap) 2026-07-31
#                     (the L1-corpus tier, aligned with the layer-purity
#                     agent-service grandfather sunset already in flight);
#                     evidence-axis rows (extract code/test/contract facts — needs
#                     the fact-extractor over the real handlers) 2026-08-31.
#
# Change log (this file is an exempt surface for wave/log metadata):
#   2026-05-30 — progressive-learning-curve-remediation W22. Authored at the
#     promotion of gate Rule 147 / G-30 / E197 (feature_readiness) from advisory
#     to changed-files-blocking. The 39 rows below are the complete advisory
#     report against the live corpus at promotion time (18 FunctionPoints; 33
#     evidence-axis + 6 decision-axis findings on the 11 internal-channel +
#     2 ADR-citing shipped FunctionPoints whose elements were seeded without
#     evidence refs / cite an ADR with no current normalized view). The three
#     fully-wired HTTP FunctionPoints (FP-CREATE-RUN evidence, FP-CANCEL-RUN,
#     FP-GET-RUN-STATUS evidence) and every design_only FunctionPoint carry no
#     row (they discharge their bar / sit at the `proposed` bar). No ownership
#     finding exists in the corpus, and none may ever be added here.
#   2026-05-31 — residual-cleanup C1a (feature-readiness wiring batch 1/3).
#     Discharged the full evidence axis of FP-CHILD-RUN-SPAWN, FP-ENGINE-DISPATCH,
#     FP-GRAPH-MEMORY-STORE, FP-HOOK-DISPATCH (resolvable saa.code_entrypoint_refs
#     + saa.fact_refs + real saa.test_refs + explicit saa.no_contract_rationale on
#     each element in architecture/features/function-points.dsl) and the
#     EVIDENCE-NO-CONTRACT row of FP-IDEMPOTENCY-CLAIM. 13 rows removed (the
#     readiness gate no longer reports those findings); 26 rows remain for
#     batches 2/3. No ref was fabricated — every code_entrypoint_refs / fact_refs
#     resolves to a code-symbol fact and every test_refs to a tests.json fact.
#   2026-05-31 — residual-cleanup C1b (feature-readiness wiring batch A, 2/3).
#     Discharged the full evidence axis of FP-S2C-CALLBACK, FP-RUN-STATE-TRANSITION,
#     and FP-SUSPEND-RESUME (each element now carries saa.no_contract_rationale + a
#     resolving saa.fact_refs [bus.spi.s2c.S2cCallbackTransport / service.runtime.
#     runs.spi.RunRepository / bus.spi.engine.SuspendSignal] + saa.code_entrypoint_refs
#     at a real public method [#dispatch / #updateIfNotTerminal / #forClientCallback]
#     + real saa.test_refs [S2cCallbackRoundTripIT, RunRepositoryAtomicContractTest,
#     RunStatusTransitionIT, SuspendSignalTest, ...]); the EVIDENCE-NO-FACT +
#     EVIDENCE-NO-TEST rows of FP-IDEMPOTENCY-CLAIM (IdempotencyHeaderFilter +
#     IdempotencyHeaderFilterTest/IT); and the EVIDENCE-NO-CONTRACT + EVIDENCE-NO-FACT
#     rows of FP-INGRESS-ENVELOPE (no_contract_rationale + the IngressGateway SPI
#     interface fact). FP-RUN-STATE-TRANSITION's DECISION-ADR-NOT-CITEABLE row was
#     discharged by re-pointing saa.sourceAdr ADR-0118 (remediation_record) ->
#     ADR-0142 (run-aggregate-single-owner, active_guidance — the active ADR that
#     governs the RunRepository atomic compare-and-set invariant, Rule R-C.2.b).
#     14 rows removed; 12 rows remain for batch B/3 (FP-TENANT-CROSS-CHECK +
#     FP-POSTURE-BOOT-GUARD evidence + the design_only-ADR decision holds). KEPT
#     (honest holds, refreshed): FP-INGRESS-ENVELOPE EVIDENCE-NO-TEST (IngressGateway
#     is a design-only SPI with no implementation/test); FP-IDEMPOTENCY-CLAIM
#     DECISION-NO-NORMALIZED-VIEW (ADR-0027 is a Markdown-era ADR with no raw YAML
#     to normalize — cannot author a view without fabricating decision content). No
#     ref was fabricated — every fact_refs resolves in code-symbols.json and every
#     test_refs in tests.json; ADR-0142's normalized view is on-disk and citeable.
#   2026-05-31 — residual-cleanup C1c (feature-readiness wiring batch B, 3/3 — all
#     remaining not-yet-discharged FRB rows processed). Discharged the full evidence
#     axis of FP-POSTURE-BOOT-GUARD and FP-TENANT-CROSS-CHECK: each element now
#     carries saa.code_entrypoint_refs at a real public method
#     (PostureBootGuard.onApplicationEvent — the ApplicationListener contract method;
#     JwtTenantClaimCrossCheck.doFilterInternal — the OncePerRequestFilter contract
#     method), a saa.fact_refs that resolves in code-symbols.json
#     (code-symbol/...posture-posturebootguard, code-symbol/...tenant-
#     jwttenantclaimcrosscheck), real saa.test_refs (PostureBootGuardIT/PostureBindingIT;
#     JwtTenantClaimCrossCheckTest/TenantContextFilterIT — all four present in
#     tests.json), and an explicit saa.no_contract_rationale (boot lifecycle listener /
#     internal admission filter — no external wire op). Discharged THREE decision-axis
#     rows by re-pointing saa.sourceAdr to ADR-0040 (W1 HTTP-contract reconciliation,
#     active_guidance), the active normalized authority that genuinely governs each:
#     FP-TENANT-CROSS-CHECK ADR-0056 -> ADR-0040 (ADR-0040 active_guidance IS the
#     "tenant identity is cross-checked, never replaced" decision — a JWT tenant claim
#     added alongside X-Tenant-Id, mismatch rejected); FP-CREATE-RUN + FP-GET-RUN-STATUS
#     ADR-0020 -> ADR-0040 (ADR-0040 governs the create/get-run HTTP contract — the
#     DFA-initial RunStatus.PENDING per the ADR-0020 RunLifecycle DFA — and owns the
#     contract-op/createrun + contract-op/getrun facts; the run-create/get-status FP
#     decision is current authority through ADR-0040, where ADR-0020 is a Markdown-era
#     id with no normalized view). 9 rows removed (12 -> 3 open); changed-files-blocking
#     exit 0 with the 3 residuals BASELINED, zero NEW or WORSENED. KEPT (honest holds,
#     refreshed below): FP-IDEMPOTENCY-CLAIM DECISION-NO-NORMALIZED-VIEW (ADR-0027) and
#     FP-POSTURE-BOOT-GUARD DECISION-NO-NORMALIZED-VIEW (ADR-0058) — both Markdown-era
#     ADRs absent from the apex fact-layer corpus with no active normalized successor
#     that governs the same boot-guard / idempotency-claim+replay behavioral invariant
#     (the ADR-0062/0147/0151 keyword hits are incidental — none is the governing
#     decision), so a view cannot be authored and no re-point is honest; and
#     FP-INGRESS-ENVELOPE EVIDENCE-NO-TEST (IngressGateway is a design-only SPI with no
#     concrete implementation/test in tests.json). No ref was fabricated — every
#     fact_refs resolves in code-symbols.json, every test_refs in tests.json, and
#     ADR-0040's normalized view is on-disk in active_guidance.

schema_version: 1
authority: ADR-0159
last_updated: 2026-05-31
status: blocking
list_closed: true

findings:
  # -------------------------------------------------------------------------
  # Evidence-axis debt: an internal-channel shipped FunctionPoint whose DSL
  # element declares no saa.contract_op_refs / saa.code_entrypoint_refs /
  # saa.test_refs. The production code exists (the implements edge resolves);
  # the FunctionPoint element has not yet been wired with its evidence refs.
  # Closes when the fact-extractor lands the entrypoint + test + (if any)
  # contract-op facts and the refs are added to the element. Sunset 2026-08-31.
  # -------------------------------------------------------------------------
  # The evidence axis of every internal-channel shipped FunctionPoint was drained
  # across residual-cleanup C1a/C1b/C1c (2026-05-31): FP-CHILD-RUN-SPAWN,
  # FP-ENGINE-DISPATCH, FP-GRAPH-MEMORY-STORE, FP-HOOK-DISPATCH (C1a);
  # FP-S2C-CALLBACK, FP-RUN-STATE-TRANSITION, FP-SUSPEND-RESUME, FP-IDEMPOTENCY-CLAIM,
  # FP-INGRESS-ENVELOPE (C1b); FP-POSTURE-BOOT-GUARD, FP-TENANT-CROSS-CHECK (C1c).
  # Each element carries a resolvable saa.code_entrypoint_refs at a real public method
  # + a saa.fact_refs that resolves in code-symbols.json + real saa.test_refs (FQNs
  # present in tests.json) + an explicit saa.no_contract_rationale naming the
  # governing internal contract surface (or the boot/admission rationale). Three
  # decision rows were also discharged by re-pointing saa.sourceAdr to the active
  # normalized ADR that genuinely governs the invariant: FP-RUN-STATE-TRANSITION
  # ADR-0118 -> ADR-0142 (C1b); FP-TENANT-CROSS-CHECK ADR-0056 -> ADR-0040,
  # FP-CREATE-RUN + FP-GET-RUN-STATUS ADR-0020 -> ADR-0040 (C1c). Every such row was
  # removed only because the readiness gate no longer reports its (fp_id, axis, code)
  # finding. The THREE rows below are honest holds: two decision rows whose
  # Markdown-era ADR (ADR-0027 / ADR-0058) has no normalized view and no active
  # successor governing its behavioral invariant, and one evidence row on a
  # design-only SPI (FP-INGRESS-ENVELOPE) with no concrete implementation/test.
  - id: FRB-idempotency-claim-no-normalized-view
    fp_id: FP-IDEMPOTENCY-CLAIM
    axis: decision
    code: DECISION-NO-NORMALIZED-VIEW
    note: |
      saa.sourceAdr ADR-0027 has no normalized view at
      docs/adr/normalized/ADR-0027.yaml. ADR-0027 is a Markdown-era decision that
      is NOT in the apex fact-layer corpus (architecture/facts/generated/adrs.json
      carries only the YAML ADRs from ADR-0068 onward; there is no raw
      docs/adr/0027-*.yaml to normalize), so a normalized view cannot be authored
      without fabricating decision content. C1c checked for an active normalized ADR
      that genuinely governs the idempotency claim+replay invariant and found none
      (the ADR-0068 / 0147 / 0149 keyword hits on "idempot" are incidental — none is
      the governing claim+replay decision), so no honest re-point exists. The
      evidence axis is fully discharged (C1b wired entry/fact/test refs + a
      no_contract_rationale); only the decision-axis normalized view remains. KEEP
      until either ADR-0027 is migrated to a raw YAML ADR (then author its normalized
      view) or an active YAML ADR governing the idempotency claim+replay invariant is
      adopted. Honest hold, not a wiring gap.
    sunset_date: 2026-08-31

  - id: FRB-ingress-envelope-no-test
    fp_id: FP-INGRESS-ENVELOPE
    axis: evidence
    code: EVIDENCE-NO-TEST
    note: |
      Element declares no saa.test_refs. IngressGateway is a design-only SPI
      surface in agent-bus (bus.spi.ingress carries only the IngressGateway
      interface + IngressEnvelope/IngressResponse records; there is NO concrete
      implementation and NO test referencing IngressGateway.routeClientRequest /
      IngressEnvelope in tests.json). The evidence axis is otherwise discharged
      (no_contract_rationale + a resolving saa.fact_refs to the IngressGateway
      interface fact + code_entrypoint_refs). KEEP until a concrete ingress-routing
      implementation lands with a test fact to cite; fabricating a test_exception
      for a surface that has no production implementation would be dishonest.
    sunset_date: 2026-08-31

  # FP-POSTURE-BOOT-GUARD and FP-TENANT-CROSS-CHECK discharged their full evidence
  # axis (contract/fact/test) on 2026-05-31 (residual-cleanup C1c): each element now
  # carries saa.code_entrypoint_refs at a real public method
  # (PostureBootGuard.onApplicationEvent / JwtTenantClaimCrossCheck.doFilterInternal),
  # a resolving saa.fact_refs (code-symbol/...posture-posturebootguard,
  # code-symbol/...tenant-jwttenantclaimcrosscheck), real saa.test_refs
  # (PostureBootGuardIT/PostureBindingIT, JwtTenantClaimCrossCheckTest/TenantContextFilterIT),
  # and an explicit saa.no_contract_rationale. FP-TENANT-CROSS-CHECK also discharged
  # its decision axis by re-pointing saa.sourceAdr ADR-0056 -> ADR-0040 (W1
  # HTTP-contract reconciliation, active_guidance — the active normalized authority
  # whose active_guidance IS the "tenant identity is cross-checked, never replaced"
  # decision). The six tenant/posture evidence rows + the tenant decision row were
  # removed because their obligation is genuinely discharged. FP-POSTURE-BOOT-GUARD's
  # decision row stays below (ADR-0058 is a Markdown-era ADR with no normalized view
  # and no active successor governing the boot-guard invariant — an honest hold).
  - id: FRB-posture-boot-guard-no-normalized-view
    fp_id: FP-POSTURE-BOOT-GUARD
    axis: decision
    code: DECISION-NO-NORMALIZED-VIEW
    note: |
      saa.sourceAdr ADR-0058 has no normalized view at
      docs/adr/normalized/ADR-0058.yaml. ADR-0058 is a Markdown-era decision
      (docs/adr/0058-posture-boot-guard.md) NOT in the apex fact-layer corpus
      (architecture/facts/generated/adrs.json carries only the YAML ADRs from
      ADR-0068 onward), so a normalized view cannot be authored without fabricating
      decision content. C1c checked for an active normalized ADR that genuinely
      governs the posture boot-guard fail-closed @RequiredConfig invariant and found
      none (the ADR-0062 / 0147 / 0151 keyword hits on "posture" are incidental —
      none is the governing boot-guard decision), so no honest re-point exists. The
      evidence axis is fully discharged (entry/fact/test refs all wired in C1c); only
      the decision-axis normalized view remains. KEEP until either ADR-0058 is
      migrated to a raw YAML ADR (then author its normalized view) or an active YAML
      ADR governing the boot-guard invariant is adopted. Honest hold, not a wiring gap.
    sunset_date: 2026-07-31
