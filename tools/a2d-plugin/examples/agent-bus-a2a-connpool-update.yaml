  - {id: E-008, view: development, type: contract, name: ForwardingEndpointResolver, owner: arch, responsibility: "endpoint 解析:本轮补 registry 集成(原 MapEndpointResolver → registry-backed)", source_fact: Stage 15, status: draft, change: modified}
  - {id: E-014, view: logical, type: actor, name: agent-runtime, owner: arch, responsibility: receiver 消费方(锚点,本轮不动), source_fact: l0-logical.puml, status: accepted, change: unchanged}
  - {id: E-016, view: development, type: module, name: A2aConnectionPool, owner: arch, responsibility: "per-endpoint HTTP 连接复用与超时管理(本轮新增)", source_fact: 本轮更新稿, status: draft, change: added}

