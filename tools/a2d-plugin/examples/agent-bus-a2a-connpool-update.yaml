# A2D 步骤 3 架构更新稿样例:agent-bus A2A adapter 生产化(连接池/超时)
# 场景:把 Stage 15 的 A2A HTTP adapter PoC(E-007,draft)推向生产。
# 本轮变更用 change 字段标注(added/modified/removed/unchanged);delta 视图只详列变更项。
# 锚点元素(E-001/E-006/E-014)为引用完整性保留,标 unchanged。
version: agent-bus-a2a-connpool-v1-draft
title: agent-bus A2A adapter 生产化(连接池/超时)架构更新稿
status: draft
generated_at: 2026-06-22
scope: >
  本轮(闸门 1 前)聚焦 A2A HTTP transport adapter 生产化:为 E-007 A2aForwardingDeliveryPort
  补连接池与超时配置,推进 DF-003。对应 agent-bus-forwarding-runtime-v1 基线的 SC-005 场景。

source_packets:
  - docs/architecture/l0/10-governance/review-packets/agent-bus-forwarding-runtime-transport-candidates.md

views:
  logical:
    summary: >
      本轮在 delivery transport 层引入连接池:A2aForwardingDeliveryPort(E-007)内部新增
      A2aConnectionPool(E-016,added),统一管理 per-endpoint 的 HTTP 连接复用与超时。
    risks:
      - 连接池上限配置不当可能导致投递积压或对 agent-runtime 造成连接压力
  development:
    summary: 本轮新增 A2aConnectionPool 模块,不改 ArchUnit 边界(仍在 transport.a2a 子树)。
    allowed_dependencies:
      - A2aConnectionPool → HTTP 客户端连接池(Apache HttpClient / OkHttp,本轮待定)
    forbidden_dependencies:
      - A2aConnectionPool 不得绕过 ForwardingDeliveryPort 直接被业务内核调用
    risks:
      - 连接池实现库选择(Apache vs OkHttp)未定,影响依赖体积
  process:
    summary: 连接池对 dispatch loop 透明——deliver 路径不变,只是底层连接复用。
    runtime_flows:
      - ForwardingDispatchLoop deliver → A2aForwardingDeliveryPort → 连接池取连接 → A2A HTTP
    failure_paths:
      - 连接池耗尽 → 阻塞或快速失败(策略本轮待定,见 RR-005)
    risks: []
  physical:
    summary: 连接池是进程内资源,无新部署影响;超时参数需部署注入。
    deployment_impact:
      - 新增部署参数:连接池上限、连接超时、读取超时
    boundaries:
      - 连接池不跨租户(与 RLS 无关,进程内)
    risks: []
  scenario:
    scenarios:
      - {id: SC-005, actor: agent-runtime, flow: A2A HTTP 投递经连接池复用连接, supported_by: A2aForwardingDeliveryPort+A2aConnectionPool, contract: ForwardingDeliveryPort, harness: 待补连接池场景, status: draft}

