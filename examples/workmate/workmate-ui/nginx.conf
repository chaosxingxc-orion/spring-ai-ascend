server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # API + actuator → backend container. SSE-friendly (HTTP/1.1, no buffering).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    location /actuator/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    # SPA fallback.
    location / {
        try_files $uri /index.html;
    }
}
