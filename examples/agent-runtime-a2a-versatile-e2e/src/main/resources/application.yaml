debug: false

spring:
  application:
    name: agent-runtime-a2a-versatile-e2e

server:
  port: ${SAA_VERSATILE_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# ── Versatile remote service configuration ──
# Override these values via environment variables or a custom
# application-local.yaml when running against a real versatile instance.
versatile:
  host: ${VERSATILE_HOST:100.93.15.185}
  port: ${VERSATILE_PORT:30001}
  ssl: ${VERSATILE_SSL:true}
  workflow-id: ${VERSATILE_WORKFLOW_ID:17bf8748-d35d-41da-ad61-9cf53f6bb4b3}
  workspace-id: ${VERSATILE_WORKSPACE_ID:38e96fe921ff4daf8af01bd3529346c6}
  timeout: 30s
  version: 1772196378200
  long-term-memory:
    enable-retrieve: true
    enable-extract: true
  headers:
    accept: "application/json, text/event-stream"
    content-type: "application/json"
    stream: "true"
  passthrough-headers:
    - x-invoke-mode
    - x-language
    - cftk
    - cf2-cftk
    - cookie
