# Test-only host configuration. The library jar deliberately ships no
# application.yml, so the module's own Spring Boot tests act as the "host" and
# supply the minimal config the test classpath needs: the optional Spring AI
# starters instantiate model beans eagerly and require a non-null credential,
# the Vault starter needs an explicit opt-out, and the optional security /
# resilience4j / datasource auto-configurations would otherwise lock down or
# fail boots that real jar-only consumers (who don't have these optional
# dependencies) never see.
spring:
  ai:
    openai:
      api-key: test-no-call-expected
    anthropic:
      api-key: test-no-call-expected
  cloud:
    vault:
      enabled: false
  autoconfigure:
    exclude:
      - io.github.resilience4j.springboot3.verifier.autoconfigure.SpringBoot3VerifierAutoConfiguration
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
      - org.springframework.boot.security.autoconfigure.SecurityAutoConfiguration
      - org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.security.autoconfigure.web.servlet.ServletWebSecurityAutoConfiguration
      - org.springframework.boot.security.autoconfigure.web.servlet.SecurityFilterAutoConfiguration
      - org.springframework.boot.security.autoconfigure.actuate.web.servlet.ManagementWebSecurityAutoConfiguration
