# Spring AI Ascend Architecture Profile — required properties per tag.
#
# Authority: ADR-0147. Validated against ProfileValidator.COMMON_PROPERTIES,
# ProfileValidator.TAG_SPECIFIC, and ProfileValidator.TAG_STATUS_SPECIFIC by
# ProfileYamlParityTest.
#
# Three requirement classes, evaluated together for each element:
#   common[]          — required on EVERY profile-tagged element.
#   by_tag[X]         — required additionally when an element carries the
#                       SAA-X tag (unconditional, independent of saa.status).
#   by_tag_status[X][S] — required additionally when an element carries the
#                       SAA-X tag AND its saa.status equals S. This expresses a
#                       status-conditional obligation that the flat by_tag map
#                       cannot (e.g. a property required only on shipped frames).

required_properties:
  common:
    - saa.id
    - saa.kind
    - saa.level
    - saa.view
    - saa.status

  by_tag:
    SAA Capability:
      - saa.owner
      - saa.sourceAdr
    SAA Feature:
      - saa.owner
      - saa.sourceAdr
      - saa.capabilityDomain
      - saa.synopsis
      - saa.aiBoundary.canModifyCode
      - saa.aiBoundary.canModifyContracts
      - saa.aiBoundary.allowedStatusTransitions
      - saa.aiBoundary.requiresHumanReviewAt
      - saa.aiBoundary.sandboxPolicyRef
    SAA FunctionPoint:
      - saa.owner
      - saa.sourceAdr
    SAA Module:
      - saa.owner
    SAA Rule:
      - saa.sourceAdr
    SAA Enforcer:
      - saa.owner
      - saa.sourceFile
      - saa.enforcerId
    SAA Test:
      - saa.owner
      - saa.sourceFile
    SAA SPI:
      - saa.owner
      - saa.sourceFile
    SAA Contract:
      - saa.owner
      - saa.sourceFile
      - saa.sourceAdr
    SAA Principle:
      - saa.principleId
    SAA ADR:
      - saa.adrId
      - saa.adrStatus
    SAA GeneratedProjection:
      - saa.generated
      - saa.sourceFile
    SAA EngineeringFrame:
      - saa.owner
      - saa.sourceAdr
      - saa.cardPath

  # by_tag_status[tag][status] — required when an element carries `tag` AND its
  # saa.status equals `status`. Authority: ADR-0161 §2. saa.primaryPackage (the
  # fully-qualified primary Java package root the frame anchors) is required only
  # on `shipped` frames; design_only / skeleton frames that have no Java package
  # home yet legitimately omit it (ADR-0161; feature-readiness-policy.yaml
  # structural_axis_subset.design_only).
  by_tag_status:
    SAA EngineeringFrame:
      shipped:
        - saa.primaryPackage
