# Module metadata for agent-middleware.
# Required by CLAUDE.md Rule R-C sub-clause .b (Independent Module Evolution).
# Authority: ADR-0066 + ADR-0073 (Engine Hooks + Runtime Middleware SPI).
# Enforced by gate rule module_metadata_present_and_complete.

module: agent-middleware
kind: domain             # platform | domain | starter | bom | sample
version: 0.0.1-SNAPSHOT
semver_compatibility: experimental
description: "Runtime-owned cross-cutting middleware SPI — HookPoint enum + RuntimeMiddleware listener + HookContext + HookOutcome + HookDispatcher (originally extracted from agent-runtime/orchestration/spi per T2.B1). rc43+: also hosts the cross-cutting middleware-tier SPI surface per ADR-0120 — ModelGateway, Skill (unified Tool), Memory, Vector, Retriever, Embedding — the intermediary primitives between engine and external systems. The first-class Agent entity (HTTP-edge customer registration surface) lives in agent-service; the Planner SPI (engine-side plan generator) lives in agent-runtime. Reference adapters (SpringAi*) live in agent-service per Wave C1."
architecture_doc: architecture/docs/L1/agent-middleware/README.md
dfx_doc: docs/dfx/agent-middleware.yaml
spi_packages:
  - com.huawei.ascend.middleware.spi              # hook surface: HookPoint, HookContext, HookOutcome, RuntimeMiddleware (consumed by agent-runtime via HookDispatcher)
  # Agent SPI lives in agent-service (HTTP-edge customer entity).
  # Planner SPI lives in agent-runtime (engine-side plan generator).
allowed_dependencies: []  # SPI-pure: java.* only, per Rule R-D sub-clause .d
forbidden_dependencies:
  - agent-service            # post-Phase-C (consolidated from agent-platform per ADR-0078); middleware is upstream of service
  - agent-runtime   # engine references middleware (HookPoint), not the other way
  - agent-bus
deployment_plane: compute_control   # Rule R-I / P-I — middleware runs in-process with the runtime kernel
